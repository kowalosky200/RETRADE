// STATS
function _periodDateRange(period){
  const today=new Date();
  const todayStr=today.toISOString().split('T')[0];
  function daysAgo(n){const d=new Date(today);d.setDate(d.getDate()-n);return d.toISOString().split('T')[0];}
  if(period==='7d')  return{from:daysAgo(7),  to:todayStr};
  if(period==='30d') return{from:daysAgo(30), to:todayStr};
  if(period==='60d') return{from:daysAgo(60), to:todayStr};
  if(period==='90d') return{from:daysAgo(90), to:todayStr};
  if(period==='current_fy'||!period){
    const fy=_currentFYStart();
    return{from:fy+'-04-01',to:(fy+1)+'-03-31'};
  }
  if(period==='prev_fy'){
    const fy=_currentFYStart()-1;
    return{from:fy+'-04-01',to:(fy+1)+'-03-31'};
  }
  return{from:null,to:null}; // all time
}

function calcYearlyStats(period){
  const range=_periodDateRange(period||SUMMARY_PERIOD);
  function inRange(dateStr){
    if(!range.from)return true;
    if(!dateStr)return false;
    return dateStr>=range.from&&dateStr<=range.to;
  }
  let totalRev=0,realisedProfit=0,unrealisedProfit=0,stockValue=0;
  let soldCount=0,listedCount=0,totalItems=0,returnCount=0;
  // Refund-rate fields (single-pass, sale-date attribution):
  //   fullRefundCount     — items in period whose original sale was refunded in full
  //   partialOnlyCount    — items in period with partial refund(s) but no full
  //   refundedItemCount   — fullRefundCount + partialOnlyCount (any refund event)
  //   refundedSalesItemCount — items with any refund (same as refundedItemCount; alias kept for clarity)
  //   refundItemRate      — refundedItemCount / soldCount × 100  (HEADLINE)
  // Period attribution rule: refund attaches to the ORIGINAL SALE month, not the
  // return loggedAt. Falls back via r._dateSoldAtReturn (snapshot taken at return
  // time) → i.dateSold (only set if no full return has wiped it). This ensures
  // backdated returns don't shift the refund into the wrong period.
  let fullRefundCount=0,partialOnlyCount=0;
  let soldItems=[],stale=[];
  let saleTransactions=[];
  allDBKeys().forEach(k=>{
    (DB[k]||[]).forEach(i=>{
      if((i.item||"").trim().toUpperCase()==="MONTH END")return;
      // Full returns wipe dateSold — use _dateSoldAtReturn snapshot so the sale
      // still counts in the correct period for revenue and sold-count purposes.
      // _retSaleDate: original sale date for items whose dateSold was wiped.
      // Applies to BOTH currently-returned items AND items that were returned+resold
      // (isReturned=false but returnHistory has a full return entry and dateSold is null).
      const _retSaleDate=(!i.dateSold)?(function(){
        const fe=(i.returnHistory||[]).find(r=>r.type==='full_seller'||r.type==='full_ebay');
        return fe&&fe._dateSoldAtReturn||null;
      })():null;
      const saleDate=i.resaleSalePrice?i.resaleDateSold:(i.dateSold||_retSaleDate);
      const soldInRange=inRange(saleDate);
      totalItems++;
      if(soldInRange&&(i.dateSold||i.resaleSalePrice)&&!i.isReturned&&i.condition!=='spares')saleTransactions.push(i.salePrice||0);
      if(soldInRange&&i.resaleSalePrice&&i.condition!=='spares')saleTransactions.push(i.resaleSalePrice||0);
      // Refund counting: bucket by original sale date, not loggedAt.
      const rh=i.returnHistory||[];
      const hadFullReturn=rh.some(r=>r.type==='full_seller'||r.type==='full_ebay');
      const hadPartial=rh.some(r=>r.type==='partial_seller'||r.type==='partial_ebay');
      if(hadFullReturn||hadPartial){
        // Find the original sale date for this refund event. For full returns,
        // dateSold may be null (wiped on full return) so fall back to the
        // snapshot stored on the return entry.
        const fullEntry=rh.find(r=>r.type==='full_seller'||r.type==='full_ebay');
        const partialEntry=rh.find(r=>r.type==='partial_seller'||r.type==='partial_ebay');
        // Prefer the full-return snapshot; if no full return, partial entry's
        // snapshot (if present) or the live dateSold.
        const refundSaleDate=(fullEntry&&fullEntry._dateSoldAtReturn)
                           ||(partialEntry&&partialEntry._dateSoldAtReturn)
                           ||i.dateSold||null;
        if(inRange(refundSaleDate)){
          if(hadFullReturn)fullRefundCount++;
          else if(hadPartial)partialOnlyCount++;
        }
      }
      // Legacy returnCount kept (full returns only, sale-date attributed) so
      // downstream consumers that read `returnCount` keep working. Replaces
      // the older loggedAt-based count.
      if(hadFullReturn){
        const fullEntry=rh.find(r=>r.type==='full_seller'||r.type==='full_ebay');
        const refundSaleDate=(fullEntry&&fullEntry._dateSoldAtReturn)||i.dateSold||null;
        if(inRange(refundSaleDate))returnCount++;
      }
      // Revenue + profit: attributed to the date the final resolved sale happened.
      // calcItemRevenue() handles the rules: returned+not-resold=0, returned+resold=resalePrice only.
      if(soldInRange){
        totalRev+=calcItemRevenue(i);
        // BUGFIX (Session E1): relisted-but-not-yet-resold items have
        // !i.isReturned but their original sale was reversed. They must NOT
        // count as NET sold (they belong only in fullRefundCount). Without
        // this guard, denom = soldCount + fullRefundCount double-counts them.
        const _isRelistedAwaiting = !i.isReturned && !i.dateSold && !i.resaleSalePrice
          && (i.returnHistory||[]).some(r=>r.type==='full_seller'||r.type==='full_ebay');
        if(!i.isReturned && !_isRelistedAwaiting){
          soldCount++;
          const prof=calcGrossProfit(i);
          realisedProfit+=prof;
          soldItems.push({...i,profit:prof});
        }else{
          // Returned (not yet resold) OR relisted-awaiting-resale —
          // 0 revenue but profit (loss/cost) still counts toward the period.
          realisedProfit+=calcGrossProfit(i)||0;
        }
      }else if(!i.isReturned&&!i.resaleSalePrice){
        listedCount++;
        stockValue+=i.salePrice||0;
        unrealisedProfit+=calcGrossProfit(i)||0;
        const days=daysBetween(i.dateListed,new Date().toISOString().split('T')[0]);
        // Only flag stale if the item was listed within the selected period window
        if(days>=90&&i.dateListed&&i.dateListed>=range.from&&i.dateListed<=range.to)stale.push(i);
      }
    });
  });
  const avgROI=soldItems.length?soldItems.reduce((s,i)=>s+calcROI(i),0)/soldItems.length:0;
  const avgSale=saleTransactions.length?saleTransactions.reduce((s,v)=>s+v,0)/saleTransactions.length:0;
  const avgProfit=soldItems.length?realisedProfit/soldItems.length:0;
  // Sell-through: of items that were LISTED within this period, how many sold?
  // Sold = sold in period AND listed in period (or listed before but sold in window)
  // Total = sold-in-period + still-active items listed in this period
  let stItems=0,stSold=0;
  allDBKeys().forEach(k=>{(DB[k]||[]).forEach(i=>{
    if((i.item||'').trim().toUpperCase()==='MONTH END')return;
    if(i.isReturned)return;
    const saleDate=i.resaleSalePrice?i.resaleDateSold:i.dateSold;
    const listedInPeriod=i.dateListed&&inRange(i.dateListed);
    const soldInPeriod=inRange(saleDate);
    if(listedInPeriod){
      stItems++;
      if(saleDate)stSold++;
    } else if(soldInPeriod&&!listedInPeriod){
      // sold in period but listed before — still counts as a sell-through event
      stItems++;
      stSold++;
    }
  });});
  const sellThrough=stItems?stSold/stItems*100:0;
  // 14-day sell-through: items that sold within 14 days of listing
  const eligible14=[];
  allDBKeys().forEach(k=>{(DB[k]||[]).forEach(i=>{
    if((i.item||'').trim().toUpperCase()==='MONTH END')return;
    if(i.isReturned)return;
    const saleDate14=i.resaleSalePrice?i.resaleDateSold:i.dateSold;
    if(!inRange(saleDate14||i.dateListed))return;
    const today=new Date().toISOString().split('T')[0];
    const daysOnSale=daysBetween(i.dateListed,today);
    if(i.dateSold||i.resaleDateSold){
      const d=calcDaysToSell(i);
      if(d!==null)eligible14.push({sold14:d<=14});
    }else if(daysOnSale>=14){
      eligible14.push({sold14:false});
    }
  });});
  const sold14Count=eligible14.filter(x=>x.sold14).length;
  const sellThrough14=eligible14.length?sold14Count/eligible14.length*100:0;
  const soldWithDate=soldItems.filter(i=>calcDaysToSell(i)!==null);
  const avgDays=soldWithDate.length?Math.round(soldWithDate.reduce((s,i)=>s+calcDaysToSell(i),0)/soldWithDate.length):0;
  // Avg buy price: scoped to period for sold items, all time for unsold stock
  const avgCostPrice=soldItems.length?soldItems.reduce((s,i)=>s+(i.costPrice||0),0)/soldItems.length:0;
  // Build category sell-through data — avg days and stale per category
  const catMap={};
  const today3=new Date().toISOString().split('T')[0];
  allDBKeys().forEach(k=>{
    (DB[k]||[]).forEach(i=>{
      if((i.item||"").trim().toUpperCase()==="MONTH END")return;
      const sdCat=i.resaleSalePrice?i.resaleDateSold:i.dateSold;
      const listedInPeriodCat=i.dateListed&&inRange(i.dateListed);
      const soldInPeriodCat=inRange(sdCat);
      // Include in category if listed in period OR sold in period
      if(!listedInPeriodCat&&!soldInPeriodCat)return;
      const cat=i.category||'Uncategorised';
      if(!catMap[cat])catMap[cat]={sold:0,total:0,daysSum:0,stale:0,fast:0,avgS:0,slow:0};
      catMap[cat].total++;
      if((i.dateSold||i.resaleSalePrice)&&!i.isReturned){
        catMap[cat].sold++;
        const d=calcDaysToSell(i);
        if(d!==null){
          catMap[cat].daysSum+=d;
          if(d<=14)catMap[cat].fast++;
          else if(d<=30)catMap[cat].avgS++;
          else catMap[cat].slow++;
        }
      } else if(!i.dateSold&&!i.isReturned&&!i.resaleSalePrice){
        const d=daysBetween(i.dateListed,today3);
        if(d>=90)catMap[cat].stale++;
      }
    });
  });
  const byCat=Object.entries(catMap).map(([cat,v])=>({
    cat,sold:v.sold,total:v.total,
    pct:v.total?Math.round(v.sold/v.total*100):0,
    avgDays:v.sold?Math.round(v.daysSum/v.sold):null,
    fast:v.fast,avgS:v.avgS,slow:v.slow,stale:v.stale
  })).sort((a,b)=>(a.avgDays===null?999:a.avgDays)-(b.avgDays===null?999:b.avgDays));
  // Items-based refund rate (HEADLINE). Single-pass counts above.
  const refundedItemCount=fullRefundCount+partialOnlyCount;
  const refundedSalesItemCount=refundedItemCount; // alias
  // Denominator = NET sold + full-returns (i.e. all sale events in period that
  // either completed or were fully reversed). Partial-refunded items live
  // inside soldCount already (they were not flagged isReturned).
  const refundDenom=soldCount+fullRefundCount;
  const refundItemRate=refundDenom>0?(refundedItemCount/refundDenom*100):0;
  // Legacy aliases — kept so any consumers reading these old field names keep
  // working without errors. Rates are now items-based and sale-date attributed.
  const returnRate=refundDenom>0?(fullRefundCount/refundDenom*100):0;
  const partialRefundCount=partialOnlyCount;
  const partialRefundRate=refundDenom>0?(partialOnlyCount/refundDenom*100):0;
  const totalAffected=refundedItemCount;

  // Money-based refund rate — kept as SECONDARY metric for click-through panel
  // ("£X paid out · Y% of revenue"). Now sale-date attributed (was loggedAt).
  let _refundMoneyTotal=0, _refundMoneyDenom=0;
  allDBKeys().forEach(function(k){
    (DB[k]||[]).forEach(function(i){
      if((i.item||'').trim().toUpperCase()==='MONTH END')return;
      const rh=i.returnHistory||[];
      if(rh.length>0){
        const fullEntry=rh.find(r=>r.type==='full_seller'||r.type==='full_ebay');
        const partialEntry=rh.find(r=>r.type==='partial_seller'||r.type==='partial_ebay');
        const refundSaleDate=(fullEntry&&fullEntry._dateSoldAtReturn)
                           ||(partialEntry&&partialEntry._dateSoldAtReturn)
                           ||i.dateSold||null;
        if(inRange(refundSaleDate)){
          _refundMoneyTotal+=rh.reduce(function(s,r){return s+(r.refundAmount||0);},0);
        }
      }
      // Revenue denominator: items with a sale date in period (gross).
      // Note: calcItemRevenue returns 0 for fully-returned-not-yet-resold AND
      // relisted-awaiting-resale items, so this naturally excludes reversed
      // sales from the % of revenue denominator (correct accounting).
      const sd=i.resaleSalePrice?i.resaleDateSold:i.dateSold;
      if(sd&&inRange(sd)) _refundMoneyDenom+=calcItemRevenue(i);
    });
  });
  const refundMoneyRate=_refundMoneyDenom>0?(_refundMoneyTotal/_refundMoneyDenom*100):0;

  const totalStaleCount=byCat.reduce((s,c)=>s+(c.stale||0),0);
  return{totalRev,realisedProfit,unrealisedProfit,stockValue,soldCount,listedCount,totalItems,
    // Refund-rate fields (Session B refund KPI revamp):
    fullRefundCount,partialOnlyCount,refundedItemCount,refundedSalesItemCount,
    refundItemRate,refundDenom,
    // Legacy aliases (now derived from the new single-pass counts):
    returnCount,returnRate,partialRefundCount,partialRefundRate,totalAffected,
    refundMoneyRate,refundMoneyTotal:_refundMoneyTotal,refundMoneyDenom:_refundMoneyDenom,
    avgROI,avgSale,avgProfit,avgCostPrice,sellThrough,sellThrough14,sold14Count,
    eligible14Count:eligible14.length,avgDays,stale,byCat,totalStaleCount};
}

// ── SESSION B: Sale-attribution monthly engine ────────────────────────────
// Convert a YYYY-MM-DD date string to its month key, e.g. '2026-04-23' → 'APR-26'.
// Returns null for empty/invalid input. Used to bucket sale events by sale month
// (rather than the listing-month bucket the item lives in inside DB).
function _monthKeyFromDate(ds){
  if(!ds)return null;
  // Tolerate both 'YYYY-MM-DD' (ISO) and dates with time. Avoid Date() parse drift.
  const parts=String(ds).slice(0,10).split('-');
  if(parts.length<3)return null;
  const yr=parseInt(parts[0],10);
  const mo=parseInt(parts[1],10);
  if(!yr||!mo||mo<1||mo>12)return null;
  return MONTHS[mo-1]+'-'+String(yr).slice(-2);
}

// Build a list of sale events that landed in month `m` (sale1 + sale2, attributed
// by dateSold / resaleDateSold respectively). Each entry is a SALE EVENT — an item
// with both an original sale and a resale in different months will produce two
// entries, one per month.
//
// Returns array of: {item, month (DB key the item lives in), sale ('1' or '2'),
//                    saleDate, salePrice, profit, roi, daysToSell, isReturned}
//
// `sale1` profit/revenue uses the item's original-sale-only state — for items
// that have been relisted, this means reconstructing the original sale via the
// snapshot stored on the full_return entry (see _origSalePrice convention).
// `sale2` uses calcGrossProfit on the full item (which already includes the
// relist accounting).
function getSaleEventsInMonth(m){
  const out=[];
  allDBKeys().forEach(function(k){
    (DB[k]||[]).forEach(function(i){
      if((i.item||'').trim().toUpperCase()==='MONTH END')return;
      // Sale 1 — original sale
      // Full returns wipe i.dateSold — use _dateSoldAtReturn snapshot to keep the
      // sale attributed to the correct month for revenue and refund-rate purposes.
      // _sale1Date: use _dateSoldAtReturn for any item whose dateSold was wiped
      // (covers both currently-returned items AND returned+resold items).
      const _sale1Date=i.dateSold||((!i.dateSold)?(function(){
        const fe=(i.returnHistory||[]).find(r=>r.type==='full_seller'||r.type==='full_ebay');
        return fe&&fe._dateSoldAtReturn||null;
      })():null);
      if(_sale1Date&&_monthKeyFromDate(_sale1Date)===m){
        // If this item was relisted, sale1 needs the original-sale snapshot.
        const fullReturn=(i.returnHistory||[]).find(function(r){return r.type==='full_seller'||r.type==='full_ebay';});
        const isRelisted=!!fullReturn&&!!i.resaleSalePrice;
        if(isRelisted){
          // Reconstruct sale1 as a standalone item using the snapshot.
          const sale1Price=fullReturn._salePriceAtReturn||fullReturn.refundAmount||i.salePrice||0;
          const sale1Item=Object.assign({},i,{
            salePrice:sale1Price,
            dateSold:i.dateSold,
            resaleSalePrice:null,
            resaleDateSold:null,
            resalePromoPercent:null,
            resaleShippingCost:null,
            resalePackagingCost:null,
            isReturned:true,            // it was returned (then relisted)
            returnHistory:[fullReturn]  // the full-return entry only
          });
          out.push({
            item:i, month:k, sale:'1',
            saleDate:i.dateSold,
            salePrice:sale1Price,
            profit:calcGrossProfit(sale1Item),
            roi:null,                   // ROI semantically belongs to the resale outcome
            daysToSell:i.dateListed?daysBetween(i.dateListed,i.dateSold):null,
            isReturned:true             // sale1 ended in a return
          });
        } else if(!i.isReturned){
          // Standard single sale (not relisted, not currently returned)
          out.push({
            item:i, month:k, sale:'1',
            saleDate:i.dateSold,
            salePrice:i.salePrice||0,
            profit:calcGrossProfit(i),
            roi:calcROI(i),
            daysToSell:calcDaysToSell(i),
            isReturned:false
          });
        } else {
          // Currently flagged as returned (not yet relisted) — sale1 happened, was reversed.
          out.push({
            item:i, month:k, sale:'1',
            saleDate:_sale1Date,
            salePrice:i.salePrice||0,
            profit:calcGrossProfit(i)||0,
            roi:null,
            daysToSell:i.dateListed?daysBetween(i.dateListed,i.dateSold):null,
            isReturned:true
          });
        }
      }
      // Sale 2 — resale event
      if(i.resaleSalePrice&&i.resaleDateSold&&_monthKeyFromDate(i.resaleDateSold)===m){
        out.push({
          item:i, month:k, sale:'2',
          saleDate:i.resaleDateSold,
          salePrice:i.resaleSalePrice||0,
          profit:calcGrossProfit(i),         // full-lifecycle profit attributed to the resale event
          roi:calcROI(i),
          daysToSell:calcDaysToSell(i),
          isReturned:false                   // resale events are net-positive sales
        });
      }
    });
  });
  return out;
}

// Sale-attributed month stats — drives the new Monthly KPIs.
//   totalRev          Sum of sale-event revenue (sale1 prices + sale2 prices) landing in m
//   realisedProfit    Sum of sale-event profits (sale1 sentinel-priced via snapshot; sale2 full lifecycle)
//   soldCount         Count of NET sale events in m (excludes sale1 events that ended in return)
//   eventCount        Count of ALL sale events in m (includes returned sale1's)
//   returnedCount     Count of sale events in m that ended in a return
//   avgROI            Average ROI across non-returned sale events
//   avgDays           Average days-to-sell across non-returned sale events
//   refundCount       Count of return events whose original sale (dateSoldAtReturn fallback) was in m
//   partialCount      Count of partial refund events whose original sale was in m
//   refundItemRate    refundCount / soldCount * 100 — items rate
//   refundedSalesRev  Sum of revenue from sale events in m that had any refund
function calcMonthStatsBySale(m){
  const events=getSaleEventsInMonth(m);
  let totalRev=0,realisedProfit=0,soldCount=0,eventCount=0,returnedCount=0;
  let roiSum=0,roiCount=0,daysSum=0,daysCount=0;
  events.forEach(function(e){
    eventCount++;
    // For sale1 events that ended in a return+resale, revenue = 0 (counted on sale2).
    const _evRev=(e.isReturned&&e.sale==='1'&&e.item.resaleSalePrice)?0:(e.salePrice||0);
    totalRev+=_evRev;
    realisedProfit+=e.profit||0;
    if(e.isReturned){
      returnedCount++;
    } else {
      soldCount++;
      if(e.roi!==null){roiSum+=e.roi;roiCount++;}
      if(e.daysToSell!==null){daysSum+=e.daysToSell;daysCount++;}
    }
  });
  // Refund rate: returns whose original sale month (dateSoldAtReturn fallback,
  // Refund counting — per item, attributed to the ORIGINAL sale month using
  // the _dateSoldAtReturn snapshot (with i.dateSold fallback). Matches the
  // single-pass convention used in calcYearlyStats / showReturnedItems.
  //   fullRefundCount  — items in m with at least one full return
  //   partialOnlyCount — items in m with partial refund(s) and no full return
  let fullRefundCount=0,partialOnlyCount=0;
  allDBKeys().forEach(function(k){
    (DB[k]||[]).forEach(function(i){
      const rh=i.returnHistory||[];
      if(rh.length===0)return;
      const fullEntry=rh.find(r=>r.type==='full_seller'||r.type==='full_ebay');
      const partialEntry=rh.find(r=>r.type==='partial_seller'||r.type==='partial_ebay');
      const saleDate=(fullEntry&&fullEntry._dateSoldAtReturn)
                   ||(partialEntry&&partialEntry._dateSoldAtReturn)
                   ||i.dateSold||null;
      if(_monthKeyFromDate(saleDate)!==m)return;
      if(fullEntry)fullRefundCount++;
      else if(partialEntry)partialOnlyCount++;
    });
  });
  const refundedItemCount=fullRefundCount+partialOnlyCount;
  // Denom = net sold + full returns = "items sold in this month" (partials
  // are inside soldCount because they did not flip isReturned).
  const refundDenom=soldCount+fullRefundCount;
  const refundItemRate=refundDenom>0?(refundedItemCount/refundDenom*100):0;
  // Legacy aliases kept for any callers reading the old field names.
  const refundCount=fullRefundCount;
  const partialCount=partialOnlyCount;
  const avgROI=roiCount>0?(roiSum/roiCount):null;
  const avgDays=daysCount>0?Math.round(daysSum/daysCount):null;
  return {totalRev:+totalRev.toFixed(2),realisedProfit:+realisedProfit.toFixed(2),
          soldCount,eventCount,returnedCount,avgROI,avgDays,
          fullRefundCount,partialOnlyCount,refundedItemCount,refundDenom,refundItemRate,
          refundCount,partialCount,  // legacy aliases
          // Active stock for this listing month (kept so the grid card can show
          // "X sold · Y active" without a second call):
          listedCount:(DB[m]||[]).filter(function(i){return !i.dateSold&&!i.isReturned&&!i.resaleSalePrice&&((i.item||'').trim().toUpperCase()!=='MONTH END');}).length};
}

// eBay UK BPF: iterative solve matches spreadsheet values exactly
// Pure number→number primitive. DO NOT change — financial rule.
function calcEbayBPF(salePrice){
  if(!salePrice||salePrice<=0)return 0;
  function feeOnNet(net){
    let f=0.10;
    f+=0.07*Math.min(net,20);
    if(net>20)f+=0.04*Math.min(net-20,280);
    if(net>300)f+=0.02*Math.min(net-300,3700);
    return f;
  }
  let net=salePrice;
  for(let j=0;j<10;j++)net=salePrice-feeOnNet(net);
  return+feeOnNet(net).toFixed(2);
}

// ─────────────────────────────────────────────────────────────────────────────
// Platform fee stubs (Session D1 — Lean scope)
// Each takes (item, salePrice) and returns the platform's selling fee.
// Currently all non-eBay stubs delegate to calcEbayBPF as a safe placeholder
// until each platform's real fee structure is researched against actual sales.
// Replacing a stub with a real formula is a one-function change; the dispatcher
// and all callers continue to work unchanged.
// ─────────────────────────────────────────────────────────────────────────────
function calcVintedBPF(item,salePrice){
  // TODO: implement Vinted fee model when first real Vinted sale is logged.
  // Note: Vinted's "Buyer Protection Fee" is buyer-paid; seller fee is largely
  // £0 today, but verify against an actual settlement before shipping.
  return calcEbayBPF(salePrice);
}
function calcDepopBPF(item,salePrice){
  // TODO: implement Depop fee model when first real Depop sale is logged.
  // Historical reference: 10% selling fee + payment processing — verify current.
  return calcEbayBPF(salePrice);
}
function calcFbBPF(item,salePrice){
  // TODO: implement FB Marketplace fee model. Local pickup typically £0;
  // FB Shipping has its own fee schedule — verify against real settlement.
  return calcEbayBPF(salePrice);
}
function calcAmazonUKBPF(item,salePrice){
  // TODO: implement Amazon UK (used) referral fees — category-dependent.
  return calcEbayBPF(salePrice);
}

// Dispatcher: routes to the right platform fee primitive based on the item.
// All NEW code paths should use this. Existing calcEbayBPF callers remain
// valid (they operate on items that resolve to eBay either explicitly or by
// fallback), so this is additive — not a breaking refactor.
function calcPlatformBPF(item,salePrice){
  const p=_itemPlatform(item);
  switch(p){
    case 'ebay':      return calcEbayBPF(salePrice);
    case 'vinted':    return calcVintedBPF(item,salePrice);
    case 'depop':     return calcDepopBPF(item,salePrice);
    case 'fb':        return calcFbBPF(item,salePrice);
    case 'amazon_uk': return calcAmazonUKBPF(item,salePrice);
    default:          return calcEbayBPF(salePrice);
  }
}

function calcPartsCost(i){
  return (i.parts||[]).reduce(function(s,p){return s+(p.cost||0);},0);
}
// Revenue for an item — reflects cash actually kept, not gross flow:
//   Fully returned, not yet relisted    → 0      (sale reversed, money went back)
//   Fully returned, relisted, no resale → 0      (original sale reversed, sale 2 hasn't happened)
//   Returned then resold                → resaleSalePrice only (original sale doesn't count)
//   Partial refund (any type)           → salePrice gross (partial doesn't reverse the sale)
//   Normal sold                         → salePrice
// Profit is calculated separately via calcGrossProfit which handles all fee/cost logic.
function calcItemRevenue(i){
  if(!i.salePrice)return 0;
  // Returned and not yet resold — revenue = 0
  if(i.isReturned)return 0;
  // Returned then resold — only the resale price counts as revenue
  const _hadFullReturn=(i.returnHistory||[]).some(r=>r.type==='full_seller'||r.type==='full_ebay');
  const _wasReturnedThenResold=i.resaleSalePrice&&_hadFullReturn;
  if(_wasReturnedThenResold)return+(i.resaleSalePrice||0).toFixed(2);
  // BUGFIX (Session E1): fully-returned-then-relisted-but-not-yet-resold —
  // original sale was reversed; sale 2 hasn't happened. Revenue = 0.
  if(_hadFullReturn&&!i.resaleSalePrice)return 0;
  // Normal sold (including partial refunds — partial doesn't reverse the sale)
  return+((i.salePrice||0)+(i.resaleSalePrice||0)).toFixed(2);
}
function calcGrossProfit(i){
  if(!i.salePrice)return null;
  // Partial refund handling for fees:
  //   partial_seller (seller agreed): eBay refunds the fee difference — recalc BPF/promo on net sale price
  //   partial_ebay (eBay stepped in): eBay keeps the original fee — BPF/promo stay on full sale price
  //   Full returns are handled separately below (fee fully refunded on relist path)
  const partialSellerRefund=(i.returnHistory||[]).filter(r=>r.type==='partial_seller')
    .reduce((s,r)=>s+(r.refundAmount||0),0);
  const effectiveSaleForFees=Math.max(0,i.salePrice-partialSellerRefund);
  const bpf=calcEbayBPF(effectiveSaleForFees);
  const grossInc=effectiveSaleForFees-bpf;
  const promoCost=grossInc*(i.promoPercent||0)*1.20;
  // Determine if this item has been relisted after a full return
  // (isReturned=false but returnHistory has a full return entry, and no dateSold / resaleSalePrice)
  // Full returns only: eBay refunds BPF back to seller (transaction fully reversed)
  // Partial returns: fee treatment depends on refund type (see above)
  const _wasRelisted = !i.isReturned && !i.dateSold && !i.resaleSalePrice &&
    (i.returnHistory||[]).some(r=>r.type==='full_seller'||r.type==='full_ebay');
  // Revenue = net sale after BPF + postage − partial-seller refunds (fees already
  // recalculated on reduced base above, so only subtract the refund principal).
  // Partial-ebay refunds still count as cost (seller eats the refund AND the fee).
  const partialEbayRefund=(i.returnHistory||[]).filter(r=>r.type==='partial_ebay')
    .reduce((s,r)=>s+(r.refundAmount||0),0);
  const rev=_wasRelisted ? 0 : effectiveSaleForFees+(i.postage||0)-bpf-partialEbayRefund;
  const returnCost=(i.returnHistory||[]).reduce(function(s,r){
    const fullReturn=(r.type==='full_seller'||r.type==='full_ebay');
    if(fullReturn){
      if(_wasRelisted){
        // Sale 1 revenue already excluded (dateSold cleared on return).
        // Only the return postage is a real additional cost here.
        return s+(r.returnPostage||0);
      }
      // Standard path: item is returned and not yet relisted — charge refund net of BPF refund
      const origSalePrice=r._salePriceAtReturn||r.refundAmount||i.salePrice||0;
      const origBPF=calcEbayBPF(origSalePrice);
      const netRefund=Math.max(0,(r.refundAmount||0)-origBPF);
      return s+netRefund+(r.returnPostage||0);
    }
    // Partial refunds: refund principal handled via revenue adjustment above.
    // Only charge return postage here (refund amount itself is already netted out).
    return s+(r.returnPostage||0);
  },0);
  const partsCost=calcPartsCost(i);
  const cost=(i.costPrice||0)+(i.shippingCost||0)+(i.packagingCost||0)+promoCost+returnCost+partsCost;
  let profit=rev-cost;
  // Second sale (resold after return)
  if(i.resaleSalePrice){
    const rBPF=calcEbayBPF(i.resaleSalePrice);
    const rGrossInc=i.resaleSalePrice-rBPF;
    const rPromoCost=rGrossInc*(i.resalePromoPercent||0)*1.20;
    const rRev=i.resaleSalePrice-rBPF-(i.resaleShippingCost||0)-rPromoCost;
    profit+=rRev;
  }
  return+profit.toFixed(2);
}

function calcROI(i){
  if(!i.dateSold&&!i.isReturned&&!i.resaleSalePrice)return null;
  // ROI denominator = capital actually outlaid to acquire and prep the item.
  // eBay fees (BPF) and promo fees are deductions from revenue, not investments —
  // they do not belong in the denominator. This keeps ROI honest:
  //   e.g. £15 cost → £39 net profit = 260% ROI (not 135%).
  let totalInvested=(i.costPrice||0)+(i.shippingCost||0)+(i.packagingCost||0)+calcPartsCost(i);
  // For resold items: add resale shipping/packaging (real outlay on the second go).
  if(i.resaleSalePrice){
    totalInvested+=(i.resaleShippingCost||0)+(i.resalePackagingCost||0);
  }
  if(totalInvested<=0)return null;
  return+((calcGrossProfit(i)/totalInvested)*100).toFixed(1);
}

function daysBetween(d1,d2){
  const a=new Date(d1);
  const b=new Date(d2);
  const diff=Math.abs(b-a);
  return Math.floor(diff/(1000*60*60*24));
}

// Returns the average days-to-sell for an item, accounting for return+relist cycles.
// For a simple sale: days from dateListed to dateSold.
// For a resold item: average of (sale1 days) and (sale2 days).
//   sale1 days = dateListed → first returnHistory loggedAt (proxy for original sale date)
//   sale2 days = _relistedAt → resaleDateSold
// Returns null if the item hasn't sold or lacks the required dates.
function calcDaysToSell(i){
  const hasResale=!!i.resaleSalePrice&&!!i.resaleDateSold;
  const fullReturn=(i.returnHistory||[]).find(r=>r.type==='full_seller'||r.type==='full_ebay');

  if(hasResale&&fullReturn){
    // Two-sale lifecycle
    const sale1Date=fullReturn.loggedAt||i.dateSold||null; // date of original sale (return date ≈ sale date)
    const relistDate=fullReturn._relistedAt||null;
    const sale2Date=i.resaleDateSold;
    let total=0,count=0;
    if(i.dateListed&&sale1Date){total+=daysBetween(i.dateListed,sale1Date);count++;}
    if(relistDate&&sale2Date){total+=daysBetween(relistDate,sale2Date);count++;}
    return count>0?Math.round(total/count):null;
  }

  // Standard single sale
  if(i.dateSold&&i.dateListed)return daysBetween(i.dateListed,i.dateSold);
  return null;
}

  function _hide(){var b=_bnav();if(!b||_navHidden)return;b.classList.add('nav-hidden');_navHidden=true;}

  window.addEventListener('scroll',function(){
    if(_raf)return;
    _raf=requestAnimationFrame(function(){
      _raf=null;
      var b=_bnav();
      if(!b||b.style.display!=='flex')return;
      var y=window.scrollY||window.pageYOffset||0;
      var diff=y-_lastScrollY;
      // Always show when near top
      if(y<10){_show();_lastScrollY=y;return;}
      // Hide on downward scroll, show on upward
      if(diff>8){_hide();}
      else if(diff<-8){_show();}
      _lastScrollY=y;
    });
  },{passive:true});

  // Reset on tab switch (goToTab calls window.scrollTo(0,0))
  window.addEventListener('scrollend',function(){
    if((window.scrollY||0)<10)_show();
  },{passive:true});
})();

function _recalcRelist(currentPL,salePrice,bpf,shipping,packaging,postage){
  const promoInput=parseFloat(document.getElementById('rl-promo-input').value)||0;
  const grossInc=salePrice-bpf;
  const promoCost=grossInc*(promoInput/100)*1.20;
  const rev=salePrice+postage-bpf;
  const cost=shipping+packaging+promoCost;
  const rlProfit=+(rev-cost).toFixed(2);
  const combinedP=+(currentPL+rlProfit).toFixed(2);
  const promoEl=document.getElementById('rl-promo-cost');
  const profitEl=document.getElementById('rl-profit');
  const lifetimeEl=document.getElementById('rl-lifetime');
  if(promoEl)promoEl.textContent='−'+fmt(promoCost);
  if(profitEl){profitEl.textContent=fmt(rlProfit);profitEl.style.color=rlProfit>=0?'var(--green)':'var(--red)';}
  if(lifetimeEl){lifetimeEl.textContent=fmt(combinedP);lifetimeEl.style.color=combinedP>=0?'var(--green)':'var(--red)';}
}

function fmt(n){
  if(n===null||n===undefined)return'£0.00';
  return'£'+Number(n).toFixed(2);
}

function fmtDate(ds){
  if(!ds)return'—';
  const d=new Date(ds+'T12:00:00');
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}

function esc(s){
  if(!s)return'';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className=type==='err'?'on err':'on';
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('on','err'),3000);
}




// ── Inline field saves on item full page ─────────────────────────────────────
function ipSave(m,id,field,val){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i)return;
  i[field]=val;
  // Recalc profit when sale date changes
  if(field==='dateSold'){
    if(val){i.grossProfit=calcGrossProfit(i);}
    else{i.grossProfit=null;}
  }
  saveDB();
  // Re-render item page for fields that affect the P&L display
  if(field==='dateSold'||field==='dateListed'){
    const pg=document.querySelector('.page.on');
    if(pg&&pg.id==='p-item')renderItemPage(m,id);
  }
}
function ipSaveNum(m,id,field,val){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i)return;
  i[field]=parseFloat(val)||0;
  if(i.dateSold||i.isReturned||i.resaleSalePrice)i.grossProfit=calcGrossProfit(i);
  saveDB();
  const s=_getSecStates();renderItemPage(m,id);_applySecStates(s);
}

function startTitleEdit(m,id){
  const titleEl=document.querySelector('.ip-title');
  if(!titleEl||titleEl.classList.contains('editing'))return;
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i)return;
  const inp=document.createElement('input');
  inp.className='ip-title-input';
  inp.value=i.item||'';
  titleEl.replaceWith(inp);
  inp.focus();inp.select();
  let committed=false;
  function commit(save){
    if(committed)return;
    committed=true;
    if(save){const val=inp.value.trim();if(val){i.item=val;saveDB();}}
    const s=_getSecStates();renderItemPage(m,id);_applySecStates(s);
  }
  inp.addEventListener('keydown',function(e){
    if(e.key==='Enter'){e.preventDefault();commit(true);}
    if(e.key==='Escape'){commit(false);}
  });
  inp.addEventListener('blur',function(){commit(true);});
}

// ── Inline editing on item full page ─────────────────────────────────────────
function startInlineEdit(m,id,field,currentVal){
  const el=document.getElementById('ip-'+{'salePrice':'sale','costPrice':'cost'}[field]+'-'+id);
  if(!el||el.querySelector('input'))return; // already editing
  const input=document.createElement('input');
  input.type='number';
  input.step='0.01';
  input.value=currentVal||0;
  input.className='inline-input';
  el.innerHTML='';
  el.appendChild(input);
  input.focus();
  input.select();
  function commit(){
    const newVal=parseFloat(input.value)||0;
    const i=(DB[m]||[]).find(x=>x.id===id);
    if(i){
      i[field]=newVal;
      if(i.dateSold)i.grossProfit=calcGrossProfit(i);
      saveDB();
      toast(field==='salePrice'?'Price updated':'Cost updated');
    }
    renderItemPage(m,id);
  }
  input.addEventListener('keydown',function(e){
    if(e.key==='Enter'){e.preventDefault();commit();}
    if(e.key==='Escape'){renderItemPage(m,id);}
  });
  input.addEventListener('blur',commit);
}

// ── Parts / item expenses ─────────────────────────────────────────────────────
function partsHTML(m,id,context){
  // context: 'panel' or 'page' — affects button onclick targets
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i)return'';
  const parts=i.parts||[];
  const total=calcPartsCost(i);
  const today=new Date().toISOString().split('T')[0];

  const rows=parts.map(function(p,idx){
    const delFn=context==='page'
      ?'deletePart(\''+m+'\',\''+id+'\','+idx+')'
      :'deletePart(\''+m+'\',\''+id+'\','+idx+',\'panel\')';
    return'<div class="part-row">'
      +'<span class="part-desc">'+esc(p.description)+'</span>'
      +(p.date?'<span class="part-date">'+p.date+'</span>':'')
      +'<span class="part-cost">−'+fmt(p.cost)+'</span>'
      +'<button class="part-del" onclick="event.stopPropagation();'+delFn+'" title="Remove">×</button>'
      +'</div>';
  }).join('');

  const totalRow=parts.length>0
    ?'<div class="parts-total"><span>Parts total</span><span style="color:var(--red)">−'+fmt(total)+'</span></div>'
    :'';

  const addFn=context==='page'
    ?'addPart(\''+m+'\',\''+id+'\',\'page\')'
    :'addPart(\''+m+'\',\''+id+'\',\'panel\')';

  const addForm='<div class="add-part-row">'
    +'<div class="fg" style="margin-bottom:0"><input type="text" id="part-desc-'+context+'" placeholder="e.g. Charging cable, battery…"></div>'
    +'<div class="fg" style="margin-bottom:0"><input type="number" id="part-cost-'+context+'" step="0.01" placeholder="£0.00" style="width:90px"></div>'
    +'<button class="btn btn-s" style="padding:9px 12px;font-size:13px" onclick="'+addFn+'">+ Add</button>'
    +'</div>';

  return'<div class="parts-list">'+rows+totalRow+'</div>'+addForm;
}

function addPart(m,id,context){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i)return;
  const desc=document.getElementById('part-desc-'+context);
  const cost=document.getElementById('part-cost-'+context);
  if(!desc||!cost||!desc.value.trim())return;
  if(!i.parts)i.parts=[];
  i.parts.push({
    description:desc.value.trim(),
    cost:parseFloat(cost.value)||0,
    date:new Date().toISOString().split('T')[0]
  });
  saveDB();
  toast('Part added');
  if(context==='page'){renderItemPage(m,id);}
  else{refreshPanelParts(m,id);}
}

function deletePart(m,id,idx,context){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i||!i.parts)return;
  i.parts.splice(idx,1);
  saveDB();
  toast('Part removed');
  if(context==='panel'){refreshPanelParts(m,id);}
  else{renderItemPage(m,id);}
}

function refreshPanelParts(m,id){
  const el=document.getElementById('panel-parts-'+id);
  if(el)el.innerHTML=partsHTML(m,id,'panel');
}

// ── BOOT: auth-gated ─────────────────────────────────────────────────────────
// Show auth overlay while we check session. If already signed in, boot straight
// into the app. If not, show the sign-in form.

(async function boot(){
  const overlay = document.getElementById('auth-overlay');



  function showApp(){
    overlay.style.display = 'none';
    // Top nav — desktop only; bottom nav — mobile only
    if(window.innerWidth > 600){
      document.getElementById('nav').style.display = '';
      document.getElementById('bottom-nav').style.display = 'none';
    } else {
      document.getElementById('nav').style.display = 'none';
      document.getElementById('bottom-nav').style.display = 'flex';
    }
    document.getElementById('main-content').style.display = '';
    document.getElementById('fab').style.display = '';
    // Sync theme label on show
    const _t = document.documentElement.getAttribute('data-theme')||'light';
    const _ul = document.getElementById('user-menu-theme-label');
    if(_ul) _ul.textContent = _t==='dark'?'Light mode':'Dark mode';
  }

  function showLogin(){
    document.getElementById('nav').style.display = 'none';
    document.getElementById('bottom-nav').style.display = 'none';
    document.getElementById('main-content').style.display = 'none';
    const fab = document.getElementById('fab');
    if(fab) fab.style.display = 'none';
    overlay.style.display = 'flex';
    // Always reset sign-in button — it may be hidden from a previous successful
    // sign-in (doSignIn hides it but never restores on success path)
    const authBtn = document.getElementById('auth-btn');
    const authLd  = document.getElementById('auth-loading');
    const authErr = document.getElementById('auth-error');
    if(authBtn) authBtn.style.display = 'block';
    if(authLd)  authLd.style.display  = 'none';
    if(authErr) authErr.style.display = 'none';
  }

  // Check session directly — avoids onAuthStateChange deadlock
  let session = null;
  try{
    const {data} = await Promise.race([
      _sb.auth.getSession(),
      new Promise((_,reject) => setTimeout(() => reject(new Error('timeout')), 5000))
    ]);
    session = data?.session || null;
  }catch(e){
    console.warn('Session check failed:', e.message);
  }

  // Flag set BEFORE await so onAuthStateChange SIGNED_IN (which fires almost
  // immediately on page load) never triggers a second concurrent initDB call.
  let _initialLoadDone = !!session;

  if(session){
    disablePreviewMode();
    _currentUserId = session.user.id;
    showApp();
    // Set avatar initial
    const _av=document.getElementById('user-avatar');
    if(_av && session.user?.email) _av.textContent=session.user.email[0].toUpperCase();
    await initDB();
    _dbSnapshot = _dbFingerprint();
  } else if(PREVIEW_MODE_ENABLED){
    enablePreviewMode();
    showApp();
    const _av=document.getElementById('user-avatar');
    if(_av) _av.textContent='P';
    requestAnimationFrame(()=>goToTab('summary'));
  } else {
    showLogin();
  }

  // Listen for auth state changes
  _sb.auth.onAuthStateChange(async (event, sess) => {
    if(_previewMode && event !== 'SIGNED_IN') return;
    if(event === 'SIGNED_IN' && sess){
      _currentUserId = sess.user.id;
      showApp();
      // Set avatar initial from email
      const _av=document.getElementById('user-avatar');
      if(_av && sess.user?.email) _av.textContent=sess.user.email[0].toUpperCase();
      if(!_initialLoadDone){
        _initialLoadDone = true;
        await initDB();
        _dbSnapshot = _dbFingerprint();
      }
      // else: page-load SIGNED_IN echo — already loaded, do nothing
    } else if(event === 'TOKEN_REFRESHED' && sess){
      // Silent token refresh — just update userId, no reload needed
      _currentUserId = sess.user.id;
    } else if(event === 'SIGNED_OUT' || (!sess && event !== 'INITIAL_SESSION')){
      clearTimeout(_saveTimer);
      _saveTimer = null;
      _initialLoadDone = false;
      _currentUserId = null;
      DB = {};
      _dbSnapshot = {};
      showLogin();
    }
  });

  // Re-check session when tab becomes visible again (phone wake, tab switch)
  // If token expired while backgrounded, boot to login immediately
  document.addEventListener('visibilitychange', async () => {
    if(_previewMode) return;
    if(document.visibilityState !== 'visible') return;
    if(!_currentUserId) return; // already on login screen
    try{
      const {data, error} = await _sb.auth.getSession();
      if(error || !data.session){
        // Session gone — try one silent refresh before giving up
        const {data:rd, error:re} = await _sb.auth.refreshSession();
        if(re || !rd.session){
          toast('Session expired — please sign in again', 'err');
          _currentUserId = null;
          DB = {};
          _dbSnapshot = {};
          _initialLoadDone = false;
          await _sb.auth.signOut();
          showLogin();
        }
      }
    }catch(e){
      console.warn('Visibility session check failed:', e.message);
    }
  });
})();

      items.push({
        id:i.id, gid:i.gid||null, month:k,
        item:i.item||'', category:i.category||null, location:i.location||null, source:i.source||null,
        date_listed:i.dateListed||null, date_sold:i.dateSold||null,

        shipping_cost:i.shippingCost||0, packaging_cost:i.packagingCost||0,
        promo_percent:i.promoPercent||0, notes:i.notes||null,
        is_returned:!!i.isReturned,
        postage_mode:i._postageMode||'simple', sd_rate_idx:i._sdRateIdx!=null?i._sdRateIdx:1, sd_buyer_pays:i._sdBuyerPays===true,
        resale_sale_price:i.resaleSalePrice||null, resale_date_sold:i.resaleDateSold||null,
        resale_shipping_cost:i.resaleShippingCost||null, resale_promo_percent:i.resalePromoPercent||null,
        gross_profit:i.grossProfit||null
      });
      (i.parts||[]).forEach(function(p,pi){
        parts.push({item_id:i.id,description:p.desc||p.description||'',cost:p.cost||0});
      });
      (i.returnHistory||[]).forEach(function(r){
        returns.push({
          item_id:i.id, logged_at:r.loggedAt||null, type:r.type||null,
          refund_amount:r.refundAmount||0, return_postage:r.returnPostage||0,
          notes:r.notes||null, relisted_at:r._relistedAt||null, relist_condition:r._relistCondition||null
        });
      });
    });
  });
  const trips=(DB.trips||[]).map(function(t){return{id:t.id||String(Date.now()),date:t.date,description:t.description||'',mileage:t.mileage||0,rate_per_mile:t.ratePerMile||0.45};});
  const expenses=(DB.expenses||[]).map(function(e){return{id:e.id||String(Date.now()),date:e.date,description:e.description||'',amount:e.amount||0,category:e.category||null};});
  const out={items,item_parts:parts,item_returns:returns,trips,expenses};
  console.log('=== SUPABASE EXPORT ===');
  console.log(JSON.stringify(out,null,2));
  console.log('Items:',items.length,'Parts:',parts.length,'Returns:',returns.length,'Trips:',trips.length,'Expenses:',expenses.length);
  return out;
}

// ── Password manager suppression sweep ────────────────────────────────────
// Stamps every non-auth input with autocomplete=off + vendor suppression
// attributes so password managers (Chrome, Safari, LastPass, 1Password etc.)
// never trigger on app inputs. Auth inputs (auth-email, auth-pass, reset-email)
// keep their correct autocomplete values and are excluded.
const _AUTH_INPUT_IDS = new Set(['auth-email','auth-pass','auth-pass-confirm','reset-email']);
function _suppressPasswordManagers(root){
  root = root || document;
  const inputs = root.querySelectorAll('input:not([type=checkbox]):not([type=radio]):not([type=hidden]):not([type=submit]):not([type=button]):not([type=file])');
  inputs.forEach(function(el){
    if(_AUTH_INPUT_IDS.has(el.id)) return; // leave auth inputs alone
    if(el.getAttribute('autocomplete')==='off') return; // already done
    el.setAttribute('autocomplete','off');
    el.setAttribute('autocorrect','off');
    el.setAttribute('autocapitalize','off');
    el.setAttribute('spellcheck','false');
    el.setAttribute('data-lpignore','true');   // LastPass
    el.setAttribute('data-form-type','other'); // 1Password
  });
}
// Run on load for static inputs
window.addEventListener('load', function(){ _suppressPasswordManagers(); });
// Re-run whenever panel content is injected (covers Quick Add, Relist, Item Page etc.)
(function(){
  function _observe(id,subtree){
    const el=document.getElementById(id);
    if(!el)return;
    const obs=new MutationObserver(function(){ _suppressPasswordManagers(el); });
    obs.observe(el,{childList:true,subtree:!!subtree});
  }
  _observe('panel-content',false); // slide-panel: Quick Add, Relist, return form, edit form
  _observe('p-item',true);         // full-page item view: ip-field inputs (nested)
})();
</script>
