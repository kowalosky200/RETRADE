// ─── D1.6 — Country scaffolding + platform pricing patterns ───────────────────
// COUNTRY drives which country's fee rules apply. Today: hard-coded UK.
// Future: stored in user profile, changed via Settings, drives different fee
// formulas (e.g. eBay UK BPF differs from eBay US final value fee schedule).
//
// Each platform also declares a PRICING PATTERN that drives form UI:
//   'buyer_pays'      → seller enters what the BUYER PAYS; fees come out of
//                       that number. Example: eBay UK private (BPF embedded).
//   'seller_receives' → seller enters what THEY RECEIVE; buyer pays extra
//                       (BPF + postage label) on top. Example: Vinted.
//   'listed_plus_fee' → seller enters the LISTED PRICE; platform takes a %
//                       seller fee out of that. Example: Depop, Amazon.

const PLATFORMS={
  ebay:      { id:'ebay',      label:'eBay UK',              short:'eBay',   live:true,  pattern:'buyer_pays',      country:'uk' },
  vinted:    { id:'vinted',    label:'Vinted',               short:'Vinted', live:false, pattern:'seller_receives', country:'uk' },
  depop:     { id:'depop',     label:'Depop',                short:'Depop',  live:false, pattern:'listed_plus_fee', country:'uk' },
  fb:        { id:'fb',        label:'Facebook Marketplace', short:'FB',     live:false, pattern:'seller_receives', country:'uk' },
  amazon_uk: { id:'amazon_uk', label:'Amazon UK (used)',     short:'Amazon', live:false, pattern:'listed_plus_fee', country:'uk' }
};
const DEFAULT_PLATFORM='ebay';

// Source of truth: which platform's fee formula applies to this item right now.
// Sold/returned items use soldOnPlatform if set (D2 will set it); otherwise
// fall back to defaultPlatform; otherwise eBay (back-compat for pre-D1 data).
function _itemPlatform(i){
  if(!i)return DEFAULT_PLATFORM;
  if(i.soldOnPlatform&&PLATFORMS[i.soldOnPlatform])return i.soldOnPlatform;
  if(i.defaultPlatform&&PLATFORMS[i.defaultPlatform])return i.defaultPlatform;
  return DEFAULT_PLATFORM;
}

// Session D1.5 — Platform-aware fee label for the BPF preview block.
// Returns the short fee name (e.g. "BPF" for eBay, "Vinted fee" for Vinted)
// and the buyer-facing pricing language (e.g. "Buyer pays" vs "Listed at")
// so the preview header can adapt without rewriting the layout per platform.
function _platformFeeLabel(i){
  const p=_itemPlatform(i);
  switch(p){
    case 'ebay':      return { feeLabel:'BPF',         priceLabel:'Buyer pays' };
    case 'vinted':    return { feeLabel:'Vinted fee',  priceLabel:'You set'    };
    case 'depop':     return { feeLabel:'Depop fee',   priceLabel:'Listed at'  };
    case 'fb':        return { feeLabel:'FB fee',      priceLabel:'You set'    };
    case 'amazon_uk': return { feeLabel:'Amazon fee',  priceLabel:'Listed at'  };
    default:          return { feeLabel:'Fee',         priceLabel:'Sale price' };
  }
}

// Session D1.6 — Pricing pattern for an item's platform. Drives form UI:
// which input label to show, what the BPF preview says, and how submit
// validation should behave. Returns one of 'buyer_pays' / 'seller_receives' /
// 'listed_plus_fee'. Falls back to 'buyer_pays' for unknown platforms.
function _platformPattern(i){
  const p=PLATFORMS[_itemPlatform(i)];
  return p&&p.pattern?p.pattern:'buyer_pays';
}

// Session D1.6 — Pricing copy block driven by pattern. Used by the price
// input label and the BPF preview to keep wording consistent across the form.
// Each pattern returns:
//   inputLabel     → label for the price input (e.g. "Sale Price (£)")
//   inputHelper    → small hint shown under the input (or empty)
//   feeNoun        → the fee's user-facing name ("BPF", "Vinted fee", etc.)
//   priceLabel     → preview "what's this number" text ("Buyer pays")
//   feeBearer      → who actually pays the fee: 'seller' | 'buyer' | 'split'
function _platformPricingCopy(i){
  const p=_itemPlatform(i);
  const pattern=_platformPattern(i);
  const fee=_platformFeeLabel(i);
  switch(pattern){
    case 'seller_receives':
      // Vinted/FB pattern — buyer pays extra on top, seller receives the listed
      // amount in full. Vinted's BPF is BUYER-paid (not deducted from seller).
      return {
        inputLabel:'Your Asking Price (£)',
        inputHelper: p==='vinted'
          ? 'Buyer pays this + Vinted Buyer Protection on top'
          : 'Buyer pays this; no platform fee deducted',
        feeNoun:fee.feeLabel,
        priceLabel:'You receive',
        feeBearer:'buyer'
      };
    case 'listed_plus_fee':
      // Depop/Amazon — seller fee comes out of the listed price.
      return {
        inputLabel:'Listed Price (£)',
        inputHelper: p==='depop'
          ? 'Depop takes 10% + payment processing'
          : 'Amazon takes a referral fee + closing fee',
        feeNoun:fee.feeLabel,
        priceLabel:'Listed at',
        feeBearer:'seller'
      };
    case 'buyer_pays':
    default:
      // eBay UK private — buyer-pays is the listed price, BPF is embedded.
      return {
        inputLabel:'Sale Price (£)',
        inputHelper:'',
        feeNoun:fee.feeLabel,
        priceLabel:'Buyer pays',
        feeBearer:'buyer'
      };
  }
}

function migrateLegacyLocalStorage(){
  try{
    if(!localStorage.getItem(STORAGE_KEY)){
      for(const key of LEGACY_STORAGE_KEYS){
        const legacy=localStorage.getItem(key);
        if(legacy){
          localStorage.setItem(STORAGE_KEY,legacy);
          break;
        }
      }
    }
    if(!localStorage.getItem(THEME_KEY)){
      for(const key of LEGACY_THEME_KEYS){
        const legacy=localStorage.getItem(key);
        if(legacy){
          localStorage.setItem(THEME_KEY,legacy);
          break;
        }
      }
    }
    const hasPreview = localStorage.getItem(PREVIEW_STORAGE_KEY) === '1';
    if(!hasPreview){
      for(const key of LEGACY_PREVIEW_STORAGE_KEYS){
        if(localStorage.getItem(key) === '1'){
          localStorage.setItem(PREVIEW_STORAGE_KEY,'1');
          break;
        }
      }
    }
  }catch(e){
    console.warn('Legacy storage migration skipped:', e);
  }
}

function enablePreviewMode(){
  _previewMode = true;
  _currentUserId = 'preview-user';
  localStorage.setItem(PREVIEW_STORAGE_KEY,'1');
  LEGACY_PREVIEW_STORAGE_KEYS.forEach(function(k){ if(k!==PREVIEW_STORAGE_KEY) localStorage.removeItem(k); });
  DB = _buildPreviewDB();
  _dbSnapshot = _dbFingerprint();
}

function disablePreviewMode(){
  _previewMode = false;
  localStorage.removeItem(PREVIEW_STORAGE_KEY);
  LEGACY_PREVIEW_STORAGE_KEYS.forEach(function(k){ if(k!==PREVIEW_STORAGE_KEY) localStorage.removeItem(k); });
}

function toggleAuthPass(){
  const input = document.getElementById('auth-pass');
  const svg   = document.getElementById('auth-pass-svg');
  if(input.type === 'password'){
    input.type    = 'text';
    svg.innerHTML = _EYE_SLASH; // now visible — show slash icon
  } else {
    input.type    = 'password';
    svg.innerHTML = _EYE_OPEN;  // now hidden — show open eye icon
  }
}

function startPreviewMode(){
  enablePreviewMode();
  try{
    const url = new URL(window.location.href);
    url.searchParams.set('preview','1');
    history.replaceState({}, '', url.toString());
  }catch(e){ /* sandboxed iframe — ignore */ }

async function doSignIn(){
  const email = document.getElementById('auth-email').value.trim();
  const pass  = document.getElementById('auth-pass').value;
  const errEl = document.getElementById('auth-error');
  const ldEl  = document.getElementById('auth-loading');
  const btn   = document.getElementById('auth-btn');
  errEl.style.display = 'none';
  btn.style.display = 'none';
  ldEl.style.display = 'block';
  const {error} = await _sb.auth.signInWithPassword({email, password: pass});
  if(error){
    // Translate Supabase error codes into plain English
    let msg = 'Sign in failed. Please try again.';
    const raw = (error.message||'').toLowerCase();
    if(raw.includes('invalid login') || raw.includes('invalid credentials') || raw.includes('email not confirmed')){
      msg = 'Incorrect email or password. Please check your details and try again.';
    } else if(raw.includes('email') && raw.includes('not found')){
      msg = 'No account found with that email address.';
    } else if(raw.includes('too many')){
      msg = 'Too many attempts. Please wait a moment and try again.';
    } else if(raw.includes('network') || raw.includes('fetch')){
      msg = 'Network error. Check your connection and try again.';
    }
    errEl.textContent = msg;
    errEl.style.display = 'block';
    btn.style.display = 'block';
    ldEl.style.display = 'none';
    return;
  }
  // onAuthStateChange will handle the rest
}

    try{

      url.searchParams.delete('preview');

  clearTimeout(_saveTimer);
  _saveTimer = null;
  _currentUserId = null;
  DB = {};

}

// ── SESSION / TOKEN REFRESH GUARD ───────────────────────────────────────────
// Call before any Supabase operation. Checks the current session and attempts
// a silent token refresh if it has expired.
async function _ensureSession(){
  try{
    const {data, error} = await _sb.auth.getSession();
    if(error || !data.session){
      // No active session — try a silent token refresh
      const {data:refreshData, error:refreshErr} = await _sb.auth.refreshSession();
      if(refreshErr || !refreshData.session){
        // Still nothing — return false but do NOT call signOut().
        // This path also runs before login exists, so we must never interfere.
        return false;
      }
    }
    return true;
  }catch(e){
    console.warn('_ensureSession error:', e.message);
    return false;
  }
}

// Wraps a Supabase call: checks auth, retries once after a refresh if a 401 comes back.
async function _sbCall(fn){
  const ok = await _ensureSession();
  if(!ok) return {error: new Error('Not authenticated')};
  try{
    const result = await fn();
    // Supabase returns {error} on auth failures — catch and retry once with a refresh
    if(result && result.error && (result.error.status===401 || result.error.message?.includes('JWT'))){
      const {data:refreshData, error:refreshErr} = await _sb.auth.refreshSession();
      if(refreshErr || !refreshData.session){
        // Token genuinely expired mid-session — now safe to sign out
        toast('Session expired — please sign in again','err');
        DB = {};
        _dbSnapshot = {};
        await _sb.auth.signOut();
        return result;
      }
      return await fn(); // retry once with fresh token
    }
    return result;
  }catch(e){
    return {error: e};
  }
}

// ── LOAD ALL DATA FROM SUPABASE → DB ────────────────────────────────────────

async function loadFromSupabase(){
  const ok = await _ensureSession();
  if(!ok) throw new Error('Not authenticated — please sign in again.');
  // Get current user id directly from session as belt-and-braces
  const {data:{session}} = await _sb.auth.getSession();
  if(!session) throw new Error('Session missing — please sign in again.');
  _currentUserId = session.user.id;
  const uid = _currentUserId;
  // Fetch all tables in parallel — explicit .eq('user_id') on every query as
  // belt-and-braces on top of RLS. Prevents NULL-user_id orphan rows or
  // misconfigured policies from bleeding into the loaded DB.
  const [itemsRes, partsRes, returnsRes, tripsRes, expensesRes] = await Promise.all([
    _sb.from('items').select('*').eq('user_id', uid).order('date_listed', {ascending: true}),
    _sb.from('item_parts').select('*').eq('user_id', uid),
    _sb.from('item_returns').select('*').eq('user_id', uid).order('logged_at', {ascending: true}),
    _sb.from('trips').select('*').eq('user_id', uid).order('date', {ascending: true}),
    _sb.from('expenses').select('*').eq('user_id', uid).order('date', {ascending: true}),
  ]);

  if(itemsRes.error) throw new Error('Items load failed: ' + itemsRes.error.message);

  // Index parts and returns by item_id for fast lookup
  const partsMap = {};
  (partsRes.data || []).forEach(p => {
    if(!partsMap[p.item_id]) partsMap[p.item_id] = [];
    partsMap[p.item_id].push(p);
  });
  const returnsMap = {};
  (returnsRes.data || []).forEach(r => {
    if(!returnsMap[r.item_id]) returnsMap[r.item_id] = [];
    returnsMap[r.item_id].push(r);
  });

  // Rebuild DB — rows grouped by their month key (may be bare 'APR' or year-suffixed 'APR-26')
  // _migrateBareDBKeys() will normalise bare keys to year-suffixed after load.
  (itemsRes.data || []).forEach(row => {
    const m = row.month;
    if(!DB[m]) DB[m] = [];
    DB[m].push(_rowToItem(row, partsMap[row.id], returnsMap[row.id]));
  });

  // trips / expenses stored flat on DB (same as localStorage shape)
  DB.trips = (tripsRes.data || []).map(t => ({
    id:          t.id,
    date:        t.date,
    description: t.description || '',
    mileage:     Number(t.mileage) || 0,
    ratePerMile: Number(t.rate_per_mile) || 0.45,
    // BUG-07: per-trip expenses (parking, entry fees, etc.). JSONB column on
    // Supabase trips table — defaults to [] if column absent / null on row.
    expenses:    Array.isArray(t.expenses) ? t.expenses : [],
  }));
  DB.expenses = (expensesRes.data || []).map(e => ({
    id:          e.id,
    date:        e.date,
    description: e.description || '',
    amount:      Number(e.amount) || 0,
    category:    e.category || null,
  }));
  DB._userOwned = true;
  // Guarantee all expected month arrays exist, even if user has no data yet.
  // Without this, DB[m].push(...) crashes for brand-new users.
  _ensureDBShape();
  // One-shot backfill for the _dateSoldAtReturn snapshot field. Existing return
  // entries pre-dating this column have it undefined; refund-rate attribution
  // falls back to i.dateSold for those, but full-returned items have dateSold
  // wiped — so without backfill, they leak out of period buckets entirely.
  // Idempotent: only writes when at least one entry was missing the field.
  await _backfillDateSoldAtReturn();
}

// ── BACKFILL: _dateSoldAtReturn ──────────────────────────────────────────────
// Fills the snapshot on legacy return entries created before the column existed.
// Strategy per item:
//   1. If r._dateSoldAtReturn already set → skip
//   2. Else if i.dateSold present → use that (most cases)
//   3. Else (full return wiped dateSold) → use the FULL return's loggedAt as
//      last-resort approximation. The original sale was at-or-before the return
//      logged date; for backdating purposes loggedAt is the best available proxy.
// Only persists if something changed, so subsequent loads are zero-write.
async function _backfillDateSoldAtReturn(){
  // One-shot guard: once every return entry in this account has _dateSoldAtReturn
  // set, we write a localStorage flag so subsequent loads skip the scan entirely.
  // Key is user-agnostic (preview mode also benefits) — safe to share per-browser.
  const _BACKFILL_KEY='retrade_backfill_dsar_v1';
  if(localStorage.getItem(_BACKFILL_KEY)==='1')return;
  let dirty=0;
  allDBKeys().forEach(function(k){
    if(k==='trips'||k==='expenses'||k==='_userOwned'||k==='_taxYear')return;
    (DB[k]||[]).forEach(function(i){
      const rh=i.returnHistory||[];
      if(rh.length===0)return;
      const fullEntry=rh.find(r=>r.type==='full_seller'||r.type==='full_ebay');
      const fallbackForFullReturn=fullEntry?(fullEntry.loggedAt||null):null;
      rh.forEach(function(r){
        if(r._dateSoldAtReturn)return; // already set, skip
        const filled=i.dateSold||fallbackForFullReturn||null;
        if(filled){
          r._dateSoldAtReturn=filled;
          dirty++;
        }
      });
    });
  });
  if(dirty>0){
    console.log('[backfill] Filled _dateSoldAtReturn on '+dirty+' return entries');
    try{
      // Re-save every item that has returnHistory so the column gets pushed up
      // for ALL of them in a single sync. saveDB's debounced diff engine will
      // batch this into one Supabase round trip.
      await saveDB();
    }catch(e){
      console.warn('[backfill] save failed — values are correct in memory but not persisted:',e);
    }
  }
  // Mark done regardless of whether anything was filled — if dirty=0 it means
  // all entries were already set, so future loads can skip immediately.
  try{ localStorage.setItem(_BACKFILL_KEY,'1'); }catch(e){}
}

// ── SAVE ITEM TO SUPABASE ────────────────────────────────────────────────────
// Upserts the item row, then replaces its parts and returns in full.

async function saveItemToSupabase(m, i){
  const row = _itemToRow(i, m);

  // Upsert main item row — conflict on (id, user_id) so two users with the
  // same item ID never overwrite each other
  const {error: itemErr} = await _sbCall(()=>_sb.from('items').upsert(row, {onConflict: 'id,user_id'}));
  if(itemErr) throw new Error('Save item failed: ' + itemErr.message);

  // Replace parts: delete old, insert new
  await _sbCall(()=>_sb.from('item_parts').delete().eq('item_id', i.id).eq('user_id', _currentUserId));
  if((i.parts||[]).length > 0){
    const partsRows = (i.parts||[]).map(p => ({
      item_id:     i.id,
      user_id:     _currentUserId || null,
      description: p.desc || p.description || '',
      cost:        Number(p.cost) || 0,
    }));
    const {error: partsErr} = await _sbCall(()=>_sb.from('item_parts').insert(partsRows));
    if(partsErr) throw new Error('Save parts failed: ' + partsErr.message);
  }

  // Replace returns: delete old, insert new
  await _sbCall(()=>_sb.from('item_returns').delete().eq('item_id', i.id).eq('user_id', _currentUserId));
  if((i.returnHistory||[]).length > 0){
    const retRows = (i.returnHistory||[]).map(r => ({
      item_id:       i.id,
      user_id:       _currentUserId || null,
      logged_at:     r.loggedAt || null,
      type:          r.type || null,
      refund_amount: Number(r.refundAmount) || 0,
      return_postage:Number(r.returnPostage) || 0,
      notes:         r.notes || null,
      relisted_at:   r._relistedAt || null,
      relist_condition: r._relistCondition || null,
      sale_price_at_return: r._salePriceAtReturn!=null ? Number(r._salePriceAtReturn) : null,
      date_sold_at_return:  r._dateSoldAtReturn || null,
    }));
    const {error: retErr} = await _sbCall(()=>_sb.from('item_returns').insert(retRows));
    if(retErr) throw new Error('Save returns failed: ' + retErr.message);
  }
}

async function saveTripToSupabase(t){
  const row = {
    id:t.id, user_id:_currentUserId||null, date:t.date,
    description:t.description||'', mileage:t.mileage||0,
    rate_per_mile:t.ratePerMile||0.45,
    // BUG-07: persist per-trip expenses as JSONB
    expenses: Array.isArray(t.expenses) ? t.expenses : []
  };
  let {error} = await _sbCall(()=>_sb.from('trips').upsert(row, {onConflict:'id,user_id'}));
  // BUG-07 graceful fallback: if Supabase doesn't have the expenses column
  // yet (user hasn't run the migration SQL), retry without that field so the
  // trip itself still saves. The extras stay in DB.trips locally and will
  // sync on the next save once the column is added.
  if(error && /expenses/i.test(error.message||'') && /column/i.test(error.message||'')){
    if(!window._tripExpensesColumnWarned){
      window._tripExpensesColumnWarned=true;
      toast('Trip saved locally. Add the expenses column in Supabase to sync extras.','err');
    }
    delete row.expenses;
    const retry = await _sbCall(()=>_sb.from('trips').upsert(row, {onConflict:'id,user_id'}));
    error = retry.error;
  }
  if(error) throw new Error('Save trip failed: ' + error.message);
}

// ── LEGACY WRAPPERS (called throughout the app — now async-aware) ────────────
// saveDB() is called after every mutation throughout the app.
// Strategy: snapshot the DB state, debounce 400ms, then diff & persist to Supabase.

let _dbSnapshot = null;   // last-known-saved state (JSON string per item id)
let _saveTimer = null;
let _currentUserId = null; // set on SIGNED_IN, cleared on SIGNED_OUT
let _syncing = false;      // true while _persistChanges is actively running
let _syncResolvers = [];   // resolve callbacks waiting for sync to finish

function _setSyncing(val){
  _syncing = val;
  const el  = document.getElementById('sync-indicator');
  if(el) el.style.display = val ? 'flex' : 'none';
  if(!val){
    // Wake up anyone waiting (e.g. sign-out guard)
    const cbs = _syncResolvers.splice(0);
    cbs.forEach(fn => fn());
  }
}

// Returns a promise that resolves immediately if not syncing,
// or waits until the current sync finishes before resolving.
function _waitForSync(){
  if(!_syncing) return Promise.resolve();
  return new Promise(res => _syncResolvers.push(res));
}

function saveDB(){
  if(_previewMode){
    DB._userOwned = false;
    refreshActivePage();
    clearTimeout(_saveTimer);
    _saveTimer = null;
    return;
  }
  DB._userOwned = true;
  refreshActivePage();
  // Debounce: wait 400ms of quiet before persisting (handles rapid edits)
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(_persistChanges, 400);
}

// Build a flat map of id → JSON for all items + trips + expenses
function _dbFingerprint(){
  const fp = {};
  allDBKeys().forEach(k => {
    (DB[k]||[]).forEach(i => { fp['item:'+i.id] = JSON.stringify(i) + '|' + k; });
  });
  (DB.trips||[]).forEach(t => { fp['trip:'+t.id] = JSON.stringify(t); });
  (DB.expenses||[]).forEach(e => { fp['exp:'+e.id] = JSON.stringify(e); });
  return fp;
}

async function _persistChanges(){
  // Never persist if no user is logged in — prevents ghost saves after sign-out
  if(!_currentUserId){ console.warn('_persistChanges: no user, skipping'); return; }
  // Snapshot the user at sync start. If the user changes mid-sync (sign-out
  // during debounce, token refresh race), abort — don't upsert rows with the
  // wrong owner. RLS would reject it, but this prevents partial writes too.
  const _uidAtStart = _currentUserId;
  _setSyncing(true);
  try{
    const current = _dbFingerprint();
    const prev    = _dbSnapshot || {};
    const errors  = [];

    // Detect changed / new items
    for(const key of Object.keys(current)){
      if(current[key] === prev[key]) continue;  // unchanged
      if(_currentUserId !== _uidAtStart){ console.warn('_persistChanges: user changed mid-sync, aborting'); return; }
      try{
        if(key.startsWith('item:')){
          const id = key.slice(5);
          const parts = current[key].split('|');
          const month = parts[parts.length - 1];
          const item = (DB[month]||[]).find(i => i.id === id);
          if(item) await saveItemToSupabase(month, item);
        } else if(key.startsWith('trip:')){
          const id = key.slice(5);
          const trip = (DB.trips||[]).find(t => t.id === id);
          if(trip) await saveTripToSupabase(trip);
        } else if(key.startsWith('exp:')){
          const id = key.slice(4);
          const exp = (DB.expenses||[]).find(e => e.id === id);
          if(exp) await saveExpenseToSupabase(exp);
        }
      }catch(e){ errors.push(e.message); }
    }

    // Detect deletions
    for(const key of Object.keys(prev)){
      if(current[key] !== undefined) continue;  // still exists
      if(_currentUserId !== _uidAtStart){ console.warn('_persistChanges: user changed mid-sync, aborting'); return; }
      try{
        if(key.startsWith('item:')){
          const id = key.slice(5);
          await deleteItemFromSupabase(id);
        } else if(key.startsWith('trip:')){
          const id = key.slice(5);
          await deleteTripFromSupabase(id);
        } else if(key.startsWith('exp:')){
          const id = key.slice(4);
          await deleteExpenseFromSupabase(id);
        }
      }catch(e){ errors.push(e.message); }
    }

    if(errors.length > 0){
      console.error('Supabase sync errors:', errors);
      toast('⚠️ Cloud sync issue — check connection');
    }

    // Update snapshot to reflect what we just saved
    _dbSnapshot = _dbFingerprint();
  } finally {
    _setSyncing(false);
  }
}

let _dbLoading = false;

// DATABASE (entry point — called on app init after auth confirmed)
async function initDB(){
  if(_dbLoading){ console.warn('initDB already in progress, skipping'); return; }
  _dbLoading = true;
  try{
    showLoadingScreen('Loading your data…');
    await Promise.race([
      loadFromSupabase(),
      new Promise((_,reject) => setTimeout(() => reject(new Error('Request timed out. Try refreshing.')), 15000))
    ]);
    // Migrate any legacy bare keys ('APR') → year-suffixed ('APR-26')
    _migrateBareDBKeys();
    // Snapshot MUST be set immediately after load — before any renderX call
    // triggers saveDB(). Without this the diff engine thinks everything is new
    // and re-upserts the entire DB on every page load.
    _dbSnapshot = _dbFingerprint();
    hideLoadingScreen();
    renderSummary();
  }catch(e){
    console.error('initDB error:', e);
    hideLoadingScreen();
    _showLoadError(e.message);
  } finally {
    _dbLoading = false;
  }
}

// ── Simple Delivery rate bands (UK, current as of late 2025) ─────────────────
// Each entry: {label, cost, buyerPays} — cost = what eBay charges you, buyerPays = default buyer-facing charge
// ── Simple Delivery rate bands (UK, current as of early 2026, both carriers enabled, items under £100)
// eBay shows these as size bands — label costs are what eBay charge the seller via the prepaid label
// Rates shown: Large Letter £2.70 · Small Parcel 0-2kg £3.38 · Medium Parcel 0-1kg £5.15 · 1-5kg £6.16
// eBay Simple Delivery — "all couriers selected" rates.
// Source: ebay.co.uk/sellercentre/postage/simple-delivery (verified Apr 2026).
// Items sold >£100 use costHigh automatically via _sdRateFor().
// If eBay changes their rate card, update these two columns — the UI,
// save path, and tier selection will pick up the new values on next render.
const SIMPLE_DELIVERY_RATES=[
  {label:'Large Letter (1kg)',       cost:2.70, costHigh:3.42},
  {label:'Small Parcel (0-1kg)',     cost:2.94, costHigh:3.42},
  {label:'Medium Parcel (0-1kg)',    cost:2.94, costHigh:3.42},
  {label:'Small Parcel (1-2kg)',     cost:3.38, costHigh:4.26},
  {label:'Medium Parcel (1-2kg)',    cost:3.71, costHigh:4.26},
  {label:'Parcel (2-10kg)',          cost:5.21, costHigh:5.88},
  {label:'Parcel (10-20kg)',         cost:7.19, costHigh:8.41},
];
// Returns the tier-correct cost for a rate index given a sale price.
// eBay splits Simple Delivery rates at the £100 threshold.
function _sdRateFor(idx,salePrice){
  const r=SIMPLE_DELIVERY_RATES[idx]||SIMPLE_DELIVERY_RATES[1];
  return(Number(salePrice)||0)>100?(r.costHigh||r.cost):r.cost;
}
// Returns a formatted option list for a given sale price — used by Quick Add,
// item detail, and relist surfaces so all three show tier-correct prices.
function _sdOptionsFor(salePrice,selectedIdx){
  return SIMPLE_DELIVERY_RATES.map(function(r,idx){
    const c=_sdRateFor(idx,salePrice);
    return'<option value="'+idx+'"'+(idx===selectedIdx?' selected':'')+'>'+r.label+' — \u00a3'+c.toFixed(2)+'</option>';
  }).join('');
}

// Tracks which token field to open after a blur-triggered re-render
var _nextTokenField=null;
var _tokenM=null;
var _tokenId=null;

// tokenPointerDown fires on pointerdown — BEFORE blur on the active input.
// This is the key: we capture the intended next token while the old input
// is still mounted, so when blur fires and destroys the DOM we already know
// which field to re-open.
function tokenPointerDown(m,id,field){
  if(document.querySelector('.ip-token.editing')){
    _nextTokenField=field;
    _tokenM=m;
    _tokenId=id;
  }
}

function openTokenEdit(m,id,field,_alreadyAsync){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i)return;
  const tok=document.getElementById('tok-'+field+'-'+id);
  if(!tok||tok.classList.contains('locked'))return;

  // Another token is open — pointerdown may have already set _nextTokenField.
  // Either way, ensure it is set then trigger blur to save+re-render+re-open.
  const alreadyEditing=document.querySelector('.ip-token.editing');
  if(alreadyEditing&&alreadyEditing!==tok){
    _nextTokenField=field;
    _tokenM=m;
    _tokenId=id;
    const openInp=alreadyEditing.querySelector('input');
    if(openInp)openInp.blur();
    return;
  }

  if(tok.classList.contains('editing'))return;
  tok.classList.add('editing');
  const valEl=tok.querySelector('.ip-token-val');
  const currentVal=field==='promoPercent'?+((i.promoPercent||0)*100).toFixed(2):(i[field]||0);
  valEl.innerHTML='<input type="number" step="0.01" min="0" value="'+currentVal+'" autocomplete="off">';
  const inp=valEl.querySelector('input');

  function focusAndSelect(){
    inp.focus();
    try{inp.setSelectionRange(0,999);}catch(e){try{inp.select();}catch(e2){}}
  }
  if(_alreadyAsync){focusAndSelect();}
  else{setTimeout(focusAndSelect,0);}

  let committed=false;
  function commit(save){
    if(committed)return;
    committed=true;
    if(save){
      const v=parseFloat(inp.value)||0;
      if(field==='promoPercent'){i.promoPercent=+(v/100).toFixed(4);}
      else{i[field]=+v.toFixed(2);}
      if(i.dateSold||i.isReturned||i.resaleSalePrice)i.grossProfit=calcGrossProfit(i);
      DB._userOwned=true;
      saveDB();
    }
    const pending=_nextTokenField;
    const pm=_tokenM||m;
    const pid=_tokenId||id;
    _nextTokenField=null;
    _tokenM=null;
    _tokenId=null;
    // If this token lives inside the slide-panel (not the full item page), re-render the panel
    const inPanel=tok&&tok.closest('#slide-panel');
    if(inPanel){
      openItemDetail(m,id,true);
    }else{
      const states=_getSecStates();
      renderItemPage(m,id);
      _applySecStates(states);
    }
    if(pending){
      openTokenEdit(pm,pid,pending,true);
    }
  }
  inp.addEventListener('keydown',function(e){
    if(e.key==='Enter'){e.preventDefault();commit(true);}
    if(e.key==='Escape'){_nextTokenField=null;_tokenM=null;_tokenId=null;commit(false);}
  });
  inp.addEventListener('blur',function(){commit(true);});
}

function renderItemPage(m,id){
  // Lookup tolerates both id and gid — some entry points (search deep-links,
  // external references) hold only a gid like "R-0042". Internal handlers
  // downstream all use the resolved i.id so nothing else needs to change.
  const i=(DB[m]||[]).find(x=>x.id===id||x.gid===id);
  const page=document.getElementById('p-item');
  if(!i){page.innerHTML='<div style="padding:40px;text-align:center;color:var(--muted)">Item not found</div>';return;}
  // Normalise id to the canonical internal id — the rest of this function
  // interpolates `id` into inline onclick handlers (undoSale, openTokenEdit,
  // savePostageMode, etc.) which all look items up by i.id only.
  id=i.id;

  const _wasRelistedDetect = !i.isReturned && !i.dateSold && !i.resaleSalePrice &&
    (i.returnHistory||[]).some(r=>r.type==='full_seller'||r.type==='full_ebay');
  const _origSalePrice = _wasRelistedDetect
    ? (function(){
        const fe=(i.returnHistory||[]).filter(r=>r.type==='full_seller'||r.type==='full_ebay');
        if(!fe.length)return i.salePrice||0;
        const last=fe[fe.length-1];
        return last._salePriceAtReturn||last.refundAmount||i.salePrice||0;
      })()
    : (i.salePrice||0);
  const bpf=calcEbayBPF(_origSalePrice);
  const grossInc=_origSalePrice-bpf;
  const promoCost=grossInc*(i.promoPercent||0)*1.20;
  const profit=calcGrossProfit(i);
  const roi=calcROI(i);
  const status=i.isReturned?'returned':i.resaleSalePrice?'resold':i.dateSold?'sold':i.condition==='spares'?'spares':'active';
  const hasReturn=(i.returnHistory||[]).length>0;
  const totalRefunded=(i.returnHistory||[]).reduce((s,r)=>s+(r.refundAmount||0),0);
  const totalReturnPostage=(i.returnHistory||[]).reduce((s,r)=>s+(r.returnPostage||0),0);
  const postageMode=i._postageMode||(i.shippingCost>0?'custom':'simple');
  const sdIdx=i._sdRateIdx!=null?i._sdRateIdx:1;

  // ── Timeline entries ─────────────────────────────────────────────────
  const timeline=[];
  timeline.push({date:i.dateListed||'',badge:'listed',label:'Listed on eBay',detail:'Price: '+fmt(i.salePrice)+' · Cost: '+fmt(i.costPrice||0)});
  // Show sale entry if: sold, currently returned, OR has return history (was sold before the return)
  if(i.dateSold||hasReturn){
    const sd=i.dateSold||((i.returnHistory||[])[0]?(i.returnHistory[0].loggedAt||''):'');
    const _tlOrigSalePrice=(function(){
      const fe=(i.returnHistory||[]).filter(r=>r.type==='full_seller'||r.type==='full_ebay');
      if(!fe.length)return i.salePrice||0;
      const last=fe[fe.length-1];
      return last._salePriceAtReturn||last.refundAmount||i.salePrice||0;
    })();
    const _tlBPF=calcEbayBPF(_tlOrigSalePrice);
    timeline.push({date:sd,badge:'sale',label:'Sold',detail:'Sale price: '+fmt(_tlOrigSalePrice)+' → Received: '+fmt(_tlOrigSalePrice-_tlBPF)+' after BPF'});
  }
  (i.returnHistory||[]).forEach(function(r,rtnIdx){
    const lbl2={full_seller:'Full refund — seller handled',full_ebay:'Full refund — eBay stepped in',partial_seller:'Partial refund — seller agreed',partial_ebay:'Partial refund — eBay decided'};
    const bc=r.type.startsWith('full')?'return-full':'return-partial';
    const parts2=['Refund: '+fmt(r.refundAmount||0)];
    if(r.returnPostage>0)parts2.push('Return postage: '+fmt(r.returnPostage));
    if(r.notes)parts2.push('Note: '+esc(r.notes));
    timeline.push({date:r.loggedAt||'',badge:bc,label:lbl2[r.type]||r.type,detail:parts2.join(' · '),rtnIdx:rtnIdx});
    // If this return entry has a relist logged on it, add a relist timeline event
    if(r._relistedAt){
      const condLabel=r._relistCondition==='spares'?'Spares / Repairs':'Working';
      timeline.push({date:r._relistedAt,badge:'relist',label:'Relisted',detail:'Condition: '+condLabel+' · Price: '+fmt(i.salePrice),rtnIdx:rtnIdx});
    }
  });
  if(i.resaleSalePrice){
    const rBPF2=calcEbayBPF(i.resaleSalePrice);
    timeline.push({date:i.resaleDateSold||'',badge:'resale',label:'Re-sold',detail:'Sale price: '+fmt(i.resaleSalePrice)+' → Received: '+fmt(i.resaleSalePrice-rBPF2)+' after BPF'});
  }
  const typeOrder={listed:0,sale:1,'return-full':2,'return-partial':2,relist:3,resale:4};
  timeline.sort(function(a,b){if(a.date<b.date)return -1;if(a.date>b.date)return 1;return (typeOrder[a.badge]??1)-(typeOrder[b.badge]??1);});
  const badgeLbl={listed:'listed',sale:'sold',resale:'re-sold','return-full':'full return','return-partial':'partial return',relist:'relisted'};
  const timelineHTML=timeline.map(function(t,idx){
    const isLast=idx===timeline.length-1;
    let undoBtn='';
    if(isLast){
      if(t.badge==='sale')undoBtn='<button onclick="event.stopPropagation();undoSale(\''+m+'\',\''+id+'\')" style="margin-left:auto;background:none;border:1px solid var(--border);border-radius:4px;padding:1px 7px;font-size:11px;color:var(--muted);cursor:pointer">✕ undo</button>';
      else if(t.badge==='resale')undoBtn='<button onclick="event.stopPropagation();undoResale(\''+m+'\',\''+id+'\')" style="margin-left:auto;background:none;border:1px solid var(--border);border-radius:4px;padding:1px 7px;font-size:11px;color:var(--muted);cursor:pointer">✕ undo</button>';
      else if(t.badge==='return-full'||t.badge==='return-partial')undoBtn='<button onclick="event.stopPropagation();undoReturnEntry(\''+m+'\',\''+id+'\','+t.rtnIdx+')" style="margin-left:auto;background:none;border:1px solid var(--border);border-radius:4px;padding:1px 7px;font-size:11px;color:var(--muted);cursor:pointer">✕ undo</button>';
      else if(t.badge==='relist')undoBtn='<button onclick="event.stopPropagation();undoRelist(\''+m+'\',\''+id+'\','+t.rtnIdx+')" style="margin-left:auto;background:none;border:1px solid var(--border);border-radius:4px;padding:1px 7px;font-size:11px;color:var(--muted);cursor:pointer">✕ undo</button>';
    }
    return '<div class="ip-timeline-entry">'
      +'<div class="ip-timeline-header">'
      +'<span class="history-badge '+t.badge+'">'+(badgeLbl[t.badge]||t.badge)+'</span>'
      +'<span style="color:var(--muted);font-size:12px">'+fmtDate(t.date)+'</span>'
      +undoBtn
      +'</div>'
      +'<div class="ip-timeline-label">'+t.label+'</div>'
      +(t.detail?'<div class="ip-timeline-detail">'+t.detail+'</div>':'')
      +'</div>';
  }).join('');

  // ── P&L receipt (read-only, derived) ─────────────────────────────────
  const partsCost=calcPartsCost(i);
  // Sale 1 net: for resold items, compute using calcGrossProfit on a clone with resale fields stripped.
  // This guarantees the receipt's displayed net uses the SAME fee logic as calcGrossProfit
  // (including partial_seller fee-base reduction), so line items reconcile to the total.
  let sale1Net;
  if(i.resaleSalePrice){
    const _sale1Clone=Object.assign({},i,{resaleSalePrice:null,resaleDateSold:null,resalePromoPercent:null,resaleShippingCost:null,resalePackagingCost:null});
    sale1Net=calcGrossProfit(_sale1Clone);
  }else{
    sale1Net=profit;
  }
  // Effective fee values under partial_seller refunds — used for receipt credit lines.
  const _psTotal=(i.returnHistory||[]).filter(function(r){return r.type==='partial_seller';}).reduce(function(s,r){return s+(r.refundAmount||0);},0);
  const _effSale=Math.max(0,_origSalePrice-_psTotal);
  const _effBPF=calcEbayBPF(_effSale);
  const _effPromo=(_effSale-_effBPF)*(i.promoPercent||0)*1.20;
  const _bpfCredit=+(bpf-_effBPF).toFixed(2);
  const _promoCredit=+(promoCost-_effPromo).toFixed(2);
  function rcp(label,val,color,indent){
    return'<div class="ip-receipt-row'+(indent?' indent':'')+'"><span style="flex:1;color:'+(color&&color.includes('--text')?color:'var(--text-secondary)')+'">'+label+'</span><span class="ip-receipt-val" style="color:'+(color||'var(--text)')+'">'+val+'</span></div>';
  }
  let pb='';
  pb+=rcp(_wasRelistedDetect?'Sale price (original)':'Sale price',fmt(_origSalePrice),'var(--green)');
  if(_wasRelistedDetect)pb+=rcp('↳ Relisted at',fmt(i.salePrice||0),'var(--muted)',true);
  if((i.postage||0)>0)pb+=rcp('+ Buyer postage','+'+fmt(i.postage),'var(--green)');
  pb+=rcp('eBay BPF','−'+fmt(bpf),'var(--red)');
  if((i.shippingCost||0)>0)pb+=rcp('Shipping cost','−'+fmt(i.shippingCost),'var(--red)');
  if((i.packagingCost||0)>0)pb+=rcp('Packaging','−'+fmt(i.packagingCost),'var(--red)');
  if(i.promoPercent)pb+=rcp('Promo fee ('+((i.promoPercent*100).toFixed(0))+'% +VAT)','−'+fmt(promoCost),'var(--red)');
  pb+=rcp('Item cost','−'+fmt(i.costPrice||0),'var(--red)');
  if(partsCost>0){
    const pts=i.parts||[];
    if(pts.length===1){pb+=rcp(esc(pts[0].description),'−'+fmt(partsCost),'var(--red)');}
    else{
      pb+=rcp('Parts & expenses ('+pts.length+')','−'+fmt(partsCost),'var(--red)');
      pts.forEach(function(p){pb+=rcp(esc(p.description),'−'+fmt(p.cost),'var(--red)',true);});
    }
  }
  if(hasReturn){
    pb+='<div class="ip-receipt-row section-head"><span>Return impact</span><span></span></div>';
    (i.returnHistory||[]).forEach(function(r){
      const fullReturn=(r.type==='full_seller'||r.type==='full_ebay');
      const lbl3={full_seller:'Full refund — you handled',full_ebay:'Full refund — eBay involved',partial_seller:'Partial refund — you handled',partial_ebay:'Partial refund — eBay decided'}[r.type]||r.type;
      pb+=rcp(lbl3,'−'+fmt(r.refundAmount||0),'var(--accent)');
      if(fullReturn)pb+=rcp('eBay refunds BPF back to you','+'+fmt(bpf),'var(--green)',true);
      if((r.returnPostage||0)>0)pb+=rcp('Return postage','−'+fmt(r.returnPostage),'var(--red)');
    });
    // Partial-seller: eBay refunds the fee difference (BPF + promo) on the reduced sale base.
    // Show explicit credit lines so line items reconcile to the net profit total.
    if(_psTotal>0){
      if(_bpfCredit>0)pb+=rcp('eBay refunds BPF difference','+'+fmt(_bpfCredit),'var(--green)',true);
      if(_promoCredit>0)pb+=rcp('eBay refunds promo difference','+'+fmt(_promoCredit),'var(--green)',true);
    }
  }
  pb+='<div class="ip-receipt-row total"><span style="flex:1">'+(i.resaleSalePrice?'Sale 1 net':'Net profit / loss')+'</span><span class="ip-receipt-val" style="color:'+(sale1Net>=0?'var(--green)':'var(--red)')+'">'+fmt(sale1Net)+'</span></div>';

  // Sale 2 block
  let resaleHTML='';
  if(i.resaleSalePrice){
    const rBPF=calcEbayBPF(i.resaleSalePrice);
    const rGrossInc=i.resaleSalePrice-rBPF;
    const rPromoCost=rGrossInc*(i.resalePromoPercent||0)*1.20;
    const rRev=i.resaleSalePrice-rBPF-(i.resaleShippingCost||0)-rPromoCost;
    const lifetimeProfit=profit;
    let s2b='';
    s2b+=rcp('Sale price',fmt(i.resaleSalePrice),'var(--green)');
    s2b+=rcp('eBay BPF','−'+fmt(rBPF),'var(--red)');
    if((i.resaleShippingCost||0)>0)s2b+=rcp('Shipping cost','−'+fmt(i.resaleShippingCost),'var(--red)');
    if(rPromoCost>0)s2b+=rcp('Promo fee ('+((i.resalePromoPercent||0)*100).toFixed(1)+'% +VAT)','−'+fmt(rPromoCost),'var(--red)');
    s2b+=rcp('Item cost (sunk)','—','var(--muted)');
    s2b+='<div class="ip-receipt-row total"><span style="flex:1">Sale 2 net</span><span class="ip-receipt-val" style="color:'+(rRev>=0?'var(--green)':'var(--red)')+'">'+fmt(rRev)+'</span></div>';
    s2b+='<div class="ip-receipt-row" style="margin-top:6px;padding:10px 0 2px;border-top:2px solid var(--border)"><span style="flex:1;font-weight:700;font-size:13px">Lifetime P&amp;L</span><span class="ip-receipt-val" style="font-size:16px;color:'+(lifetimeProfit>=0?'var(--green)':'var(--red)')+'">'+fmt(lifetimeProfit)+'</span></div>';
    if(roi!==null)s2b+=rcp('Overall ROI',roi.toFixed(1)+'%','var(--muted)');
    resaleHTML=sec2('Sale 2 P&amp;L <span style="color:var(--muted);font-weight:400;font-size:11px">re-sold '+esc(i.resaleDateSold||'—')+'</span>',s2b,true,fmt(rRev),rRev>=0?'var(--green)':'var(--red)','ip-section-pnl','var(--purple)');
  }

  // ── Re-list projection ────────────────────────────────────────────────
  let relistHTML='';
  const hasReturnHistory=(i.returnHistory||[]).length>0;
  const notYetSold=!i.dateSold&&!i.resaleSalePrice;
  if(hasReturnHistory&&notYetSold){
    const rlBPF=calcEbayBPF(i.salePrice||0);
    const rlSalePrice=i.salePrice||0;
    const rlShipping=i.shippingCost||0;
    const rlPackaging=i.packagingCost||0;
    const rlPostage=i.postage||0;
    const rlDefaultPromo=+((i.promoPercent||0)*100).toFixed(1);
    const projTitle=i.isReturned?'Re-list Projection — at current price':'Relist Projection — if sold at '+fmt(rlSalePrice);
    const rlGrossInc=rlSalePrice-rlBPF;
    const rlPromo=rlGrossInc*(i.promoPercent||0)*1.20;
    const rlRev=rlSalePrice+rlPostage-rlBPF;
    const rlCost=rlShipping+rlPackaging+rlPromo;
    const rlProfit=+(rlRev-rlCost).toFixed(2);
    const combinedP=+(profit+rlProfit).toFixed(2);
    relistHTML=`<div class="ip-relist-section">
      <div class="ip-section-header" onclick="var b=this.nextElementSibling,c=this.querySelector('.ip-section-chevron');b.style.display=b.style.display==='none'?'block':'none';c.style.transform=b.style.display==='none'?'rotate(0deg)':'rotate(180deg)'">
        <span class="ip-section-title" style="color:var(--accent)">${projTitle}</span>
        <span class="ip-section-meta"><span class="ip-section-badge" style="color:${combinedP>=0?'var(--green)':'var(--red)'}">Lifetime: ${fmt(combinedP)}</span><span class="ip-section-chevron" style="transform:rotate(180deg)">▾</span></span>
      </div>
      <div class="ip-section-body">
        <div class="ip-receipt-row"><span style="flex:1;color:var(--muted)">P&L after return so far</span><span class="ip-receipt-val" style="color:${profit>=0?'var(--green)':'var(--red)'}">${fmt(profit)}</span></div>
        <div class="ip-receipt-row"><span style="flex:1">Expected sale</span><span class="ip-receipt-val" style="color:var(--green)">${fmt(rlSalePrice)}</span></div>
        ${rlPostage>0?`<div class="ip-receipt-row"><span style="flex:1">+ Buyer postage</span><span class="ip-receipt-val" style="color:var(--green)">+${fmt(rlPostage)}</span></div>`:''}
        <div class="ip-receipt-row"><span style="flex:1">eBay BPF</span><span class="ip-receipt-val" style="color:var(--red)">−${fmt(rlBPF)}</span></div>
        <div class="ip-receipt-row"><span style="flex:1">Shipping</span><span class="ip-receipt-val" style="color:var(--red)">−${fmt(rlShipping)}</span></div>
        <div class="ip-receipt-row" style="align-items:center">
          <span style="display:flex;align-items:center;gap:8px;color:var(--text-secondary)">Promo %
            <input id="rl-promo-input" type="number" min="0" max="100" step="0.1" value="${rlDefaultPromo}" style="width:56px;padding:3px 7px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:12px;font-weight:600;text-align:center;font-family:inherit" oninput="_recalcRelist(${profit},${rlSalePrice},${rlBPF},${rlShipping},${rlPackaging},${rlPostage})">
            <span style="font-size:11px;color:var(--muted)">+VAT</span>
          </span>
          <span id="rl-promo-cost" class="ip-receipt-val" style="color:var(--red)">−${fmt(rlPromo)}</span>
        </div>
        <div class="ip-receipt-row"><span style="flex:1;color:var(--muted)">Item cost (sunk)</span><span class="ip-receipt-val" style="color:var(--muted)">—</span></div>
        <div class="ip-receipt-row total"><span style="flex:1">Profit if sold</span><span id="rl-profit" class="ip-receipt-val" style="color:${rlProfit>=0?'var(--green)':'var(--red)'}">${fmt(rlProfit)}</span></div>
        <div class="ip-receipt-row" style="margin-top:6px;padding:10px;background:var(--surface2);border-radius:8px;border-bottom:none">
          <span style="flex:1;font-weight:600">Lifetime P&L if sold</span>
          <span id="rl-lifetime" class="ip-receipt-val" style="font-size:15px;color:${combinedP>=0?'var(--green)':'var(--red)'}">${fmt(combinedP)}</span>
        </div>
      </div>
    </div>`;
  }

  // ── Build selects ────────────────────────────────────────────────────
  const catOpts=ITEM_CATEGORIES.map(c=>'<option value="'+c+'"'+(c===i.category?' selected':'')+'>'+c+'</option>').join('');
  const srcOpts=ITEM_SOURCES.map(s=>'<option value="'+s+'"'+(s===i.source?' selected':'')+'>'+s+'</option>').join('');

  // ── Section builder ───────────────────────────────────────────────────
  function sec(title,body,open,badge,badgeColor,extraClass){
    const cls='ip-section'+(extraClass?' '+extraClass:'');
    const bdg=badge!=null?'<span class="ip-section-badge" style="color:'+(badgeColor||'var(--muted)')+'">'+badge+'</span>':'';
    const chevron='<span class="ip-section-chevron" style="transform:'+(open?'rotate(180deg)':'rotate(0deg)')+'">▾</span>';
    const hdr='<div class="ip-section-header" onclick="var b=this.nextElementSibling,c=this.querySelector(\'.ip-section-chevron\');b.style.display=b.style.display===\'none\'?\'block\':\'none\';c.style.transform=b.style.display===\'none\'?\'rotate(0deg)\':\'rotate(180deg)\'">'
      +'<span class="ip-section-title">'+title+'</span>'
      +'<span class="ip-section-meta">'+bdg+chevron+'</span>'
      +'</div>';
    return'<div class="'+cls+'">'+hdr+'<div class="ip-section-body" style="display:'+(open?'block':'none')+'">'+body+'</div></div>';
  }
  // sec2: variant that allows a title accent color override
  function sec2(title,body,open,badge,badgeColor,extraClass,accentColor){
    const cls='ip-section'+(extraClass?' '+extraClass:'');
    const bdg=badge!=null?'<span class="ip-section-badge" style="color:'+(badgeColor||'var(--muted)')+'">'+badge+'</span>':'';
    const chevron='<span class="ip-section-chevron" style="transform:'+(open?'rotate(180deg)':'rotate(0deg)')+'">▾</span>';
    const hdr='<div class="ip-section-header" onclick="var b=this.nextElementSibling,c=this.querySelector(\'.ip-section-chevron\');b.style.display=b.style.display===\'none\'?\'block\':\'none\';c.style.transform=b.style.display===\'none\'?\'rotate(0deg)\':\'rotate(180deg)\'">'
      +'<span class="ip-section-title"'+(accentColor?' style="color:'+accentColor+'"':'')+'>'+title+'</span>'
      +'<span class="ip-section-meta">'+bdg+chevron+'</span>'
      +'</div>';
    return'<div class="'+cls+'">'+hdr+'<div class="ip-section-body" style="display:'+(open?'block':'none')+'">'+body+'</div></div>';
  }

  // ── Postage row HTML ──────────────────────────────────────────────────
  // Options show tier-correct prices based on the item's current sale price.
  const sdOpts=_sdOptionsFor(i.salePrice||0,sdIdx);
  const postageRowInner=postageMode==='simple'
    ?'<select class="ip-postage-select" onchange="saveSDRate(\''+m+'\',\''+id+'\',this.value)">'+sdOpts+'</select>'
     +'<div class="ip-postage-buyer"><label><input type="checkbox" '+(i._sdBuyerPays===true?'':'checked')+' onchange="saveSDFree(\''+m+'\',\''+id+'\',!this.checked)"> Free postage</label></div>'
    :'<div class="ip-postage-custom">'
     +'<div class="ip-postage-custom-field"><label>You pay</label><input type="number" step="0.01" value="'+(i.shippingCost||0)+'" onchange="ipSaveNum(\''+m+'\',\''+id+'\',\'shippingCost\',this.value)" onkeydown="if(event.key===\'Enter\')this.blur()"></div>'
     +'<div class="ip-postage-custom-field"><label>Buyer pays</label><input type="number" step="0.01" value="'+(i.postage||0)+'" onchange="ipSaveNum(\''+m+'\',\''+id+'\',\'postage\',this.value)" onkeydown="if(event.key===\'Enter\')this.blur()"></div>'
     +'</div>';

  // ── Render ────────────────────────────────────────────────────────────
  const saleEditable=!i.dateSold&&!i.resaleSalePrice&&!i.isReturned;
  const profitClass=profit===null?'':profit>=0?'pos':'neg';
  const promoDisplay=((i.promoPercent||0)*100);
  const promoStr=promoDisplay%1===0?promoDisplay.toFixed(0):promoDisplay.toFixed(1);
  let html='<div class="item-full-page">';

  // Top bar — title is directly editable
  html+='<div class="ip-topbar">';
  html+='<button class="btn btn-s ip-back" onclick="exitItemPage()">← Back</button>';
  html+='<div class="ip-title-wrap">';
  html+='<div class="ip-title" onclick="startTitleEdit(\''+m+'\',\''+id+'\')" title="Click to rename">'+esc(i.item)+'</div>';
  html+='<div class="ip-meta-chips">';
  if(i.gid)html+='<span class="ip-chip mono">'+esc(i.gid)+'</span>';
  html+='<span class="ip-chip">'+m+'</span>';
  html+='<div class="item-badge '+status+'">'+status+'</div>';
  html+='</div></div>';
  html+='<div class="ip-actions">';
  if((!i.dateSold&&!i.resaleSalePrice)&&!i.isReturned)html+='<button class="btn btn-p ip-act-btn" onclick="markSold(\''+m+'\',\''+id+'\')"><svg width="13" height="13" viewBox="0 0 15 15" fill="none"><path d="M8.5 1.5h4a1 1 0 011 1v4a.5.5 0 01-.15.35l-6 6a1 1 0 01-1.41 0l-4-4a1 1 0 010-1.41l6-6A.5.5 0 018.5 1.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><circle cx="11" cy="4" r="0.8" fill="currentColor"/></svg><span class="ip-act-label">Mark Sold</span></button>';
  if(i.isReturned)html+='<button class="btn btn-p ip-act-btn" onclick="openRelist(\''+m+'\',\''+id+'\')">↩ <span class="ip-act-label">Relist</span></button>';
  if((i.dateSold||i.resaleSalePrice)&&!i.isReturned)html+='<button class="btn btn-s ip-act-btn" onclick="openReturn(\''+m+'\',\''+id+'\')">↩ <span class="ip-act-label">Return</span></button>';
  if(i.dateSold&&!i.resaleSalePrice&&!i.isReturned)html+='<button class="btn btn-s ip-act-btn" onclick="revertToActive(\''+m+'\',\''+id+'\')" title="Undo the sold mark — move this item back to active stock">⟲ <span class="ip-act-label">Revert</span></button>';
  html+='<button class="btn btn-s ip-act-btn" onclick="duplicateItem(\''+m+'\',\''+id+'\')"><svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M3 11V3a1 1 0 011-1h8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg><span class="ip-act-label">Dupe</span></button>';
  html+='<button class="btn btn-s ip-act-btn ip-act-danger" onclick="deleteItem(\''+m+'\',\''+id+'\')"><svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M5 4V2h6v2M6 7v5M10 7v5M3 4l1 9a1 1 0 001 1h6a1 1 0 001-1l1-9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></button>';
  html+='</div></div>'; // ip-actions + ip-topbar

  // All content below topbar in one flex column with uniform 12px gap
  html+='<div class="ip-content">';

  // 4 tokens: Sale Price, Buy Price, Promo %, Net Profit+ROI
  html+='<div class="ip-tokens">';

  // Sale price
  html+='<div class="ip-token'+(saleEditable?'':' locked')+'" id="tok-salePrice-'+id+'"'+(saleEditable?' onpointerdown="tokenPointerDown(\''+m+'\',\''+id+'\',\'salePrice\')" onclick="openTokenEdit(\''+m+'\',\''+id+'\',\'salePrice\')"':'')+' >';
  html+='<div class="ip-token-label">Sale Price</div>';
  html+='<div class="ip-token-val">'+fmt(i.salePrice||0)+'</div>';
  html+='<div class="ip-token-sub">'+(saleEditable?'✏️ Tap to edit':status==='sold'||status==='resold'?'🔒 Sold · locked':'🔒 Locked')+'</div>';
  html+='</div>';

  // Buy price — always editable
  html+='<div class="ip-token" id="tok-costPrice-'+id+'" onpointerdown="tokenPointerDown(\''+m+'\',\''+id+'\',\'costPrice\')" onclick="openTokenEdit(\''+m+'\',\''+id+'\',\'costPrice\')">';
  html+='<div class="ip-token-label">Buy Price</div>';
  html+='<div class="ip-token-val">'+fmt(i.costPrice||0)+'</div>';
  html+='<div class="ip-token-sub">Tap to edit</div>';
  html+='</div>';

  // Promo %
  html+='<div class="ip-token" id="tok-promoPercent-'+id+'" onpointerdown="tokenPointerDown(\''+m+'\',\''+id+'\',\'promoPercent\')" onclick="openTokenEdit(\''+m+'\',\''+id+'\',\'promoPercent\')">';
  html+='<div class="ip-token-label">Promo %</div>';
  html+='<div class="ip-token-val">'+promoStr+'%</div>';
  html+='<div class="ip-token-sub">Tap to edit · Fee: '+fmt(promoCost)+'</div>';
  html+='</div>';

  // Net Profit + ROI — read only, auto calculated
  html+='<div class="ip-token locked '+profitClass+'">';
  html+='<div class="ip-token-label">'+(i.resaleSalePrice?'Lifetime Profit':'Net Profit')+'</div>';
  html+='<div class="ip-token-val">'+(profit!==null?fmt(profit):'—')+'</div>';
  html+='<div class="ip-token-sub">'+(roi!==null?roi.toFixed(1)+'% ROI · ':'')+(hasReturn?'after return':'after fees')+'</div>';
  html+='</div>';

  html+='</div>'; // ip-tokens

  // Postage row
  html+='<div class="ip-postage-row">';
  html+='<span class="ip-postage-label">Postage</span>';
  html+='<div class="ip-postage-mode">';
  html+='<button class="ip-postage-mode-btn'+(postageMode==='simple'?' active':'')+'" onclick="savePostageMode(\''+m+'\',\''+id+'\',\'simple\')">Simple Delivery</button>';
  html+='<button class="ip-postage-mode-btn'+(postageMode==='custom'?' active':'')+'" onclick="savePostageMode(\''+m+'\',\''+id+'\',\'custom\')">Custom</button>';
  html+='</div>';
  html+='<div class="ip-postage-divider"></div>';
  html+=postageRowInner;
  html+='</div>'; // ip-postage-row

  // Body sections
  html+='<div class="ip-body">';

  // P&L Receipt
  const pnlOpen=!i.resaleSalePrice;
  const pnlTitle=i.resaleSalePrice?'Sale 1 P&amp;L':'P&amp;L Receipt';
  html+=sec(pnlTitle,pb,pnlOpen,fmt(sale1Net),sale1Net>=0?'var(--green)':'var(--red)','ip-section-pnl');

  // Sale 2
  if(resaleHTML)html+=resaleHTML;

  // Relist projection
  if(relistHTML)html+=relistHTML;

// SEARCH
const CATEGORY_ICONS={
  'Electronics & Tech':'💻','Cameras & Photography':'📷','Audio & Music':'🎵',
  'Books & Media':'📚','Toys & Games':'🎮','Home & Garden':'🏡',
  'Clothing & Fashion':'👗','Collectibles & Vintage':'🏺','Other':'📬'
};
let _searchIdx=-1;
let _searchResults=[];

function searchAllItems(q){
  const terms=q.toLowerCase().trim().split(/\s+/).filter(Boolean);
  if(!terms.length)return[];
  const results=[];
  allDBKeys().forEach(k=>{
    (DB[k]||[]).forEach(i=>{
      const haystack=[
        (i.item||'').toLowerCase(),
        (i.category||'').toLowerCase(),
        (i.gid||'').toLowerCase(),
        (i.source||'').toLowerCase(),
        (i.notes||'').toLowerCase()
      ].join(' ');
      if(terms.every(t=>haystack.includes(t))){
        results.push({...i,month:k});
      }
    });
  });
  // Sort: active first, then sold, then returned
  const order={listed:0,sold:1,returned:2};
  results.sort((a,b)=>{
    const sa=a.isReturned?'returned':a.resaleSalePrice?'resold':a.dateSold?'sold':'listed';
    const sb=b.isReturned?'returned':b.resaleSalePrice?'resold':b.dateSold?'sold':'listed';
    return (order[sa]??1)-(order[sb]??1);
  });
  return results;
}

function highlightMatch(text,q){
  if(!text||!q.trim())return esc(text||'');
  const terms=q.trim().split(/\s+/).filter(Boolean);
  let result=esc(text);
  terms.forEach(t=>{
    const escaped=t.replace(/[-\/\\^$*+?.()|[\]{}]/g,'\\$&');
    const re=new RegExp('('+escaped+')','gi');
    result=result.replace(re,'<mark>$1</mark>');
  });
  return result;
}

function showSearchDropdown(q){
  const dd=document.getElementById('search-dropdown');
  const input=document.getElementById('global-search');
  if(!q.trim()){dd.classList.remove('open');dd.innerHTML='';return;}
  // Position dropdown below the input using fixed coords
  if(input){
    const r=input.getBoundingClientRect();
    dd.style.top=(r.bottom+6)+'px';
    dd.style.left=r.left+'px';
    dd.style.width=Math.max(r.width,280)+'px';
  }
  if(!q.trim()){dd.classList.remove('open');dd.innerHTML='';return;}
  _searchResults=searchAllItems(q);
  _searchIdx=-1;
  const MAX=8;
  const shown=_searchResults.slice(0,MAX);
  const extra=_searchResults.length-MAX;
  if(!shown.length){
    dd.innerHTML=`<div class="search-empty">No items found for "<strong>${esc(q)}</strong>"</div>`;
    dd.classList.add('open');
    return;
  }
  const rows=shown.map((i,idx)=>{
    const status=i.isReturned?'returned':i.resaleSalePrice?'resold':i.dateSold?'sold':i.condition==='spares'?'spares':'active';
    const icon=CATEGORY_ICONS[i.category]||'📬';
    const price=i.salePrice?fmt(i.salePrice):'—';
    return`<div class="search-result" data-idx="${idx}" onclick="selectSearchResult(${idx})" onmouseenter="setSearchActive(${idx})">
      <div class="sr-icon">${icon}</div>
      <div class="sr-body">
        <div class="sr-name">${highlightMatch(i.item,q)}</div>
        <div class="sr-meta">
          ${i.category?`<span class="sr-cat">${esc(i.category)}</span>`:''}
          <span class="sr-month">${i.month}</span>
          <span class="sr-status ${status}">${status}</span>
        </div>
      </div>
      <div class="sr-price">${price}</div>
    </div>`;
  }).join('');
  const footer=extra>0?`<div class="search-footer" style="cursor:pointer" onclick="openSearchPage('${esc(q)}')">See all ${_searchResults.length} results for "${esc(q)}" →</div>`:'';
  dd.innerHTML=rows+footer;
  dd.classList.add('open');
}

function setSearchActive(idx){
  _searchIdx=idx;
  document.querySelectorAll('.search-result').forEach((el,i)=>{
    el.classList.toggle('active',i===idx);
  });
}

function selectSearchResult(idx){
  const item=_searchResults[idx];
  if(!item)return;
  closeSearchDropdown();
  document.getElementById('global-search').value='';
  document.querySelector('.search-clear').classList.remove('show');
  openItemPage(item.month,item.id,'p-search');
}

function handleSearchKey(e){
  const dd=document.getElementById('search-dropdown');
  const open=dd.classList.contains('open');
  if(e.key==='Escape'){closeSearchDropdown();return;}
  if(!open)return;
  const count=Math.min(_searchResults.length,8);
  if(e.key==='ArrowDown'){e.preventDefault();setSearchActive(Math.min(_searchIdx+1,count-1));}
  else if(e.key==='ArrowUp'){e.preventDefault();setSearchActive(Math.max(_searchIdx-1,0));}
  else if(e.key==='Enter'){e.preventDefault();if(_searchIdx>=0){selectSearchResult(_searchIdx);}else{const q=document.getElementById('global-search').value.trim();if(q)openSearchPage(q);}}
}

function closeSearchDropdown(){
  const dd=document.getElementById('search-dropdown');
  dd.classList.remove('open');
  _searchIdx=-1;
}

function handleSearch(q,fromMobile){

    // Mobile: close the expand panel and go straight to search page

      const currentPage=document.querySelector('.page.on');

  else{clear.classList.remove('show');closeSearchDropdown();}

// PANEL
let PANEL_STACK=[];
// ── Mobile-safe body scroll lock ──────────────────────────────────────────
// document.body.style.overflow='hidden' alone does NOT prevent touch scroll
// on iOS Safari, and is unreliable on mobile Chrome. Proper fix: freeze the
// body at its current scrollY via position:fixed, restore on unlock.
//
// Reference-counted so nested opens (e.g. confirm modal on top of an open
// slide-panel) don't prematurely release the lock when the inner overlay
// closes. Each lockBodyScroll() must be paired with an unlockBodyScroll().
let _scrollLockY=0;
let _scrollLockCount=0;
function lockBodyScroll(){
  if(_scrollLockCount===0){
    _scrollLockY=window.pageYOffset||document.documentElement.scrollTop||0;
    const b=document.body;
    b.style.position='fixed';
    b.style.top=(-_scrollLockY)+'px';
    b.style.left='0';
    b.style.right='0';
    b.style.width='100%';
    b.style.overflow='hidden';
  }
  _scrollLockCount++;
}
function unlockBodyScroll(){
  if(_scrollLockCount===0)return;
  _scrollLockCount--;
  if(_scrollLockCount===0){
    const b=document.body;
    b.style.position='';
    b.style.top='';
    b.style.left='';
    b.style.right='';
    b.style.width='';
    b.style.overflow='';
    window.scrollTo(0,_scrollLockY);
  }
}

function updatePanelNav(){
  const backBtn=document.getElementById('panel-back-btn');
  if(!backBtn)return;
  if(PANEL_STACK.length>0){
    backBtn.disabled=false;
    backBtn.style.visibility='visible';
    backBtn.style.cursor='pointer';
  }else{
    backBtn.disabled=true;
    backBtn.style.visibility='hidden';
    backBtn.style.cursor='default';
  }
}
function openPanel(title,content,pushHistory,_meta){
  const panel=document.getElementById('slide-panel');
  const wasAlreadyOpen=panel.classList.contains('on');
  if(pushHistory && wasAlreadyOpen){
    PANEL_STACK.push({
      title:document.getElementById('panel-title').textContent,
      content:document.getElementById('panel-content').innerHTML,
      scrollTop:panel.scrollTop,
      _meta:panel._panelMeta||null
    });
  }
  panel._panelMeta=_meta||null;
  document.getElementById('panel-title').textContent=title;
  document.getElementById('panel-content').innerHTML=content;
  // Restart content stagger animation
  const pc=document.getElementById('panel-content');
  pc.style.animation='none';
  void pc.offsetWidth; // reflow
  pc.style.animation='';
  document.getElementById('panel-overlay').classList.add('on');
  panel.classList.remove('dragging');
  panel.style.transition='';
  panel.style.transform='';
  panel.classList.add('on');
  panel.scrollTop=0;
  // Only lock if the panel wasn't already open — prevents double-locking when
  // content is replaced in-place (e.g. openReturn called while item detail is showing)
  if(!wasAlreadyOpen) lockBodyScroll();
  updatePanelNav();
}
function closePanel(){
  const panel=document.getElementById('slide-panel');
  document.getElementById('panel-overlay').classList.remove('on');
  panel.classList.remove('dragging');
  panel.classList.remove('on');
  PANEL_STACK=[];
  unlockBodyScroll();
  updatePanelNav();
}
function panelBack(){
  if(!PANEL_STACK.length){closePanel();return;}
  const prev=PANEL_STACK.pop();
  const panel=document.getElementById('slide-panel');
  // If the previous panel was a category panel, re-render it live so prices are fresh
  if(prev._meta&&prev._meta.type==='category'){
    panel._panelMeta=prev._meta;
    showCategoryItems(prev._meta.cat,true);
    panel.scrollTop=prev.scrollTop||0;
    updatePanelNav();
    return;
  }
  document.getElementById('panel-title').textContent=prev.title;
  document.getElementById('panel-content').innerHTML=prev.content;
  panel._panelMeta=prev._meta||null;
  panel.scrollTop=prev.scrollTop||0;
  updatePanelNav();
}
function initPanelSwipe(){
  const panel=document.getElementById('slide-panel');
  if(!panel||panel._swipeInit)return;
  panel._swipeInit=true;
  let startX=0,startY=0,curDx=0,tracking=false,active=false,lastX=0,lastT=0,vx=0;

  panel.addEventListener('touchstart',function(e){
    if(!panel.classList.contains('on'))return;
    const t=e.touches[0];if(!t)return;
    if(e.target.closest('input,textarea,select,button,a'))return;
    active=true;tracking=false;curDx=0;vx=0;
    startX=t.clientX;startY=t.clientY;lastX=t.clientX;lastT=Date.now();
  },{passive:true});

  panel.addEventListener('touchmove',function(e){
    if(!active)return;
    const t=e.touches[0];if(!t)return;
    const dx=t.clientX-startX;
    const dy=Math.abs(t.clientY-startY);
    if(!tracking){
      if(dx<8||dy>dx)return;
      tracking=true;
      panel.classList.add('dragging');
    }
    // Confirmed horizontal swipe — stop vertical scroll and panel content scroll
    e.preventDefault();
    const now=Date.now();
    const dt=now-lastT;
    if(dt>0)vx=(t.clientX-lastX)/dt;
    lastX=t.clientX;lastT=now;
    curDx=Math.max(0,dx);
    panel.style.transform='translateX('+curDx+'px)';
  },{passive:false});

  function endSwipe(){
    if(!active)return;
    active=false;
    panel.classList.remove('dragging');
    if(!tracking){curDx=0;vx=0;panel.style.transition='';panel.style.transform='';return;}
    tracking=false;
    const threshold=panel.offsetWidth*0.35;
    const isFlick=vx>0.5&&curDx>20;
    const dismiss=isFlick||(curDx>threshold);
    curDx=0;vx=0;
    if(dismiss){
      // Animate off screen, then close — disable right transition first so only transform runs
      panel.style.transition='transform 0.25s cubic-bezier(0.4,0,1,1)';
      panel.style.transform='translateX(100%)';
      setTimeout(function(){
        // Close silently: remove .on without triggering right transition
        panel.style.transition='none';
        closePanel();
        // Clean up on next frame after close
        requestAnimationFrame(function(){
          panel.style.transition='';
          panel.style.transform='';
        });
      },250);
    } else {
      // Spring back
      panel.style.transition='transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94)';
      panel.style.transform='translateX(0px)';
      setTimeout(function(){
        panel.style.transition='';
        panel.style.transform='';
      },310);
    }
  }

  panel.addEventListener('touchend',endSwipe,{passive:true});
  panel.addEventListener('touchcancel',endSwipe,{passive:true});
}
initPanelSwipe();

  // Focus the item name field immediately — must be synchronous within the

  const qaItem=document.getElementById('qa-item');
  if(qaItem)qaItem.focus();
}

function submitQuickAdd(){
  // Session D1.5 — month bucket derived from the Date Listed input.
  // Previously a separate Month dropdown duplicated this information.
  const _qaDate=(document.getElementById('qa-date').value||new Date().toISOString().split('T')[0]);
  const m=monthKeyFromDate(_qaDate);
  // Session D1.6 — defensive gate: if a non-live platform was selected (via
  // preview mode), block submission server-side too. The button is disabled
  // by _refreshQuickAddSubmitState but a determined user could re-enable it.
  const _qaPlat=document.getElementById('qa-platform')?.value||DEFAULT_PLATFORM;
  if(!PLATFORMS[_qaPlat]||!PLATFORMS[_qaPlat].live){
    toast((PLATFORMS[_qaPlat]?.label||'This platform')+' tracking is coming soon — pick eBay to add this item','error');
    return;
  }
  // Validation gate — require an item name and a positive cost before persisting.
  // Prevents "Untitled" ghost rows from empty submits.
  const rawName=(document.getElementById('qa-item').value||'').trim();
  const rawCost=parseFloat(document.getElementById('qa-cost').value);
  if(!rawName){
    toast('Item name is required','error');
    try{document.getElementById('qa-item').focus();}catch(e){}
    return;
  }
  if(!isFinite(rawCost)||rawCost<=0){
    toast('Cost must be a positive number','error');
    try{document.getElementById('qa-cost').focus();}catch(e){}
    return;
  }
  // Read delivery mode
  const isSimple=document.getElementById('qa-delivery-simple')&&document.getElementById('qa-delivery-simple').style.display!=='none';
  const _qaSalePrice=parseFloat(document.getElementById('qa-price').value)||0;
  let postage=0,shippingCost=0,packagingCost=0,_postageMode,_sdRateIdx=1,_sdBuyerPays=false;
  if(isSimple){
    _postageMode='simple';
    // NaN-safe parse — an empty dropdown (price not yet entered) is impossible here
    // because the validation gate above requires a positive cost and rawName. If
    // somehow the dropdown is still in its disabled "" state, default to SP (1).
    const _rawIdx=parseInt(document.getElementById('qa-sd-rate')?.value,10);
    _sdRateIdx=isNaN(_rawIdx)?1:_rawIdx;
    _sdBuyerPays=document.getElementById('qa-sd-free-postage')?.checked===false;
    const rateCost=_sdRateFor(_sdRateIdx,_qaSalePrice);
    shippingCost=rateCost;
    postage=_sdBuyerPays?rateCost:0;
  }else{
    _postageMode='custom';
    postage=parseFloat(document.getElementById('qa-postage')?.value)||0;
    shippingCost=parseFloat(document.getElementById('qa-shipping')?.value)||0;
    packagingCost=parseFloat(document.getElementById('qa-packaging')?.value)||0;
  }
  const item={
    id:'qa_'+Date.now(),
    gid:'R-'+String(getNextGID()).padStart(4,'0'),
    dateListed:_qaDate,
    item:rawName,
    source:document.getElementById('qa-source').value||'',
    category:document.getElementById('qa-category').value||'',
    location:document.getElementById('qa-location').value||'',
    costPrice:rawCost,
    salePrice:parseFloat(document.getElementById('qa-price').value)||0,
    postage,shippingCost,packagingCost,
    _postageMode,_sdRateIdx,_sdBuyerPays,
    promoPercent:(parseFloat(document.getElementById('qa-promo').value)||0)/100,
    defaultPlatform:(document.getElementById('qa-platform')?.value)||DEFAULT_PLATFORM,
    dateSold:null,grossProfit:null,isReturned:false
  };
  item.category=item.category||autoCategory(item.item);
  if(!item.notes)item.notes='';if(!item.parts)item.parts=[];
  if(!item.returnHistory)item.returnHistory=[];
  if(item.isReturned===undefined)item.isReturned=false;
  if(!Array.isArray(DB[m])) DB[m]=[];
  DB[m].push(item);saveDB();closePanel();
  SELECTED_MONTH=m;MONTH_SORT='date-listed';MONTH_FILTER='all';
  SELECTION_MODE=false;SELECTED_ITEMS.clear();
  openItemPage(m,item.id,'p-monthly');
}

function getNextGID(){
  let max=0;
  allDBKeys().forEach(k=>(DB[k]||[]).forEach(i=>{
    const gid=String(i.gid||'');
    const m=gid.match(/(\d+)$/);
    const n=m?parseInt(m[1],10):0;
    if(n>max)max=n;
  }));
  return max+1;
}

// Session D1 — Quick Add platform selector handler.
// Sets the active pill (visual) and the hidden #qa-platform value (persisted).
// Disabled (coming-soon) pills can't be activated via onclick because they're
// `disabled`, but defensively reject them here too.
// Session D1 → D1.6 — Quick Add platform selector handler.
// D1: only live platforms could be selected; non-live were `disabled`.
// D1.6: ALL platforms are now selectable so users can preview the form
// adaptation and see what's coming. Submission is gated separately by
// _refreshQuickAddSubmitState — non-live platforms lock the Add button
// and show a Coming Soon banner with a CTA back to eBay.
function qaSetPlatform(platformId){
  if(!PLATFORMS[platformId])return;
  const hidden=document.getElementById('qa-platform');
  if(hidden)hidden.value=platformId;
  const row=document.getElementById('qa-platform-row');
  if(row){
    row.querySelectorAll('.qa-platform-pill').forEach(b=>{
      b.classList.toggle('active',b.dataset.platform===platformId);
    });
  }
  // D1.6 — adapt the price label, helper text and lock-state to the platform
  _refreshQuickAddPriceCopy();
  _refreshQuickAddSubmitState();
  // Recompute the preview so fee labels + numbers update live.
  if(typeof updateBPFPreview==='function')updateBPFPreview();
}

// Session D1.6 — Refresh price input label + helper text from the active
// platform's pricing pattern. Pure DOM update; does not change values.
function _refreshQuickAddPriceCopy(){
  const platformId=document.getElementById('qa-platform')?.value||DEFAULT_PLATFORM;
  const stub={defaultPlatform:platformId};
  const copy=_platformPricingCopy(stub);
  const lbl=document.getElementById('qa-price-label');
  if(lbl)lbl.textContent=copy.inputLabel;
  const helper=document.getElementById('qa-price-helper');
  if(helper){
    if(copy.inputHelper){
      helper.textContent=copy.inputHelper;
      helper.style.display='';
    }else{
      helper.style.display='none';
    }
  }
}

// Session D1.6 — Lock the Add button and show the Coming Soon banner
// when the user has selected a non-live platform. CTA bounces them
// back to eBay so they can actually create the item.
function _refreshQuickAddSubmitState(){
  const platformId=document.getElementById('qa-platform')?.value||DEFAULT_PLATFORM;
  const platform=PLATFORMS[platformId];
  const isLive=platform&&platform.live;
  const btn=document.getElementById('qa-submit-btn');
  const banner=document.getElementById('qa-coming-soon-banner');
  const csTitle=document.getElementById('qa-cs-title');
  const csDetail=document.getElementById('qa-cs-detail');
  if(btn){
    btn.disabled=!isLive;
    btn.classList.toggle('locked',!isLive);
    btn.textContent=isLive?'Add Item':'Add Item — locked';
  }
  if(banner){
    banner.style.display=isLive?'none':'flex';
    if(!isLive&&csTitle&&csDetail&&platform){
      csTitle.textContent=platform.label+' tracking coming soon';
      csDetail.textContent='We\'re still building the fee model for '+platform.short+'. Items can\'t be tracked here yet.';
    }
  }
}

function qaSetDeliveryMode(mode){

// Quick Add — rebuild the Simple Delivery dropdown whenever the listed
// price changes. Below £0.01 the dropdown is disabled with a placeholder;
// otherwise options render with tier-correct prices via _sdOptionsFor().
// The previously-selected index is preserved across rebuilds so changing
// the price from £95 → £105 only shifts the visible price, not the size.
function updateSDDropdown(){
  const sel=document.getElementById('qa-sd-rate');
  if(!sel)return;
  const price=parseFloat(document.getElementById('qa-price')?.value)||0;
  if(price<=0){
    sel.disabled=true;
    sel.style.opacity='0.55';
    sel.style.cursor='not-allowed';
    sel.style.color='var(--muted)';
    sel.innerHTML='<option value="">Enter listed price to see options</option>';
    updateBPFPreview();
    return;
  }
  // Preserve current selection if valid; default to SP (index 1) on first enable.
  let prev=parseInt(sel.value,10);
  if(isNaN(prev)||prev<0||prev>=SIMPLE_DELIVERY_RATES.length)prev=1;
  sel.disabled=false;
  sel.style.opacity='1';
  sel.style.cursor='';
  sel.style.color='var(--text)';
  sel.innerHTML=_sdOptionsFor(price,prev);
  updateBPFPreview();
}

function updateBPFPreview(){
  const price=parseFloat(document.getElementById('qa-price').value)||0;
  const preview=document.getElementById('bpf-preview');
  if(price<=0){preview.style.display='none';return;}
  // Session D1.5 — route fee calc and labels through the platform dispatcher
  // so the preview adapts when the user changes the Listed-on pill. Falls
  // back to eBay if the platform field hasn't been mounted yet.
  const _qaPlatform=document.getElementById('qa-platform')?.value||DEFAULT_PLATFORM;
  const _qaItem={defaultPlatform:_qaPlatform};
  const bpf=calcPlatformBPF(_qaItem,price);
  const lbl=_platformFeeLabel(_qaItem);
  const net=price-bpf;
  // Update the preview's three text slots; also refresh the fee/price labels.
  const listedEl=document.getElementById('bpf-listed');
  const feeEl=document.getElementById('bpf-fee');
  const totalEl=document.getElementById('bpf-total');
  const listedLabelEl=document.getElementById('bpf-listed-label');
  const feeLabelEl=document.getElementById('bpf-fee-label');
  if(listedLabelEl)listedLabelEl.textContent=lbl.priceLabel+': ';
  if(feeLabelEl)feeLabelEl.textContent='− '+lbl.feeLabel+': ';
  listedEl.textContent=fmt(price);
  feeEl.textContent=fmt(bpf);
  totalEl.textContent=fmt(net);
  preview.style.display='block';
  const cost=parseFloat(document.getElementById('qa-cost').value)||0;
  // Read postage from whichever mode is active
  const isSimple=document.getElementById('qa-delivery-simple')&&document.getElementById('qa-delivery-simple').style.display!=='none';
  let shipping=0,buyerPostage=0,packaging=0;
  if(isSimple){
    const _sdRaw=parseInt(document.getElementById('qa-sd-rate')?.value,10);
    const sdIdx=isNaN(_sdRaw)?1:_sdRaw;
    const rateCost=_sdRateFor(sdIdx,price);
    const buyerPays=document.getElementById('qa-sd-free-postage')?.checked===false;
    shipping=rateCost;
    buyerPostage=buyerPays?rateCost:0;
  }else{
    shipping=parseFloat(document.getElementById('qa-shipping')?.value)||0;
    buyerPostage=parseFloat(document.getElementById('qa-postage')?.value)||0;
    packaging=parseFloat(document.getElementById('qa-packaging')?.value)||0;
  }
  const promoRaw=parseFloat(document.getElementById('qa-promo').value)||0;
  const promoPercent=promoRaw/100;
  const promoCost=net*promoPercent*1.20;
  const rev=price+buyerPostage-bpf;
  const totalCost=cost+shipping+packaging+promoCost;
  const profit=+(rev-totalCost).toFixed(2);
  const profitEl=document.getElementById('profit-preview');
  const valEl=document.getElementById('profit-val');
  const roiEl=document.getElementById('profit-roi');
  if(cost>0||shipping>0||packaging>0||promoPercent>0){profitEl.style.display='block';valEl.textContent=fmt(profit);valEl.style.color=profit>=0?'var(--green)':'var(--red)';if(cost>0){const ti=cost+shipping+packaging+bpf+promoCost;const roi=ti>0?((profit/ti)*100).toFixed(1):null;roiEl.textContent=roi!==null?roi+'% ROI':'';}else{roiEl.textContent='';}}
  else{profitEl.style.display='none';}
}

function showCategoryItems(cat,_fromBack){
  let items=[];
  allDBKeys().forEach(k=>{(DB[k]||[]).forEach(i=>{
    if((i.item||'').trim().toUpperCase()==='MONTH END')return;
    if((i.category||'Other')===cat)items.push({...i,month:k});
  });});
  const sold=items.filter(i=>(i.dateSold||i.resaleSalePrice)&&!i.isReturned);
  const active=items.filter(i=>!i.dateSold&&!i.isReturned&&!i.resaleSalePrice);
  // Sort: listed first (by days listed desc — most urgent top), then sold (most recent first), then returned
  items.sort((a,b)=>{
    const statusOrder=i=>{
      if(!i.dateSold&&!i.isReturned&&!i.resaleSalePrice)return 0;
      if((i.dateSold||i.resaleSalePrice)&&!i.isReturned)return 1;
      return 2;
    };
    const so=statusOrder(a)-statusOrder(b);
    if(so!==0)return so;
    // Within listed: most days listed first (most urgent)
    if(statusOrder(a)===0){
      const _today=new Date().toISOString().split('T')[0];
      const dA=a.dateListed?daysBetween(a.dateListed,_today):0;
      const dB=b.dateListed?daysBetween(b.dateListed,_today):0;
      return dB-dA;
    }
    // Within sold: most recent sale first
    const dateA=(a.resaleDateSold||a.dateSold||'');
    const dateB=(b.resaleDateSold||b.dateSold||'');
    return dateB.localeCompare(dateA);
  });
  const totalProfit=sold.reduce((s,i)=>s+calcGrossProfit(i),0);
  const soldWithDate=sold.filter(i=>calcDaysToSell(i)!==null);
  const avgDays=soldWithDate.length?Math.round(soldWithDate.reduce((s,i)=>s+calcDaysToSell(i),0)/soldWithDate.length):null;
  const html=`
    <div style="margin-bottom:16px;background:var(--surface2);border-radius:10px;padding:14px">
      <div style="font-size:16px;font-weight:700;margin-bottom:6px">${esc(cat)}</div>
