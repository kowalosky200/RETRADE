function renderStock(){
  const today=new Date().toISOString().split('T')[0];
  let allListed=[];
  allDBKeys().forEach(k=>(DB[k]||[]).forEach(i=>{ if(!i.dateSold&&!i.isReturned&&!i.resaleSalePrice&&((i.item||'').trim().toUpperCase()!=='MONTH END'))allListed.push({...i,month:k}); }));
  const cAll=allListed.length;
  const cStale=allListed.filter(i=>daysBetween(i.dateListed,today)>=90).length;
  let items=allListed;
  if(STOCK_FILTER==='stale')items=allListed.filter(i=>daysBetween(i.dateListed,today)>=90);
  else if(STOCK_FILTER==='slow')items=allListed.filter(i=>{const d=daysBetween(i.dateListed,today);return d>60&&d<90;});
  else if(STOCK_FILTER==='maturing')items=allListed.filter(i=>{const d=daysBetween(i.dateListed,today);return d>30&&d<=60;});
  else if(STOCK_FILTER==='fresh')items=allListed.filter(i=>daysBetween(i.dateListed,today)<=30);
  // Session E1 — Sort comparator with expanded options:
  //   profit     → highest estimated profit £ first (default)
  //   roi        → highest ROI % first (capital efficiency)
  //   price      → highest ask price first
  //   days-desc  → oldest first (was 'days' pre-E1; legacy still routed here)
  //   days-asc   → newest first
  const sortCmp=(a,b)=>{
    if(STOCK_SORT==='profit')return(calcGrossProfit(b)||0)-(calcGrossProfit(a)||0);
    if(STOCK_SORT==='roi'){
      // For ROI, compute on-the-fly using profit / invested. Active stock
      // has no salePrice/dateSold yet — but calcROI works on est. profit
      // when we substitute salePrice. We use: est profit / total invested.
      const investA=(a.costPrice||0)+(a.shippingCost||0)+(a.packagingCost||0)+calcPartsCost(a);
      const investB=(b.costPrice||0)+(b.shippingCost||0)+(b.packagingCost||0)+calcPartsCost(b);
      const roiA=investA>0?((calcGrossProfit(a)||0)/investA)*100:-Infinity;
      const roiB=investB>0?((calcGrossProfit(b)||0)/investB)*100:-Infinity;
      return roiB-roiA;
    }
    if(STOCK_SORT==='price')return(b.salePrice||0)-(a.salePrice||0);
    if(STOCK_SORT==='days-asc')return daysBetween(a.dateListed,today)>daysBetween(b.dateListed,today)?1:-1;
    // 'days-desc' or legacy 'days' → oldest first
    return daysBetween(a.dateListed,today)<daysBetween(b.dateListed,today)?1:-1;
  };
  items=[...items].sort(sortCmp);
  const totalValue=allListed.reduce((s,i)=>s+(i.salePrice||0),0);
  const potentialProfit=allListed.reduce((s,i)=>s+(calcGrossProfit(i)||0),0);
  const avgAsking=allListed.length?totalValue/allListed.length:0;

  // Build listing-month groups when grouped mode is on. Iterate FY keys in
  // chronological-newest-first order so users see latest stock first.
  let groupedHTML='';
  if(STOCK_GROUPED){
    // Use the same FY ordering as Monthly grid (newest FY first, within FY: most recent month first).
    const monthOrder=allDBKeys();
    const monthSet=new Set(items.map(i=>i.month));
    const orderedKeys=monthOrder.filter(k=>monthSet.has(k));
    // Sort orderedKeys by listing date descending (most recent month first)
    orderedKeys.sort((a,b)=>{
      const ya=keyYear(a), yb=keyYear(b);
      if(ya!==yb)return yb-ya;
      const ma=MONTHS.indexOf(keyCode(a)), mb=MONTHS.indexOf(keyCode(b));
      return mb-ma;
    });
    orderedKeys.forEach(k=>{
      const groupItems=items.filter(i=>i.month===k).sort(sortCmp);
      if(groupItems.length===0)return;
      const groupValue=groupItems.reduce((s,i)=>s+(i.salePrice||0),0);
      const groupProfit=groupItems.reduce((s,i)=>s+(calcGrossProfit(i)||0),0);

        +'</div>'
        +'<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">'

  const cMaturing=ageBuckets.maturing, cSlow=ageBuckets.slow;

  const html=`

          <svg width="13" height="13" viewBox="0 0 15 15" fill="none" style="vertical-align:-1px;margin-right:4px"><rect x="1" y="1" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="8.5" y="1" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="1" y="8.5" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="8.5" y="8.5" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.3"/></svg>${STOCK_GROUPED?'By month':'By month'}

  document.getElementById('p-stock').innerHTML=html;

// EXPENSES PAGE

// BUG-07: Per-trip cost engine with HMRC mid-trip tiering and per-trip expenses.
// Returns an array (same length as input, same order) where each entry is:
//   {id, mileageCost, expensesCost, totalCost, tier1Miles, tier2Miles,
//    tier1Cost, tier2Cost, ratePerMile, isSplit}
// Algorithm:
//   1. Group trips by UK tax year (6 Apr - 5 Apr); the 10,000-mile HMRC
//      tier-1 ceiling resets each tax year.
//   2. Walk trips within each year in DATE order, maintaining cumulative
//      milesUsed. For each trip:
//        - all miles fit under 10k          → all at trip.ratePerMile
//        - all miles already over 10k       → all at 0.25
//        - mid-trip split                   → portion at trip.ratePerMile
//                                             until 10k, remainder at 0.25
//   3. Add per-trip expenses (sum of t.expenses[*].amount) on top.
// Notes:
//   - When a trip's stored ratePerMile differs from 0.45, tier-1 uses that
//     stored rate (user override). Tier-2 always uses HMRC's 0.25.
//   - Sums of all per-trip totalCost reconcile EXACTLY to the existing
//     L5826-style year-aggregate formula (sum_year(min(M,10k)*0.45 +
//     max(0,M-10k)*0.25)) when ratePerMile=0.45 across the board.
function calcTieredTrips(trips){
  function _tyOf(ds){
    if(!ds)return null;
    const d=new Date(ds);
    const y=d.getFullYear();
    return (d.getMonth()<3||(d.getMonth()===3&&d.getDate()<6))?y-1:y;
  }
  // Build tax-year buckets, each sorted by date asc to preserve walk order.
  const byYear={};
  trips.forEach(function(t,idx){
    const ty=_tyOf(t.date);
    if(ty===null) return;
    (byYear[ty]=byYear[ty]||[]).push({t:t,idx:idx});
  });
  Object.keys(byYear).forEach(function(ty){
    byYear[ty].sort(function(a,b){return (a.t.date||'').localeCompare(b.t.date||'');});
  });
  // Output array indexed by original trip position.
  const out=trips.map(function(t){
    const expensesCost=Array.isArray(t.expenses)?t.expenses.reduce(function(s,e){return s+(Number(e.amount)||0);},0):0;
    return {
      id:t.id,
      mileageCost:0, expensesCost:+expensesCost.toFixed(2),
      totalCost:+expensesCost.toFixed(2),
      tier1Miles:0, tier2Miles:0,
      tier1Cost:0, tier2Cost:0,
      ratePerMile:Number(t.ratePerMile)||0.45,
      isSplit:false
    };
  });
  // Walk each tax year in date order.
  Object.keys(byYear).forEach(function(ty){
    let used=0;
    byYear[ty].forEach(function(entry){
      const t=entry.t;
      const m=Number(t.mileage)||0;
      const rate=Number(t.ratePerMile)||0.45;
      let tier1=0, tier2=0;
      if(used+m<=10000){
        tier1=m;
      }else if(used>=10000){
        tier2=m;
      }else{
        tier1=10000-used;
        tier2=m-tier1;
      }
      const tier1Cost=+(tier1*rate).toFixed(2);
      const tier2Cost=+(tier2*0.25).toFixed(2);
      const mileageCost=+(tier1Cost+tier2Cost).toFixed(2);
      const o=out[entry.idx];
      o.mileageCost=mileageCost;
      o.tier1Miles=tier1;
      o.tier2Miles=tier2;
      o.tier1Cost=tier1Cost;
      o.tier2Cost=tier2Cost;
      o.totalCost=+(mileageCost+o.expensesCost).toFixed(2);
      o.isSplit=tier1>0&&tier2>0;
      used+=m;
    });
  });
  return out;
}

function renderExpenses(){
  const trips=DB.trips||[];
  const expenses=DB.expenses||[];
  // BUG-07: per-trip cost engine — handles HMRC mid-trip tiering AND
  // per-trip expenses (parking, entry fees, etc.). Trip card total now
  // reconciles exactly to the sum of per-trip totalCosts.
  const tiered=calcTieredTrips(trips);
  // Build an O(1) lookup by trip id for the row render.
  const _tieredById={};
  trips.forEach(function(t,idx){ if(t&&t.id) _tieredById[t.id]=tiered[idx]; });
  const totalTripMileage=tiered.reduce(function(s,r){return s+r.mileageCost;},0);
  const totalTripExpenses=tiered.reduce(function(s,r){return s+r.expensesCost;},0);
  const totalTrips=+(totalTripMileage+totalTripExpenses).toFixed(2);
  const _totalMilesAll=trips.reduce((s,t)=>s+(t.mileage||0),0);
  const _anyTier2=tiered.some(function(r){return r.tier2Miles>0;});
  const _anyExtras=totalTripExpenses>0;
  const totalExp=expenses.reduce((s,e)=>s+(e.amount||0),0);
  
  const html=`
    <div class="page-header">
      <div>
        <div class="page-title">Expenses</div>
        <div class="page-subtitle">Track sourcing trips and business costs</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-s" onclick="addTrip()">+ Trip</button>
        <button class="btn btn-p" onclick="addExpense()">+ Expense</button>
      </div>
    </div>

    <div class="kgrid kgrid-3 kgrid-1col">
      <div class="kcard">
        <div class="klabel">Trip Expenses</div>
        <div class="kval">${fmt(totalTrips)}</div>
        <div class="ksub">${trips.length} trips &middot; ${_totalMilesAll.toFixed(1)} miles${_anyTier2?' &middot; HMRC-tiered':''}${_anyExtras?' &middot; +extras':''}</div>
      </div>
      <div class="kcard">
        <div class="klabel">Other Expenses</div>
        <div class="kval">${fmt(totalExp)}</div>
        <div class="ksub">${expenses.length} items</div>
      </div>
      <div class="kcard r">
        <div class="klabel">Total Deductions</div>
        <div class="kval">${fmt(totalTrips+totalExp)}</div>
        <div class="ksub">For tax year</div>
      </div>
    </div>

    <div class="sl">Sourcing Trips</div>
    ${trips.length===0?`
      <div class="empty-state">
        <div class="empty-state-icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h11l4 4v4a2 2 0 0 1-2 2h-1"/><path d="M14 17a2 2 0 1 0 4 0 2 2 0 0 0-4 0"/><path d="M5 17a2 2 0 1 0 4 0 2 2 0 0 0-4 0"/><line x1="3" y1="9" x2="14" y2="9"/></svg></div>
        <div class="empty-state-text">No trips logged</div>
        <div class="empty-state-sub">Log sourcing runs to claim mileage at HMRC approved rate</div>
      </div>
    `:`
      ${[...trips].map((t,_,arr)=>({t,origIdx:trips.indexOf(t)})).sort((a,b)=>(b.t.date||'').localeCompare(a.t.date||'')).map(({t,origIdx})=>{
        const r=_tieredById[t.id]||{totalCost:0,mileageCost:0,expensesCost:0,isSplit:false,tier1Miles:0,tier2Miles:0,ratePerMile:t.ratePerMile||0.45};
        const expCount=Array.isArray(t.expenses)?t.expenses.length:0;
        // Rate display: show the applied rate(s) after tiering, not the raw
        // form input. A pure tier-1 trip shows trip.ratePerMile (usually 45p),
        // a pure tier-2 trip shows 0.25, and a split trip shows both.
        let rateLabel;
        if(r.isSplit){
          rateLabel=fmt(r.ratePerMile||0.45)+'+'+fmt(0.25);
        }else if(r.tier2Miles>0){
          rateLabel=fmt(0.25);

// BUG-07: shared HTML builder for the per-trip extras repeater. existing is
// an array of {desc, amount} pairs (or empty). Rendered as a list of rows
// with +/- buttons. Saved by walking #trip-extras-list children.
//
// UX: when no extras exist yet, render ONE empty starter row so the inputs
// are visible without an extra tap. _readTripExtras() drops empty rows on
// save, so this is purely a visibility hint.
function _tripExtrasHTML(existing){
  const list=(existing&&existing.length)?existing:[{desc:'',amount:null}];
  const rows=list.map(function(e,i){return _tripExtraRowHTML(i,e.desc,e.amount);}).join('');
  return `
    <div class="fg" style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
      <label style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-weight:600">Other costs <span style="color:var(--muted);font-weight:400;font-size:12px">parking, entry fees, etc.</span></span>
        <button type="button" class="btn btn-s" style="padding:4px 12px;font-size:12px" onclick="_tripExtraAdd()">+ Add row</button>
      </label>
      <div id="trip-extras-list">${rows}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:6px">Leave blank if not applicable. Empty rows are ignored on save.</div>
    </div>
  `;
}
function _tripExtraRowHTML(i,desc,amt){
  return `
    <div class="trip-extra-row" data-idx="${i}" style="display:grid;grid-template-columns:1fr 110px 36px;gap:6px;margin-top:6px;align-items:center">
      <input type="text" class="trip-extra-desc" placeholder="Description" value="${esc(desc||'')}">
      <input type="number" class="trip-extra-amt" step="0.01" min="0" placeholder="0.00" value="${amt!=null?amt:''}">
      <button type="button" class="btn btn-s" style="padding:6px;color:var(--red);border-color:rgba(248,113,113,0.3)" onclick="_tripExtraRemove(this)" aria-label="Remove">×</button>
    </div>
  `;
}
function _tripExtraAdd(){
  const list=document.getElementById('trip-extras-list');
  if(!list)return;
  const i=list.children.length;
  list.insertAdjacentHTML('beforeend', _tripExtraRowHTML(i,'',null));
}
function _tripExtraRemove(btn){
  const row=btn.closest('.trip-extra-row');
  if(row&&row.parentNode) row.parentNode.removeChild(row);
}
// Read extras from DOM into a clean [{desc,amount}, ...] array.
// Drops any row with empty description AND empty/zero amount.
function _readTripExtras(){
  const out=[];
  const rows=document.querySelectorAll('#trip-extras-list .trip-extra-row');
  rows.forEach(function(row){
    const desc=(row.querySelector('.trip-extra-desc').value||'').trim();
    const amtRaw=row.querySelector('.trip-extra-amt').value;
    const amt=parseFloat(amtRaw);
    if(!desc && (!isFinite(amt)||amt<=0)) return; // empty row
    out.push({desc:desc||'(unlabelled)', amount:isFinite(amt)&&amt>0?+amt.toFixed(2):0});
  });
  return out;
}

// BUG-07: Trip cost breakdown panel — opened by tapping a trip row.
// Shows mileage tier breakdown (45p portion + 25p portion when split),
// the per-trip extras list, and a final total. Reads tiering from the
// fresh calcTieredTrips walk so values reconcile to the KPI card.
function showTripBreakdown(idx){
  const trips=DB.trips||[];
  const t=trips[idx];
  if(!t){ toast('Trip not found','err'); return; }
  const tiered=calcTieredTrips(trips);
  const r=tiered[idx]||{mileageCost:0,expensesCost:0,totalCost:0,tier1Miles:0,tier2Miles:0,tier1Cost:0,tier2Cost:0,ratePerMile:0.45,isSplit:false};
  const extras=Array.isArray(t.expenses)?t.expenses:[];
  function row(label, sub, val, color){
    const c=color||'var(--text)';
    return `<div style="display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border);gap:12px">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;color:var(--text)">${label}</div>
        ${sub?`<div style="font-size:11px;color:var(--muted);margin-top:2px">${sub}</div>`:''}
      </div>
      <div style="font-family:'Space Mono',monospace;font-size:14px;font-weight:600;color:${c};flex-shrink:0">${val}</div>
    </div>`;
  }
  let body='';
  // Header — trip identity
  body+=`<div style="margin-bottom:12px;padding:12px;background:var(--surface2);border-radius:8px">
    <div style="font-size:14px;font-weight:600;color:var(--text)">${esc(t.description||'Sourcing trip')}</div>
    <div style="font-size:12px;color:var(--muted);margin-top:4px">${t.date||''} &middot; ${t.mileage||0} mi</div>
  </div>`;
  // Mileage section
  body+=`<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin:14px 0 4px">Mileage</div>`;
  if(r.tier1Miles>0){
    body+=row(
      'Tier 1 — '+r.tier1Miles.toFixed(1)+' mi',
      '@ '+fmt(r.ratePerMile||0.45)+'/mi (HMRC standard rate)',
      fmt(r.tier1Cost)
    );
  }
  if(r.tier2Miles>0){
    body+=row(
      'Tier 2 — '+r.tier2Miles.toFixed(1)+' mi',
      '@ £0.25/mi (over 10,000 mi annual cap)',
      fmt(r.tier2Cost),
      'var(--accent)'
    );
  }
  if(r.tier1Miles===0&&r.tier2Miles===0){
    body+=`<div style="padding:8px 0;color:var(--muted);font-size:13px">No mileage on this trip</div>`;
  }
  // Extras section
  if(extras.length>0){
    body+=`<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin:14px 0 4px">Other costs</div>`;
    extras.forEach(function(e){
      body+=row(esc(e.desc||'(unlabelled)'), '', fmt(Number(e.amount)||0));
    });
  }
  // Total
  body+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:14px 0 4px;margin-top:8px;border-top:2px solid var(--border)">
    <div style="font-size:13px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:0.06em">Total claim</div>
    <div style="font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--green)">${fmt(r.totalCost)}</div>
  </div>`;
  // Action footer
  body+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px">
    <button class="btn btn-s" onclick="closePanel();editTrip(${idx})">Edit trip</button>
    <button class="btn btn-s" onclick="closePanel()">Close</button>
  </div>`;
  if(r.isSplit){
    body+=`<div style="font-size:11px;color:var(--muted);margin-top:10px;line-height:1.5;padding:8px 10px;background:var(--surface2);border-radius:6px">
      <strong style="color:var(--accent)">Mid-trip split:</strong> this trip crossed the 10,000-mile annual HMRC cap, so the first portion claims at the standard rate and the remainder at £0.25/mi.
    </div>`;
  }
  openPanel('Trip Breakdown', body);
}

function exportDB(){
  // Build a clean export — strip user_id and internal flags so the backup
  // is portable and never contains account-specific identifiers
  const exportData = {};
  allDBKeys().forEach(k => {
    if(!(DB[k]||[]).length) return;
    exportData[k] = (DB[k]||[]).map(i => {
      const clean = Object.assign({}, i);
      delete clean.user_id;
      if(clean.parts) clean.parts = clean.parts.map(p => { const cp=Object.assign({},p); delete cp.user_id; return cp; });
      if(clean.returnHistory) clean.returnHistory = clean.returnHistory.map(r => { const cr=Object.assign({},r); delete cr.user_id; return cr; });
      return clean;
    });
  });
  if(DB.trips) exportData.trips = DB.trips.map(t => { const ct=Object.assign({},t); delete ct.user_id; return ct; });
  if(DB.expenses) exportData.expenses = DB.expenses.map(e => { const ce=Object.assign({},e); delete ce.user_id; return ce; });
  const json=JSON.stringify(exportData,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`retrade_backup_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Database exported');
}

function importDB(e){
  const file=e.target.files[0];
  if(!file)return;
  // Reset file input so the same file can be re-selected if needed
  e.target.value='';
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const imported=JSON.parse(ev.target.result);
      imported._userOwned=true;

      const TRACKED=['salePrice','costPrice','dateSold','shippingCost','postage','packagingCost','promoPercent','location','item'];

      // ── MERGE DIFF ─────────────────────────────────────────────────────────
      // New   = in file, not in DB            → always added, no prompt
      // Dupe  = in both (matched by id or name+date) → shown with Replace/Skip
      // Untouched = in DB only                → never deleted (merge mode)
      const newItems=[], dupeItems=[];

      allDBKeys().forEach(m=>{
        const inc=(imported[m]||[]).filter(i=>(i.item||'').trim().toUpperCase()!=='MONTH END');
        const cur=(DB[m]||[]).filter(i=>(i.item||'').trim().toUpperCase()!=='MONTH END');
        inc.forEach(a=>{
          const b=cur.find(c=>c.id===a.id||(c.item===a.item&&c.dateListed===a.dateListed));
          if(!b){
            newItems.push({m, item:a.item, dateListed:a.dateListed, data:a});
          } else if(TRACKED.some(f=>String(b[f]??'')!==String(a[f]??''))){
            dupeItems.push({m, item:a.item, dateListed:a.dateListed, incoming:a, existing:b, replace:false});
          }
          // identical match → no action needed
        });
      });

      // BUG-06: distinguish "valid file, all already imported" from "file has
      // no recognisable items". Walk the parsed payload and check for any
      // month-key array containing at least one item-shaped entry (an object
      // with an 'item' string field). If none, the file isn't a valid export.
      const _hasAnyValidItems = Object.keys(imported||{}).some(function(k){
        const arr = imported[k];
        if(!Array.isArray(arr)) return false;
        return arr.some(function(x){
          return x && typeof x === 'object' && typeof x.item === 'string' && x.item.trim() !== '';
        });
      });

      // Store on window for confirm to access
      window._pendingImport = { imported, newItems, dupeItems };

      // ── BUILD REVIEW PANEL HTML ─────────────────────────────────────────────
      const isMob = window.innerWidth < 600;

      function newRows(){
        if(!newItems.length) return '';
        const rows = newItems.slice(0,20).map(r=>
          `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px">
            <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">＋ ${esc(r.item)}</span>
            <span style="color:var(--muted);flex-shrink:0;margin-left:8px">${r.m} · ${r.dateListed||'—'}</span>
          </div>`).join('');
        const more = newItems.length>20 ? `<div style="font-size:11px;color:var(--muted);padding:5px 0">…and ${newItems.length-20} more</div>` : '';
        return rows+more;
      }

      function dupeRows(){
        if(!dupeItems.length) return '';
        // Bulk toggle row
        const bulk = `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0 10px;border-bottom:2px solid var(--border);margin-bottom:4px">
            <span style="font-size:12px;font-weight:600;color:var(--text-secondary)">All duplicates:</span>
            <div style="display:flex;gap:6px">
              <button onclick="_importBulkDupe('replace')" style="padding:4px 10px;font-size:11px;font-weight:700;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer">Replace all</button>
              <button onclick="_importBulkDupe('skip')" style="padding:4px 10px;font-size:11px;font-weight:700;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer">Skip all</button>
            </div>
          </div>`;
        const rows = dupeItems.map((r,i)=>
          `<div id="dupe-row-${i}" style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;gap:8px">
            <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">⚠️ ${esc(r.item)}<span style="color:var(--muted);margin-left:6px">${r.m} · ${r.dateListed||'—'}</span></span>
            <div style="display:flex;gap:4px;flex-shrink:0">
              <button id="dupe-replace-${i}" onclick="_importToggleDupe(${i},'replace')"
                style="padding:3px 8px;font-size:11px;font-weight:700;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;transition:all 0.1s">
                Replace
              </button>
              <button id="dupe-skip-${i}" onclick="_importToggleDupe(${i},'skip')"
                style="padding:3px 8px;font-size:11px;font-weight:700;border-radius:5px;border:1px solid var(--accent);background:var(--accent-dim);color:var(--accent);cursor:pointer;transition:all 0.1s">
                Skip ✓
              </button>
            </div>
          </div>`).join('');
        return bulk+rows;
      }

      const nothingToShow = !newItems.length && !dupeItems.length;

      const html=`
        ${isMob ? `<div style="text-align:center;margin-bottom:12px;color:var(--text-secondary);font-size:12px;">
          <span style="display:inline-flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M8 13l-3-3M8 13l3-3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Scroll down to confirm
          </span>
        </div>` : ''}

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
          <div style="background:var(--green-dim);border:1px solid rgba(34,197,94,0.2);border-radius:8px;padding:12px;text-align:center">
            <div style="font-size:24px;font-weight:700;color:var(--green)">${newItems.length}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">New items</div>
          </div>
          <div style="background:var(--accent-dim);border:1px solid rgba(240,168,48,0.2);border-radius:8px;padding:12px;text-align:center">
            <div style="font-size:24px;font-weight:700;color:var(--accent)">${dupeItems.length}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">Duplicates</div>
          </div>
        </div>

        <div style="font-size:12px;color:var(--text-secondary);margin-bottom:16px;padding:10px 12px;background:var(--surface2);border-radius:8px;line-height:1.6">
          This will <strong style="color:var(--text)">merge into</strong> your current database. New items are added automatically. Items only in your DB are never deleted.
          ${dupeItems.length>0 ? `<br><span style="color:var(--accent)">⚠️ ${dupeItems.length} duplicate${dupeItems.length!==1?'s':''} found — choose Replace or Skip for each below. Defaults to Skip.</span>` : ''}
        </div>

        ${nothingToShow ? (_hasAnyValidItems
          ? `<div style="padding:20px 0;text-align:center;color:var(--muted);font-size:13px">Everything in this file is already up to date in your database.</div>`
          : `<div style="padding:20px 0;text-align:center;color:var(--muted);font-size:13px">No valid items found in this file.</div>`) : ''}

        ${newItems.length ? `
          <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">
            New items (${newItems.length})
          </div>
          <div style="margin-bottom:16px">${newRows()}</div>` : ''}

        ${dupeItems.length ? `
          <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">
            Duplicates — choose action (${dupeItems.length})
          </div>
          <div style="margin-bottom:80px">${dupeRows()}</div>` : '<div style="margin-bottom:80px"></div>'}

        <div style="position:sticky;bottom:0;background:var(--surface);padding:12px 0 4px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;">
          <button class="btn btn-s" onclick="closePanel()">Cancel</button>
          <button class="btn btn-p" onclick="_confirmJSONImport()">Confirm import</button>
        </div>`;

      openPanel('Review Import', html);
    }catch(err){
      toast("Couldn't read file — invalid JSON",'err');
    }
  };
  reader.readAsText(file);
}

// Toggle a single duplicate row between Replace and Skip
function _importToggleDupe(idx, action){
  if(!window._pendingImport) return;
  window._pendingImport.dupeItems[idx].replace = (action === 'replace');
  const replBtn = document.getElementById(`dupe-replace-${idx}`);
  const skipBtn = document.getElementById(`dupe-skip-${idx}`);
  if(!replBtn || !skipBtn) return;
  if(action === 'replace'){
    replBtn.style.cssText = 'padding:3px 8px;font-size:11px;font-weight:700;border-radius:5px;border:1px solid var(--blue);background:rgba(59,130,246,0.12);color:var(--blue);cursor:pointer;transition:all 0.1s';
    skipBtn.style.cssText  = 'padding:3px 8px;font-size:11px;font-weight:700;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;transition:all 0.1s';
  } else {
    skipBtn.style.cssText  = 'padding:3px 8px;font-size:11px;font-weight:700;border-radius:5px;border:1px solid var(--accent);background:var(--accent-dim);color:var(--accent);cursor:pointer;transition:all 0.1s';
    replBtn.style.cssText  = 'padding:3px 8px;font-size:11px;font-weight:700;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;transition:all 0.1s';
  }
}

// Bulk set all duplicates to replace or skip
function _importBulkDupe(action){
  if(!window._pendingImport) return;
  window._pendingImport.dupeItems.forEach((_,i) => _importToggleDupe(i, action));
}

async function _confirmJSONImport(){
  const pending = window._pendingImport;
  if(!pending){ toast('No pending import','err'); return; }

  const { imported, newItems, dupeItems } = pending;

  // ── APPLY NEW ITEMS ─────────────────────────────────────────────────────────
  // Add each new item into DB — strip user_id, auto-categorise
  newItems.forEach(({m, data}) => {
    delete data.user_id;
    (data.parts||[]).forEach(p=>delete p.user_id);
    (data.returnHistory||[]).forEach(r=>delete r.user_id);
    data.category = autoCategory(data.item);
    if(!DB[m]) DB[m] = [];
    // Guard: don't add if somehow already present
    if(!DB[m].find(x=>x.id===data.id)) DB[m].push(data);
  });

  // ── APPLY CHOSEN REPLACEMENTS ───────────────────────────────────────────────
  dupeItems.filter(d=>d.replace).forEach(({m, incoming, existing}) => {
    delete incoming.user_id;
    (incoming.parts||[]).forEach(p=>delete p.user_id);
    (incoming.returnHistory||[]).forEach(r=>delete r.user_id);
    incoming.category = autoCategory(incoming.item);
    const idx = (DB[m]||[]).findIndex(x=>x.id===existing.id);
    if(idx > -1) DB[m][idx] = incoming;
  });

  DB._userOwned = true;
  window._pendingImport = null;
  closePanel();

  const replacedCount = dupeItems.filter(d=>d.replace).length;
  const skippedCount  = dupeItems.filter(d=>!d.replace).length;
  let msg = `Added ${newItems.length} item${newItems.length!==1?'s':''}`;
  if(replacedCount) msg += `, replaced ${replacedCount}`;
  if(skippedCount)  msg += `, skipped ${skippedCount} duplicate${skippedCount!==1?'s':''}`;
  toast(msg);

  goToTab('summary', document.querySelector('[data-tab="summary"]'));
  renderSummary();
  saveDB();
}

function importExcel(e){
  const file=e.target.files[0];
  if(!file)return;
  if(!window.XLSX){
    const script=document.createElement('script');
    script.src='https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js';
    script.onload=function(){processExcelFile(file);};
    script.onerror=function(){toast('Failed to load Excel library','err');};
    document.head.appendChild(script);
  }else{
    processExcelFile(file);
  }
}

function processExcelFile(file){
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=new Uint8Array(e.target.result);
      const workbook=XLSX.read(data,{type:'array',cellDates:true,raw:true});
      // Per-month results for summary
      const monthResults={};
      const addedItems=[],updatedItems=[],skippedItems=[];

      function safeFloat(val){
        if(val===null||val===undefined||val==='')return 0;
        if(typeof val==='number')return val;
        if(typeof val==='string'&&val.startsWith('#'))return 0;
        try{return parseFloat(String(val).replace(/[^0-9.-]/g,''))||0;}catch{return 0;}
      }
      function toDateStr(val){
        if(!val)return null;
        if(val instanceof Date){
          if(isNaN(val.getTime()))return null;
          const y=val.getFullYear(),m=String(val.getMonth()+1).padStart(2,'0'),d=String(val.getDate()).padStart(2,'0');
          return `${y}-${m}-${d}`;
        }
        if(typeof val==='string'&&/^\d{4}-\d{2}-\d{2}$/.test(val))return val;
        const serial=parseFloat(val);
        if(!isNaN(serial)&&serial>40000){
          const d=new Date(Math.round((serial-25569)*86400*1000));
          return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
        }
        return null;
      }

      const sheetMonthKeys=[];
      workbook.SheetNames.forEach(function(sn){
        const parts=sn.split('-');
        if(parts.length===2&&MONTHS.includes(parts[0]))sheetMonthKeys.push(sn);
      });
      sheetMonthKeys.forEach(month=>{
        const sheetName=month;
        if(!workbook.SheetNames.includes(sheetName))return;
        const worksheet=workbook.Sheets[sheetName];
        const jsonData=XLSX.utils.sheet_to_json(worksheet,{header:1,raw:true,defval:''});
        const headerRow=jsonData[2]||[];
        const dataRows=jsonData.slice(3);
        const colMap={};
        headerRow.forEach((h,i)=>{if(h)colMap[String(h).trim()]=i;});
        if(!colMap['Item Name']&&!colMap['Date Listed'])return;

        monthResults[month]={added:0,updated:0,skipped:0};
        if(!DB[month])DB[month]=[];

        dataRows.forEach(row=>{
          if(!row||row.length===0)return;
          const itemName=String(row[colMap['Item Name']]||'').trim();
          const dateListedRaw=row[colMap['Date Listed']];
          if(!itemName||itemName.toUpperCase()==='MONTH END'||!dateListedRaw)return;
          const dateListed=toDateStr(dateListedRaw);
          if(!dateListed)return;

          const incoming={
            dateListed,item:itemName,
            location:String(row[colMap['Location']]||'').trim(),
            costPrice:safeFloat(row[colMap['Item Cost']]),
            salePrice:safeFloat(row[colMap['Sale Price']]),
            postage:safeFloat(row[colMap['Postage Fee']]),
            shippingCost:safeFloat(row[colMap['Shipping Cost']]),
            packagingCost:safeFloat(row[colMap['Packeging Cost']]),
            promoPercent:safeFloat(row[colMap['Promotion %']]),
            dateSold:toDateStr(row[colMap['Date Sold']])||null,
          };

          // Dedup: match on item name + dateListed (best available key from Excel)
          // Also guard against exact duplicates already seen this import session
          const existIdx=DB[month].findIndex(i=>
            i.item===itemName&&i.dateListed===dateListed
          );

          if(existIdx>=0){
            const ex=DB[month][existIdx];
            // Check if anything actually changed
            const FIELDS=['salePrice','costPrice','dateSold','shippingCost','postage','packagingCost','promoPercent','location'];
            const changed=FIELDS.some(f=>String(ex[f]??'')!==String(incoming[f]??''));
            if(!changed){
              monthResults[month].skipped++;
              skippedItems.push({m:month,item:itemName});
              return;
            }
            // Update financial/date fields only — never touch returns, notes, resale, parts
            ex.costPrice=incoming.costPrice;
            ex.salePrice=incoming.salePrice;
            ex.postage=incoming.postage;
            ex.shippingCost=incoming.shippingCost;
            ex.packagingCost=incoming.packagingCost;
            ex.promoPercent=incoming.promoPercent;
            ex.dateSold=incoming.dateSold;
            if(incoming.location)ex.location=incoming.location;
            ex.category=autoCategory(ex.item);
            monthResults[month].updated++;
            updatedItems.push({m:month,item:itemName,dateListed});
          }else{
            // Truly new item — assign ID and GID
            if(!Array.isArray(DB[month])) DB[month]=[];
            DB[month].push({
              id:'xl_'+Date.now()+'_'+Math.random().toString(36).substr(2,6),
              gid:'R-'+String(getNextGID()).padStart(4,'0'),
              source:'',category:autoCategory(itemName),notes:'',parts:[],
              returnData:null,returnHistory:[],isReturned:false,
              ...incoming
            });
            monthResults[month].added++;
            addedItems.push({m:month,item:itemName,dateListed});
          }
        });
      });

      DB._userOwned=true;
      saveDB();

      // Build summary panel
      const totalAdded=addedItems.length,totalUpdated=updatedItems.length,totalSkipped=skippedItems.length;
      function rows(items,icon){
        if(!items.length)return'<div style="font-size:12px;color:var(--muted);padding:6px 0">None</div>';
        return items.slice(0,25).map(r=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${icon} ${esc(r.item)}</span><span style="color:var(--muted);flex-shrink:0;margin-left:8px">${r.m}</span></div>`).join('')+(items.length>25?`<div style="font-size:11px;color:var(--muted);padding:5px 0">…and ${items.length-25} more</div>`:'');
      }
      const monthSummaryRows=Object.entries(monthResults).filter(([,v])=>v.added||v.updated||v.skipped).map(([m,v])=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px"><span style="font-weight:600">${m}</span><span style="color:var(--muted)">${v.added} new · ${v.updated} updated · ${v.skipped} unchanged</span></div>`).join('');

      const html=`
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px">
          <div style="background:var(--green-dim);border:1px solid rgba(34,197,94,0.2);border-radius:8px;padding:12px;text-align:center">
            <div style="font-size:24px;font-weight:700;color:var(--green)">${totalAdded}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">New items</div>
          </div>
          <div style="background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.2);border-radius:8px;padding:12px;text-align:center">
            <div style="font-size:24px;font-weight:700;color:var(--blue)">${totalUpdated}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">Updated</div>
          </div>
          <div style="background:rgba(100,116,139,0.1);border:1px solid rgba(100,116,139,0.3);border-radius:8px;padding:12px;text-align:center">
            <div style="font-size:24px;font-weight:700;color:var(--muted)">${totalSkipped}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">Unchanged</div>
          </div>
        </div>
        ${monthSummaryRows?`<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">By month</div><div style="margin-bottom:16px">${monthSummaryRows}</div>`:''}
        ${totalAdded?`<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">New items (${totalAdded})</div><div style="margin-bottom:14px">${rows(addedItems,'＋')}</div>`:''}
        ${totalUpdated?`<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">Updated (${totalUpdated})</div><div style="margin-bottom:14px">${rows(updatedItems,'↻')}</div>`:''}
        <div style="font-size:11px;color:var(--muted);padding:10px 12px;background:var(--surface2);border-radius:8px;line-height:1.6;margin-bottom:12px">
          Returns, notes, resale data and parts were not affected. Excel import never removes existing items.
        </div>
        <button class="btn btn-p" style="width:100%" onclick="closePanel();goToTab('summary',document.querySelector('[data-tab=\\'summary\\']'));renderSummary()">Done — view dashboard</button>`;

      openPanel('Import Complete',html);
    }catch(err){
      console.error('Import error:',err);
      toast('Import failed: '+err.message,'err');
    }
  };
  reader.readAsArrayBuffer(file);
}

async function clearAllData(){
  const ok=await showConfirm('Clear all data?','This will permanently delete every item and expense. There is no undo.',{icon:'💥',okLabel:'Yes, clear everything'});
  if(!ok)return;
  if(!_currentUserId){ toast('Not signed in','err'); return; }
  try{
    // Delete only THIS user's rows directly — never touches other users' data
    await _sbCall(()=>_sb.from('item_parts').delete().eq('user_id',_currentUserId));
    await _sbCall(()=>_sb.from('item_returns').delete().eq('user_id',_currentUserId));
    await _sbCall(()=>_sb.from('items').delete().eq('user_id',_currentUserId));
    await _sbCall(()=>_sb.from('trips').delete().eq('user_id',_currentUserId));
    await _sbCall(()=>_sb.from('expenses').delete().eq('user_id',_currentUserId));
    DB={trips:[],expenses:[]};
    _dbSnapshot=_dbFingerprint();
    toast('All data cleared');
    renderSummary();
  }catch(e){
    console.error('clearAllData error:',e);
    toast('Clear failed: '+e.message,'err');
  }
}

function saveEdit(m,id){
  const item=(DB[m]||[]).find(i=>i.id===id);
  if(!item)return;
  item.item=document.getElementById('edit-item').value;
  item.source=document.getElementById('edit-source').value;
  item.category=document.getElementById('edit-category').value;
  item.location=document.getElementById('edit-location').value;
  item.dateListed=document.getElementById('edit-date').value;
  item.costPrice=parseFloat(document.getElementById('edit-cost').value)||0;
  item.salePrice=parseFloat(document.getElementById('edit-price').value)||0;
  item.postage=parseFloat(document.getElementById('edit-postage').value)||0;
  item.shippingCost=parseFloat(document.getElementById('edit-shipping').value)||0;
  item.packagingCost=parseFloat(document.getElementById('edit-packaging').value)||0;
  item.promoPercent=(parseFloat(document.getElementById('edit-promo').value)||0)/100;
  if(item.dateSold){item.grossProfit=calcGrossProfit(item);}
  saveDB();
  toast('Item updated');
  const cur=document.querySelector('.page.on').id;
  if(cur==='p-monthly')renderMonth();
  else if(cur==='p-stock')renderStock();
  else if(cur==='p-item')renderItemPage(m,id);

  openItemDetail(m,id,true);
}

function savePanelQuickEdit(m,id,silent){
  const item=(DB[m]||[]).find(i=>i.id===id);
  if(!item)return;
  // Only read fields that are currently in the DOM (panel may have changed)
  const fListed=document.getElementById('pd-date-listed');
  const fDateSold=document.getElementById('pd-date-sold');
  const fResaleDateSold=document.getElementById('pd-resale-date-sold');
  const fLocation=document.getElementById('pd-location');
  const fSource=document.getElementById('pd-source');
  const fCat=document.getElementById('pd-category');
  const fCost=document.getElementById('pd-cost');
  const fPrice=document.getElementById('pd-price');
  // Guard: if location field isn't present, the panel has been replaced - abort
  if(!fLocation)return;
  if(fListed)item.dateListed=fListed.value||new Date().toISOString().split('T')[0];
  // Date sold edits: preserve existing value if the input is cleared (don't blank
  // a sold item back to unsold via Quick Edit — that's what "undo sale" is for).
  if(fDateSold&&fDateSold.value)item.dateSold=fDateSold.value;
  if(fResaleDateSold&&fResaleDateSold.value)item.resaleDateSold=fResaleDateSold.value;
  if(fLocation)item.location=fLocation.value.trim();
  if(fSource&&fSource.value)item.source=fSource.value;
  if(fCat&&fCat.value)item.category=fCat.value;
  // Only overwrite numeric fields if the value is a valid non-empty number
  if(fCost&&fCost.value!==''){const v=parseFloat(fCost.value);if(!isNaN(v))item.costPrice=v;}
  if(fPrice&&fPrice.value!==''){const v=parseFloat(fPrice.value);if(!isNaN(v))item.salePrice=v;}
  if(item.dateSold)item.grossProfit=calcGrossProfit(item);
  saveDB();
  if(!silent)toast('Saved');
  // If the panel is open and showing this item, re-render it in place
  const panel=document.getElementById('slide-panel');
  const inPanel=panel&&panel.classList.contains('on')&&document.getElementById('tok-costPrice-'+id);
  if(inPanel){
    openItemDetail(m,id,true);
    // Also refresh any category panel sitting in the stack beneath this one
    PANEL_STACK.forEach(entry=>{
      if(entry._meta&&entry._meta.type==='category'){
        // Mark stale so panelBack re-renders it live (already does this, no extra work needed)
      }
    });
    return;
  }
  // Otherwise refresh the underlying page
  const cur=document.querySelector('.page.on').id;
  if(cur==='p-summary')renderSummary();
  else if(cur==='p-monthly')renderMonth();
  else if(cur==='p-stock')renderStock();
  else if(cur==='p-item')renderItemPage(m,id);
}

function markSold(m,id){
  const item=(DB[m]||[]).find(i=>i.id===id);
  if(!item)return;
  const hasFullReturn=(item.returnHistory||[]).some(r=>r.type==='full_seller'||r.type==='full_ebay');
  const today=new Date().toISOString().split('T')[0];

  if(hasFullReturn){
    // Resale flow — price/shipping/promo already set during relist, just need date
    MODAL_CALLBACK=function(date,price){
      item.resaleDateSold=date;
      item.resaleSalePrice=price||item.salePrice||0;
      item.resaleShippingCost=item.shippingCost||0;
      item.resalePromoPercent=item.promoPercent||0;
      item.isReturned=false;
      item.grossProfit=calcGrossProfit(item);
      saveDB();
      toast('Re-sold logged');
      const cur=document.querySelector('.page.on').id;
      if(cur==='p-item'){renderItemPage(m,id);return;}
      if(cur==='p-monthly')renderMonth();
      else if(cur==='p-stock')renderStock();
      if(document.getElementById('slide-panel').classList.contains('on')){openItemDetail(m,id);}
    };
    document.getElementById('resale-date').value=today;
    document.getElementById('resale-price').value=(item.salePrice||'').toString();
    document.getElementById('resale-modal-sub').textContent='Shipping & promo carried over from relist';
    document.getElementById('resale-modal').style.display='flex';
    lockBodyScroll();
  } else {
    // Standard first sale
    MODAL_CALLBACK=function(date,price){
      item.dateSold=date;
      if(price&&price>0)item.salePrice=+price.toFixed(2);
      // Session D2 — capture which platform the sale actually closed on.
      // Defaults to the item's defaultPlatform; user can change at Mark Sold.
      const _soldPlat=document.getElementById('modal-platform')?.value;
      if(_soldPlat&&PLATFORMS[_soldPlat]&&PLATFORMS[_soldPlat].live){
        item.soldOnPlatform=_soldPlat;
      }
      item.isReturned=false;
      item.grossProfit=calcGrossProfit(item);
      saveDB();
      toast('Marked as sold');
      const cur=document.querySelector('.page.on').id;
      if(cur==='p-item'){renderItemPage(m,id);return;}
      if(cur==='p-monthly')renderMonth();
      else if(cur==='p-stock')renderStock();
      if(document.getElementById('slide-panel').classList.contains('on')){openItemDetail(m,id);}
    };
    document.getElementById('modal-date').value=today;
    document.getElementById('modal-price').value=(item.salePrice||'').toString();
    document.getElementById('modal-price-row').style.display='block';
    // Session D2 — pre-select the item's defaultPlatform in the modal dropdown
    // and seed the price label/helper to match. If the user later changes the
    // platform, onMarkSoldPlatformChange() re-renders the labels and helper.
    const platSel=document.getElementById('modal-platform');
    if(platSel){
      const initialPlat=(item.soldOnPlatform&&PLATFORMS[item.soldOnPlatform]&&PLATFORMS[item.soldOnPlatform].live)
        ? item.soldOnPlatform
        : (item.defaultPlatform&&PLATFORMS[item.defaultPlatform]&&PLATFORMS[item.defaultPlatform].live ? item.defaultPlatform : DEFAULT_PLATFORM);
      platSel.value=initialPlat;
      onMarkSoldPlatformChange();
    }
    document.getElementById('sold-modal').style.display='flex';
    lockBodyScroll();
  }
}

// Session D2 — Mark Sold platform-change handler. Updates the price input's
// label and helper text to match the newly selected platform's pricing
// pattern (e.g. switching from eBay to Vinted changes "Sale Price (£)" to
// "Your Asking Price (£)" with a helper explaining the buyer pays extra
// on top). The numeric value isn't auto-converted — the user must re-enter
// it because the meaning of "20" differs across platforms.
function onMarkSoldPlatformChange(){
  const sel=document.getElementById('modal-platform');
  if(!sel)return;
  const platformId=sel.value;
  const stub={defaultPlatform:platformId};
  const copy=_platformPricingCopy(stub);
  const lbl=document.getElementById('modal-price-label');
  if(lbl)lbl.textContent=copy.inputLabel;
  const helper=document.getElementById('modal-price-helper');
  if(helper){
    if(copy.inputHelper){
      helper.textContent=copy.inputHelper;
      helper.style.display='';
    }else{
      helper.style.display='none';
    }
  }
}

function confirmSold(){
  const date=document.getElementById('modal-date').value;
  const price=parseFloat(document.getElementById('modal-price').value)||0;
  if(date&&MODAL_CALLBACK){MODAL_CALLBACK(date,price);}

function closeModal(){
  document.getElementById('sold-modal').style.display='none';
  // Always unlock — modals own their own lock increment and must always pair it
  // with a decrement. The reference counter (_scrollLockCount) handles the case
  // where the panel is also open: panel's lock stays until closePanel() fires.
  unlockBodyScroll();
  MODAL_CALLBACK=null;
}

function confirmResale(){

  MODAL_CALLBACK=null;
}

async function deleteItem(m,id){

function duplicateItem(m,id,context){
  const item=(DB[m]||[]).find(i=>i.id===id);
  if(!item)return;
  const copy=JSON.parse(JSON.stringify(item));
  copy.id='dup_'+Date.now();
  copy.gid='R-'+String(getNextGID()).padStart(4,'0');
  copy.dateListed=new Date().toISOString().split('T')[0];
  copy.dateSold=null;copy.grossProfit=null;copy.isReturned=false;
  copy.returnHistory=[];delete copy.returnData;
  const stripSuffix=function(name){
    const m2=(name||'').match(/^(.+?) - (\d+)$/);
    return m2?m2[1]:(name||'');
  };
  const rootId=item.parentId||item.id;
  const rootItem=(DB[m]||[]).find(x=>x.id===rootId);
  const baseName=item.baseName||(rootItem&&rootItem.baseName)||stripSuffix((rootItem&&rootItem.item)||item.item);
  let maxSeq=1;
  (DB[m]||[]).forEach(function(x){
    const belongsToRoot=x.id===rootId||x.parentId===rootId;
    if(!belongsToRoot)return;
    const seq=(typeof x.copySeq==='number'&&x.copySeq>0)
      ?x.copySeq
      :(x.id===rootId?1:(function(){
        const match=(x.item||'').match(new RegExp('^'+baseName.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+' - (\\d+)$'));
        return match?parseInt(match[1],10):1;
      })());
    if(seq>maxSeq)maxSeq=seq;
  });
  const nextNum=maxSeq+1;
  copy.parentId=rootId;
  copy.baseName=baseName;
  copy.copySeq=nextNum;
  copy.item=baseName+' - '+nextNum;
  if(!Array.isArray(DB[m])) DB[m]=[];
  DB[m].push(copy);saveDB();
  toast('Duplicated');
  if(context==='panel'){
    openItemDetail(m,copy.id);
    return;
  }
  SELECTED_MONTH=m;MONTH_SORT='date-listed';MONTH_FILTER='all';
  openItemPage(m,copy.id,'p-monthly');
}

function confirmRelist(m,id){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i)return;
  const price=parseFloat(document.getElementById('relist-price').value)||i.salePrice||0;
  const promoInput=parseFloat(document.getElementById('relist-promo').value)||0;
  const condition=window._relistCondition||'working';
  const postMode=window._relistPostMode||'simple';
  // Apply postage settings
  i._postageMode=postMode;
  if(postMode==='simple'){
    let sdIdx=parseInt(document.getElementById('relist-sd-rate').value);if(isNaN(sdIdx))sdIdx=1;
    const buyerPays=!document.getElementById('relist-sd-free-postage').checked;
    const rateCost=_sdRateFor(sdIdx,price);
    i._sdRateIdx=sdIdx;
    i._sdBuyerPays=buyerPays;
    i.shippingCost=rateCost;
    i.postage=buyerPays?rateCost:0;
  } else {
    i.shippingCost=parseFloat(document.getElementById('relist-shipping-cost').value)||0;
    i.postage=parseFloat(document.getElementById('relist-postage').value)||0;
  }
  // Restore to active stock
  i.isReturned=false;
  i.dateSold=null;
  i.salePrice=price;
  i.promoPercent=promoInput/100;
  i.condition=condition==='working'?undefined:'spares';
  i.grossProfit=null;
  // Log relist in returnHistory for audit trail
  if(i.returnHistory&&i.returnHistory.length){
    const relistDate=document.getElementById('relist-date').value||new Date().toISOString().split('T')[0];
    i.returnHistory[i.returnHistory.length-1]._relistedAt=relistDate;
    i.returnHistory[i.returnHistory.length-1]._relistCondition=condition;
  }
  saveDB();
  window._relistCondition=null;
  window._relistPostMode=null;
  closePanel();
  toast('Relisted as '+(condition==='spares'?'Spares / Repairs':'Working'));
  const cur=document.querySelector('.page.on').id;
  if(cur==='p-item')renderItemPage(m,id);
  else if(cur==='p-monthly')renderMonth();
  else if(cur==='p-stock')renderStock();
  else renderSummary();
}

      <input type="number" id="rtn-postage" step="0.01" value="0" placeholder="0.00">
    </div>
    <div class="fg">
      <label>Notes (optional)</label>
      <input type="text" id="rtn-notes" placeholder="e.g. buyer claimed not as described">
    </div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-p" style="flex:1" onclick="saveReturn('${m}','${id}')">Log Return</button>
      <button class="btn btn-s" onclick="closePanel()">Cancel</button>
    </div>
  `;
  openPanel('Log Return', html);
}

function saveReturn(m,id){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i)return;
  const type=document.getElementById('rtn-type').value;
  const refundAmount=parseFloat(document.getElementById('rtn-refund').value)||0;
  const returnDate=document.getElementById('rtn-date').value;
  const returnPostage=parseFloat(document.getElementById('rtn-postage').value)||0;
  const notes=document.getElementById('rtn-notes').value.trim();

  const entry={
    loggedAt:returnDate,
    type:type,
    refundAmount:refundAmount,
    returnPostage:returnPostage,
    notes:notes,
    _salePriceAtReturn:i.salePrice||0,  // snapshot: used to get correct BPF refund in calcGrossProfit
    _dateSoldAtReturn:i.dateSold||null  // snapshot: original sale date for refund-rate period attribution after full return wipes dateSold
  };

  if(!i.returnHistory)i.returnHistory=[];

  // If logging a full return, remove any existing partial entries — they're superseded
  if(type==='full_seller'||type==='full_ebay'){
    i.returnHistory=i.returnHistory.filter(r=>r.type==='full_seller'||r.type==='full_ebay');
  }

  i.returnHistory.push(entry);

  // Mark as fully returned only for full refund types
  if(type==='full_seller'||type==='full_ebay'){
    i.isReturned=true;
    i.dateSold=null; // remove from sold — back to stock
  }
  saveDB();
  toast('Return logged');
  const _activePage=document.querySelector('.page.on');
  const _activeId=_activePage?_activePage.id:'p-summary';
  closePanel();
  if(_activeId==='p-item'){
    // Already on the item page — re-render in place after panel slides out.
    // Do NOT call openItemPage('p-item') or exitItemPage()'s back button breaks.
    setTimeout(function(){ renderItemPage(m,id); }, 340);
  } else {
    // Coming from a list page — navigate to item page after panel clears.
    setTimeout(function(){ openItemPage(m,id,_activeId); }, 340);
  }
}


// ── Undo timeline events ───────────────────────────────────────────────────
function panelDeleteReturn(m,id,rtnIdx){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i||!i.returnHistory)return;
  i.returnHistory.splice(rtnIdx,1);
  const stillFullyReturned=i.returnHistory.some(r=>r.type==='full_seller'||r.type==='full_ebay');
  if(!stillFullyReturned&&i.isReturned){
    i.isReturned=false;
    i.dateSold=i.dateSold||new Date().toISOString().split('T')[0];
  }
  saveDB();
  toast('Return removed');
  const _pg=document.querySelector('.page.on');
  if(_pg&&_pg.id==='p-item')renderItemPage(m,id);
  openItemDetail(m,id);
}

function undoReturnEntry(m,id,rtnIdx){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i||!i.returnHistory)return;
  const r=i.returnHistory[rtnIdx];
  if(!r)return;
  i.returnHistory.splice(rtnIdx,1);
  // If this was a full return and there are no more full returns, restore sold status
  const stillFullyReturned=i.returnHistory.some(function(r2){return r2.type==='full_seller'||r2.type==='full_ebay';});
  if(!stillFullyReturned&&i.isReturned){
    i.isReturned=false;
    // Restore dateSold from the entry we just removed (best guess)
    i.dateSold=r.loggedAt||null;
  }
  saveDB();
  renderItemPage(m,id);
  toast('Return entry removed');
}

function revertToActive(m,id){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i)return;
  // Safety: only revert a sold-but-not-returned, not-resold item
  if(!i.dateSold||i.resaleSalePrice||i.isReturned)return;
  showConfirm(
    'Move back to active?',
    'This will clear the sale date and return the item to your active stock. Use this to correct a mis-marked sale — not as a substitute for logging a return.',
    function(){
      i.dateSold=null;
      i.grossProfit=null;
      saveDB();
      toast('Moved back to active stock');
      closePanel();
      const cur=document.querySelector('.page.on')?document.querySelector('.page.on').id:null;
      if(cur==='p-item')renderItemPage(m,id);
      else if(cur==='p-monthly')renderMonth();
      else if(cur==='p-stock')renderStock();
      else renderSummary();
    }
  );
}

function undoSale(m,id){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i)return;
  i.dateSold=null;
  i.isReturned=false;
  i.returnHistory=[];
  saveDB();
  renderItemPage(m,id);
  toast('Sale undone — item back to Listed');
}

function undoResale(m,id){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i)return;
  delete i.resaleSalePrice;
  delete i.resaleDateSold;
  delete i.resaleShippingCost;
  i.isReturned=true;
  i.grossProfit=calcGrossProfit(i);
  saveDB();
  renderItemPage(m,id);
  toast('Re-sale undone — item back to Returned');
}

function undoRelist(m,id,rtnIdx){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i||!i.returnHistory)return;
  const r=i.returnHistory[rtnIdx];
  if(!r||!r._relistedAt)return;
  // Remove relist markers from this return entry
  delete r._relistedAt;
  delete r._relistCondition;
  // Restore returned state
  i.isReturned=true;
  i.dateSold=null;
  i.condition=undefined;
  i.grossProfit=calcGrossProfit(i);
  saveDB();
  renderItemPage(m,id);
  toast('Relist undone — item back to Returned');
}

// ── Returned items panel (opened from KPI card) ────────────────────────────
function showReturnedItems(){
  const items=[];
  allDBKeys().forEach(function(k){
    (DB[k]||[]).forEach(function(i){
      const rh=i.returnHistory||[];
      if(rh.length===0)return;
      // Period filter: use the ORIGINAL SALE DATE (with snapshot fallback for
      // full returns that wiped i.dateSold). Matches the headline KPI.
      const fullEntry=rh.find(r=>r.type==='full_seller'||r.type==='full_ebay');
      const partialEntry=rh.find(r=>r.type==='partial_seller'||r.type==='partial_ebay');
      const refundSaleDate=(fullEntry&&fullEntry._dateSoldAtReturn)
                         ||(partialEntry&&partialEntry._dateSoldAtReturn)
                         ||i.dateSold||null;
      if(!_inSummaryPeriod(refundSaleDate||''))return;
      items.push(Object.assign({},i,{month:k,_refundSaleDate:refundSaleDate}));
    });
  });

  // Sort newest sale-date first
  items.sort(function(a,b){
    return (b._refundSaleDate||'').localeCompare(a._refundSaleDate||'');
  });

  const fullyReturned=items.filter(function(i){
    return (i.returnHistory||[]).some(r=>r.type==='full_seller'||r.type==='full_ebay');
  });
  const partialOnly=items.filter(function(i){
    const hasFull=(i.returnHistory||[]).some(r=>r.type==='full_seller'||r.type==='full_ebay');
    return !hasFull&&(i.returnHistory||[]).some(r=>r.type==='partial_seller'||r.type==='partial_ebay');
  });
  const totalRefundedAll=items.reduce(function(s,i){
    return s+(i.returnHistory||[]).reduce(function(s2,r){return s2+(r.refundAmount||0);},0);
  },0);

  function buildRow(i){
    const hasFull=(i.returnHistory||[]).some(r=>r.type==='full_seller'||r.type==='full_ebay');
    const isResold=!!i.resaleSalePrice;
    const isRelisted=!i.isReturned&&!i.dateSold&&!i.resaleSalePrice&&hasFull;
    const lastRet=i.returnHistory[i.returnHistory.length-1];
    const refundTotal=(i.returnHistory||[]).reduce(function(s,r){return s+(r.refundAmount||0);},0);
    const profit=calcGrossProfit(i);
    const borderCol=hasFull?'var(--red)':'var(--warn)';
    const refundCol=hasFull?'var(--red)':'var(--warn)';
    const typeBadge=hasFull
      ?'<span style="font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;background:var(--red-dim);color:var(--red);margin-left:6px">full return</span>'
      :'<span style="font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;background:rgba(212,136,10,0.13);color:var(--warn);margin-left:6px">partial</span>';
    const statusBadge=isResold
      ?'<span style="font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;background:rgba(167,139,250,0.15);color:var(--purple);margin-left:6px">resold</span>'
      :isRelisted
      ?'<span style="font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;background:var(--accent-dim);color:var(--accent);margin-left:6px">relisted</span>'
      :'';
    return '<div style="padding:12px;background:var(--surface2);border-radius:8px;margin-bottom:8px;cursor:pointer;border-left:3px solid '+borderCol+'" onclick="openItemDetail(\''+i.month+'\',\''+i.id+'\')">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">'
      +'<div style="flex:1;font-weight:600;font-size:14px">'+esc(i.item)+typeBadge+statusBadge+'</div>'
      +'<div style="font-size:15px;font-weight:700;color:'+refundCol+'">'+fmt(refundTotal)+'</div>'
      +'</div>'
      +'<div style="display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--text-secondary)">'
      +'<span>Sale: <strong>'+fmt(i.salePrice)+'</strong></span>'
      +(profit!==null?'<span>Net P&L: <strong style="color:'+(profit>=0?'var(--green)':'var(--red)')+'">'+fmt(profit)+'</strong></span>':'')
      +(i.gid?'<span style="color:var(--muted);font-family:monospace">'+esc(i.gid)+'</span>':'')
      +'<span style="color:var(--muted)">Sold '+(i._refundSaleDate||'—')+' · returned '+(lastRet.loggedAt||'—')+'</span>'
      +'</div>'
      +'</div>';
  }

  // Two sections: full returns, then partials
  let rows='';
  if(fullyReturned.length>0){
    rows+='<div style="font-size:11px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.08em;margin:0 0 8px">Full returns — affect refund rate</div>';
    rows+=fullyReturned.map(buildRow).join('');
  }
  if(partialOnly.length>0){
    rows+='<div style="font-size:11px;font-weight:700;color:var(--warn);text-transform:uppercase;letter-spacing:.08em;margin:'+(fullyReturned.length>0?'16px':'0')+' 0 8px">Partial refunds — buyer kept item</div>';
    rows+=partialOnly.map(buildRow).join('');
  }

  // Period stats — pull from the same engine the headline KPI uses so the
  // numbers reconcile. soldCount + fullRefundCount = the items-rate denom.
  const _stats=calcSummaryStats();
  const itemsRate=_stats.refundItemRate||0;
  const refundedItemCount=_stats.refundedItemCount||0;
  const refundDenom=_stats.refundDenom||0;
  // Period revenue denominator for the £/% line (gross sale revenue in period).
  let _periodRevenue=0;
  allDBKeys().forEach(function(k){
    (DB[k]||[]).forEach(function(i){
      if((i.item||'').trim().toUpperCase()==='MONTH END')return;
      const sd=i.resaleSalePrice?i.resaleDateSold:i.dateSold;
      if(!sd||!_inSummaryPeriod(sd))return;
      _periodRevenue+=calcItemRevenue(i);
    });
  });
  const _refundPctRev=_periodRevenue>0?(totalRefundedAll/_periodRevenue*100):0;

  // Summary block: items rate is the HEADLINE; £ paid out + % of revenue is secondary.
  const summary='<div style="margin-bottom:16px;background:var(--surface2);border-radius:10px;padding:14px">'
    +'<div style="display:flex;align-items:baseline;gap:10px;margin-bottom:4px">'
    +'<div class="stat-num" style="color:var(--red)">'+itemsRate.toFixed(1)+'%</div>'
    +'<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:600">Refund rate · items</div>'
    +'</div>'
    +'<div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">'
      +'<strong style="color:var(--text);font-weight:600">'+refundedItemCount+' of '+refundDenom+'</strong> sold '
      +'\u00b7 '+fullyReturned.length+' full \u00b7 '+partialOnly.length+' partial'
    +'</div>'
    +'<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-top:1px solid var(--border);font-size:12px;color:var(--muted)">'
      +'<span>Total paid out</span>'
      +'<span style="color:var(--red);font-weight:600">'+fmt(totalRefundedAll)+'</span>'
    +'</div>'
    +'<div style="display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted)">'
      +'<span>% of period revenue</span>'
      +'<span style="color:var(--text);font-weight:600">'+_refundPctRev.toFixed(1)+'% <span style="color:var(--muted);font-weight:400">of '+fmt(_periodRevenue)+'</span></span>'
    +'</div>'
    +'</div>';

  const content=items.length>0
    ? summary+rows
    : '<div style="padding:30px;text-align:center;color:var(--muted)">No refunds in this period</div>';

  openPanel('Refunds — '+items.length+' item'+(items.length!==1?'s':''),content);
}

// ── TAX / SA103 ──────────────────────────────────────────────────────────────
function renderTax(){
  const now=new Date();
  const currentTaxYear=(now.getMonth()>3||(now.getMonth()===3&&now.getDate()>=6))?now.getFullYear():now.getFullYear()-1;
  const selectedYear=DB._taxYear||currentTaxYear;
  const yearOptions=[];
  for(let y=currentTaxYear;y>=currentTaxYear-2;y--){
    yearOptions.push('<option value="'+y+'" '+(y===selectedYear?'selected':'')+'>'+y+'/'+(y+1).toString().slice(2)+' (6 Apr '+y+' \u2013 5 Apr '+(y+1)+')</option>');
  }
  const taxYearStart=new Date(selectedYear,3,6);
  const taxYearEnd=new Date(selectedYear+1,3,5,23,59,59);
  function inTaxYear(ds){if(!ds)return false;const d=new Date(ds);return d>=taxYearStart&&d<=taxYearEnd;}
  const soldItems=[];
  allDBKeys().forEach(function(k){(DB[k]||[]).forEach(function(i){
    if((i.item||'').trim().toUpperCase()==='MONTH END')return;
    if((i.dateSold||i.resaleSalePrice)&&!i.isReturned&&inTaxYear(i.dateSold||i.resaleDateSold))soldItems.push(i);
  });});
  const totalIncome=soldItems.reduce(function(s,i){return s+(i.salePrice||0)+(i.resaleSalePrice||0);},0);
  const saleCount=soldItems.length;
  const totalBPF=soldItems.reduce(function(s,i){return s+calcEbayBPF(i.salePrice||0)+(i.resaleSalePrice?calcEbayBPF(i.resaleSalePrice):0);},0);
  const totalPromo=soldItems.reduce(function(s,i){var bpf=calcEbayBPF(i.salePrice||0);return s+((i.salePrice||0)-bpf)*(i.promoPercent||0)*1.20;},0);
  const totalPostage=soldItems.reduce(function(s,i){return s+(i.shippingCost||0)+(i.resaleShippingCost||0);},0);
  const totalPackaging=soldItems.reduce(function(s,i){return s+(i.packagingCost||0);},0);
  const totalStockCost=soldItems.reduce(function(s,i){return s+(i.costPrice||0);},0);
  const totalParts=soldItems.reduce(function(s,i){return s+calcPartsCost(i);},0);
  const tripsInYear=(DB.trips||[]).filter(function(t){return inTaxYear(t.date);});
  const totalMiles=tripsInYear.reduce(function(s,t){return s+(t.mileage||0);},0);
  // BUG-07: Run the same per-trip tiering walk used on the Expenses page so
  // SA103 reconciles to the trip card. calcTieredTrips groups by tax year
  // and respects each trip's stored ratePerMile for tier 1; tier 2 is fixed
  // at HMRC's 0.25. Within a single tax year the per-trip walk produces the
  // same totalMileage as the legacy year-aggregate formula when all trips
  // share ratePerMile=0.45 (because Σ tier1Cost+tier2Cost across trips ==
  // (min(totalMiles,10k)*0.45 + max(0,totalMiles-10k)*0.25)).
  const _tieredYr=calcTieredTrips(tripsInYear);
  const tier1Miles=_tieredYr.reduce(function(s,r){return s+r.tier1Miles;},0);
  const tier2Miles=_tieredYr.reduce(function(s,r){return s+r.tier2Miles;},0);
  const totalMileage=+_tieredYr.reduce(function(s,r){return s+r.mileageCost;},0).toFixed(2);
  // BUG-07: trip-attached extras (parking, entry fees, etc.) — claimable as
  // business expenses alongside the mileage allowance. Inherit the trip's
  // tax-year scope (already filtered above).
  const totalTripExtras=+_tieredYr.reduce(function(s,r){return s+r.expensesCost;},0).toFixed(2);
  const expensesInYear=(DB.expenses||[]).filter(function(e){return inTaxYear(e.date);});
  const totalOtherExpenses=expensesInYear.reduce(function(s,e){return s+(e.amount||0);},0);
  const totalActualExpenses=+(totalBPF+totalPromo+totalPostage+totalPackaging+totalStockCost+totalMileage+totalTripExtras+totalOtherExpenses+totalParts).toFixed(2);
  const TRADING_ALLOWANCE=1000;
  // Trading allowance path — can never produce a loss (allowance is capped at income).
  const taxableTA=Math.max(0,+(totalIncome-TRADING_ALLOWANCE).toFixed(2));
  // Actual expenses path — allow negative values so real trading losses surface.
  // HMRC allows loss carry-forward / offset against other income, so the user
  // needs to see the loss rather than a misleading £0.
  const taxableActual=+(totalIncome-totalActualExpenses).toFixed(2); // may be negative
  // Method auto-pick: whichever produces the lower taxable figure (incl. losses).
  const taWins=taxableTA<=taxableActual;
  const belowThreshold=totalIncome<TRADING_ALLOWANCE;

  // Method selection — user can override, defaults to whichever gives lower tax
  const autoMethod=taWins?'ta':'actual';
  if(!DB._taxMethod)DB._taxMethod=autoMethod;
  const chosenMethod=DB._taxMethod;
  const usingTA=chosenMethod==='ta';

  const box15=+totalIncome.toFixed(2);
  const box16=usingTA?+Math.min(TRADING_ALLOWANCE,totalIncome).toFixed(2):totalActualExpenses;
  const box23=usingTA?taxableTA:taxableActual;

  var expRows=[
    ['eBay fees (BPF)',totalBPF],
    ['Promo fees (inc. VAT)',totalPromo],
    ['Postage paid',totalPostage],
    ['Packaging costs',totalPackaging],
    ['Stock cost (sold items)',totalStockCost],
    ['Parts & item expenses',totalParts]
  ].map(function(row){
    var label=row[0],val=row[1];
    return '<div class="tax-exp-row" style="display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);font-size:14px">'
      +'<span style="color:var(--text-secondary)">'+label+'</span>'
      +'<span style="font-family:var(--font-mono);font-weight:600;color:'+(val>0?'var(--red)':'var(--muted)')+'">'+( val>0?'\u2212'+fmt(val):'--')+'</span>'
      +'</div>';
  }).join('');

  // Method card helper — now clickable, selected state drives border + checkmark
  function methodCard(method,title,income,deductLabel,deductVal,taxable,note){
    const selected=chosenMethod===method;
    const isAuto=autoMethod===method;
    return '<div class="tax-method-card" onclick="DB._taxMethod=\''+method+'\';saveDB();renderTax()" style="background:var(--surface);border:2px solid '+(selected?'var(--green)':'var(--border)')+';border-radius:12px;padding:18px;position:relative;box-shadow:0 1px 3px var(--shadow);cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s" onmouseenter="this.style.boxShadow=\'0 4px 16px var(--shadow-md)\'" onmouseleave="this.style.boxShadow=\'0 1px 3px var(--shadow)\'">'
      +(selected?'<div style="position:absolute;top:-1px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;font-size:10px;font-weight:700;padding:3px 12px;border-radius:0 0 8px 8px;letter-spacing:0.5px;white-space:nowrap">\u2713 SELECTED</div>'
        :isAuto?'<div style="position:absolute;top:-1px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:10px;font-weight:700;padding:3px 12px;border-radius:0 0 8px 8px;letter-spacing:0.5px;white-space:nowrap">Recommended</div>':'')
      +'<div style="font-weight:700;font-size:14px;margin-bottom:14px;padding-top:'+((selected||isAuto)?'10px':'0')+'">' +title+'</div>'
      +'<div class="tax-row" style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--text-secondary)">Gross income</span><span style="font-weight:600">'+fmt(income)+'</span></div>'
      +'<div class="tax-row" style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--text-secondary)">'+deductLabel+'</span><span style="color:var(--red)">\u2212'+fmt(deductVal)+'</span></div>'
      +'<div class="tax-row" style="display:flex;justify-content:space-between;padding:9px 0;font-size:15px;font-weight:700"><span>'+(taxable<0?'Taxable loss':'Taxable profit')+'</span><span style="color:'+(taxable<0?'var(--accent)':selected?'var(--green)':taxable===0?'var(--green)':'var(--text)')+'">'+(taxable<0?'\u2212'+fmt(Math.abs(taxable)):fmt(taxable))+'</span></div>'
      +'<div style="margin-top:10px;font-size:11px;color:var(--muted);line-height:1.5">'+note+'</div>'
      +'</div>';
  }

  var html=''
    // Header
    +'<div style="margin-bottom:20px">'
    +'<h1 class="stat-num-sm" style="margin-bottom:4px">Tax / SA103</h1>'
    +'<div style="color:var(--text-secondary);font-size:13px">Self Assessment \u2014 Self-employment income</div>'
    +'</div>'

    // Tax year selector — full width on mobile
    +'<div style="margin-bottom:20px">'
    +'<label style="display:block;font-weight:600;font-size:11px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Tax Year</label>'
    +'<select class="tax-year-select" style="padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;cursor:pointer;font-family:inherit;font-weight:500;width:100%;max-width:360px" onchange="DB._taxYear=parseInt(this.value);DB._taxMethod=null;saveDB();renderTax()">'+yearOptions.join('')+'</select>'
    +'</div>';

  // Below threshold banner
  if(belowThreshold){
    html+='<div style="background:var(--green-dim);border:1px solid rgba(34,197,94,0.2);border-radius:10px;padding:14px 16px;margin-bottom:20px;display:flex;align-items:flex-start;gap:12px">'
      +'<div style="font-size:20px;flex-shrink:0">\u2705</div>'
