<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>General-007 | eBay Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=Syne:wght@600;700;800&family=Black+Ops+One&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0b0e;--surface:#111318;--surface2:#181b23;--border:#22262f;--border2:#2d3140;
  --accent:#f0b429;--green:#2dd4a0;--red:#f56565;--blue:#63b3ed;--purple:#b794f4;
  --text:#edf2f7;--muted:#4a5568;--muted2:#718096;--warn:#f6ad55;
  --fh:'Syne',sans-serif;--fm:'DM Mono',monospace;--fn:'Bebas Neue',sans-serif;--fb:'Black Ops One',cursive;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--fm);font-size:13px;min-height:100vh;}

/* NAV */
nav{position:sticky;top:0;z-index:200;background:rgba(10,11,14,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 20px;height:60px;}
.brand{display:flex;align-items:center;gap:0;cursor:pointer;user-select:none;}
.brand:hover{opacity:0.88;}
.brand-general{font-family:var(--fb);font-size:20px;color:#fff;letter-spacing:1px;text-shadow:2px 2px 0 #000,-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000;}
.brand-007{font-family:var(--fb);font-size:20px;color:var(--accent);letter-spacing:1px;text-shadow:2px 2px 0 #000,-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000;}
.brand-line{display:block;height:3px;background:linear-gradient(90deg,#e63232 60%,transparent);border-radius:2px;margin-top:1px;}
.tabs{display:flex;gap:3px;}
.tab{padding:7px 16px;border-radius:7px;border:none;cursor:pointer;font-family:var(--fh);font-size:14px;font-weight:700;background:transparent;color:var(--muted2);transition:all 0.15s;}
.tab:hover{color:var(--text);background:var(--surface2);}
.tab.on{background:var(--accent);color:#000;}
.nav-right{display:flex;align-items:center;justify-content:flex-end;gap:10px;}
.nav-year{font-size:11px;color:var(--muted);font-family:var(--fm);}

/* SEARCH BAR */
.search-wrap{position:relative;width:200px;}
.search-wrap input{background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:6px 10px 6px 30px;color:var(--text);font-family:var(--fm);font-size:12px;width:100%;transition:all 0.15s;}
.search-wrap input:focus{outline:none;border-color:var(--accent);background:var(--surface);}
.search-wrap input::placeholder{color:var(--muted);}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;pointer-events:none;}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;display:none;line-height:1;padding:0;}
.search-clear.show{display:block;}

/* QUICK-ADD FAB */
.fab{position:fixed;bottom:24px;right:24px;z-index:300;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#000;border:none;cursor:pointer;font-size:26px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(240,180,41,0.4);transition:all 0.15s;line-height:1;}
.fab:hover{transform:scale(1.08);}

/* SLIDE-IN PANEL */
.panel-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:400;}
.panel-overlay.on{display:block;}
.slide-panel{position:fixed;top:0;right:-420px;width:420px;max-width:95vw;height:100vh;background:var(--surface);border-left:1px solid var(--border2);z-index:401;transition:right 0.25s cubic-bezier(0.4,0,0.2,1);overflow-y:auto;padding:24px;}
.slide-panel.on{right:0;}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.panel-title{font-family:var(--fh);font-weight:800;font-size:18px;color:var(--accent);}
.panel-close{background:none;border:1px solid var(--border2);border-radius:6px;color:var(--muted2);font-size:18px;cursor:pointer;padding:2px 8px;line-height:1;}
.panel-close:hover{border-color:var(--accent);color:var(--accent);}
.panel-section{font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;font-weight:500;}

/* PAGES */
.page{display:none;max-width:1140px;margin:0 auto;padding:28px 20px 100px;}
.page.on{display:block;}

/* KPI CARDS */
.kgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:12px;margin-bottom:28px;}
.kcard{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 16px;position:relative;overflow:hidden;cursor:pointer;transition:all 0.15s;}
.kcard:hover{border-color:var(--accent);transform:translateY(-1px);}
.kcard.active-filter{border-color:var(--accent);background:var(--surface2);}
.kcard::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);}
.kcard.g::after{background:var(--green);}.kcard.r::after{background:var(--red);}
.kcard.b::after{background:var(--blue);}.kcard.p::after{background:var(--purple);}
.klabel{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:7px;font-weight:500;}
.kval{font-family:var(--fn);font-size:28px;font-weight:400;line-height:1;white-space:nowrap;letter-spacing:1px;}
.ksub{font-size:11px;color:var(--muted2);margin-top:5px;}

/* INSIGHTS STRIP */
.insights{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:28px;}
.insight-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:12px;}
.insight-icon{font-size:18px;flex-shrink:0;}
.insight-label{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:3px;}
.insight-val{font-family:var(--fn);font-size:18px;letter-spacing:0.5px;}
.insight-sub{font-size:11px;color:var(--muted2);}

/* STALE ALERT */
.stale-alert{background:rgba(246,173,85,0.1);border:1px solid rgba(246,173,85,0.35);border-radius:10px;padding:14px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px;}
.stale-dot{width:8px;height:8px;border-radius:50%;background:var(--warn);flex-shrink:0;}
.stale-text{font-size:13px;color:var(--warn);}
.stale-items{font-size:12px;color:var(--muted2);margin-top:4px;}

/* SECTION LABEL */
.sl{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:1.2px;margin:24px 0 14px;display:flex;align-items:center;gap:10px;font-weight:500;}
.sl::after{content:'';flex:1;height:1px;background:var(--border);}

/* MONTH GRID */
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:28px;}
.mcard{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;transition:all 0.15s;}
.mcard:hover{border-color:var(--accent);transform:translateY(-1px);}
.mname{font-family:var(--fh);font-weight:700;font-size:13px;margin-bottom:6px;}
.mval{font-family:var(--fn);font-size:20px;letter-spacing:0.5px;}.mval.pos{color:var(--green);}.mval.nil{color:var(--muted);}
.msub{font-size:10px;color:var(--muted2);margin-top:3px;}

/* CHART */
.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px 28px 20px;margin-bottom:28px;}
.chart-title{font-family:var(--fh);font-size:12px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;margin-bottom:28px;display:flex;align-items:center;gap:16px;}
.chart-legend{display:flex;gap:14px;margin-left:auto;}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted2);}
.leg-dot{width:8px;height:8px;border-radius:2px;}
.bars-wrap{display:flex;align-items:flex-end;gap:8px;height:200px;padding-bottom:32px;position:relative;}
.bars-wrap::after{content:'';position:absolute;bottom:32px;left:0;right:0;height:1px;background:var(--border);}
.bar-group{display:flex;flex-direction:column;align-items:center;flex:1;min-width:0;}
.bar-pair{display:flex;align-items:flex-end;gap:2px;width:100%;height:168px;}
.bar-rev{background:var(--blue);border-radius:3px 3px 0 0;width:55%;transition:opacity 0.15s;min-height:2px;}
.bar-rev:hover{opacity:0.8;}
.bar-prof{background:var(--green);border-radius:3px 3px 0 0;width:45%;min-height:0;}
.bar-label{font-size:9px;color:var(--muted);text-align:center;margin-top:5px;font-family:var(--fm);}
.bar-zero .bar-rev{opacity:0.15;}

/* TABLE */
.twrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border);margin-bottom:20px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead{background:var(--surface2);}
th{padding:9px 12px;text-align:left;color:var(--muted2);font-size:10px;text-transform:uppercase;letter-spacing:0.8px;white-space:nowrap;border-bottom:1px solid var(--border);font-weight:500;}
td{padding:9px 12px;border-bottom:1px solid var(--border);white-space:nowrap;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:var(--surface2);}
.pos{color:var(--green);font-weight:500;}.neg{color:var(--red);}.dim{color:var(--muted2);}

/* MOBILE TABLE — hide cols on small screens */
@media(max-width:700px){
  .col-hide{display:none;}
  .mobile-expand-btn{display:table-cell !important;}
  td,th{padding:8px 8px;}
}
.mobile-expand-btn{display:none;}
.row-detail{display:none;background:var(--surface2);}
.row-detail.on{display:table-row;}

/* BADGES */
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500;}
.sold-b{background:rgba(45,212,160,0.15);color:var(--green);}
.listed-b{background:rgba(240,180,41,0.15);color:var(--accent);}
.stale-b{background:rgba(246,173,85,0.15);color:var(--warn);}

/* FORM */
.fg{display:flex;flex-direction:column;gap:5px;}
.fg label{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:0.8px;font-weight:500;}
.fg input,.fg select{background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;color:var(--text);font-family:var(--fm);font-size:12px;transition:border-color 0.15s;width:100%;}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--accent);}
.fg input::placeholder{color:var(--muted);}
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;}
.fbtns{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.btn{padding:8px 20px;border-radius:7px;border:none;cursor:pointer;font-family:var(--fh);font-size:13px;font-weight:700;transition:all 0.15s;}
.btn-p{background:var(--accent);color:#000;}.btn-p:hover{opacity:0.88;}
.btn-s{background:var(--surface2);color:var(--text);border:1px solid var(--border2);}.btn-s:hover{border-color:var(--accent);color:var(--accent);}

/* MONTH HEADER */
.mhdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px;}
.mtitle{font-family:var(--fn);font-size:38px;letter-spacing:1px;}
.mstats{display:flex;gap:10px;flex-wrap:wrap;}
.mstat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 14px;text-align:center;}
.msv{font-family:var(--fn);font-size:20px;letter-spacing:0.5px;}
.msl{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;font-weight:500;}

/* PROGRESS */
.pbar-wrap{margin-bottom:22px;}
.pbar-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted2);margin-bottom:5px;}
.pbar{height:6px;border-radius:3px;background:var(--surface2);overflow:hidden;}
.pbar-fill{height:100%;background:var(--green);border-radius:3px;}

/* MONTH FOOTER */
.sfooter{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:14px;}
.sfgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;}
.sflabel{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px;font-weight:500;}
.sfval{font-family:var(--fn);font-size:20px;letter-spacing:0.5px;}

/* INLINE EDIT */
.edit-icon-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;padding:2px 4px;border-radius:4px;transition:color 0.15s;line-height:1;}
.edit-icon-btn:hover,.edit-icon-btn.active{color:var(--accent);}
.editrow-inner{padding:12px 14px;}
.editrow-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:8px;margin-bottom:10px;}

/* TABLE BUTTONS */
.tbtn{padding:3px 8px;border-radius:4px;font-size:10px;font-family:var(--fh);font-weight:700;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--muted2);transition:all 0.12s;white-space:nowrap;}
.tbtn:hover{border-color:var(--accent);color:var(--accent);}
.tbtn.del{border-color:rgba(245,101,101,0.3);color:var(--red);}.tbtn.del:hover{background:rgba(245,101,101,0.1);}

/* DRILL DOWN */
.drill-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px;}
.drill-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.drill-title{font-family:var(--fn);font-size:26px;color:var(--accent);letter-spacing:1px;}
.drill-close{background:none;border:1px solid var(--border2);border-radius:6px;color:var(--muted2);font-family:var(--fh);font-size:12px;font-weight:700;padding:4px 10px;cursor:pointer;}
.drill-close:hover{border-color:var(--accent);color:var(--accent);}

/* FILTERS */
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.fbtn{padding:5px 12px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--muted2);font-family:var(--fh);font-size:12px;font-weight:700;cursor:pointer;transition:all 0.12s;}
.fbtn:hover,.fbtn.on{border-color:var(--accent);color:var(--accent);background:rgba(240,180,41,0.07);}

/* SELROW */
.selrow{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.selrow select{background:var(--surface);border:1px solid var(--border2);border-radius:7px;padding:7px 11px;color:var(--text);font-family:var(--fh);font-size:13px;font-weight:700;}
.backbtn{background:none;border:none;color:var(--muted2);font-family:var(--fh);font-size:13px;font-weight:700;cursor:pointer;padding:0;}
.backbtn:hover{color:var(--accent);}

/* SA PAGE */
.sa-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
@media(max-width:640px){.sa-grid{grid-template-columns:1fr;}}
.sacard{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:0;}
.sacard-title{font-family:var(--fh);font-weight:700;font-size:13px;color:var(--accent);margin-bottom:14px;}
.sarow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;}
.sarow:last-child{border-bottom:none;font-size:13px;font-weight:600;}
.notice{background:rgba(240,180,41,0.07);border:1px solid rgba(240,180,41,0.3);border-radius:8px;padding:11px 14px;font-size:12px;color:var(--accent);margin-bottom:20px;line-height:1.5;}
.sabox{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;font-size:11px;color:var(--muted2);line-height:1.9;white-space:pre-wrap;margin-bottom:12px;font-family:var(--fm);}

/* SEARCH HIGHLIGHT */
.hl{background:rgba(240,180,41,0.3);border-radius:2px;}

/* NO RESULTS */
.empty{text-align:center;padding:40px;color:var(--muted);font-size:12px;}
.page-title{font-family:var(--fn);font-size:36px;letter-spacing:1px;margin-bottom:5px;}
.page-sub{color:var(--muted2);font-size:12px;margin-bottom:22px;}

/* TOAST */
#toast{position:fixed;bottom:84px;right:24px;background:var(--surface);border:1px solid var(--green);color:var(--green);padding:10px 18px;border-radius:8px;font-size:12px;z-index:9999;opacity:0;transform:translateY(8px);transition:all 0.2s;pointer-events:none;font-family:var(--fh);font-weight:700;}
#toast.on{opacity:1;transform:translateY(0);}#toast.err{border-color:var(--red);color:var(--red);}

/* MARK SOLD MODAL */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;align-items:center;justify-content:center;}
#modal-overlay.on{display:flex;}
#modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:24px;width:90%;max-width:360px;}
#modal h3{font-family:var(--fh);font-weight:800;font-size:16px;margin-bottom:14px;}
#modal input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;color:var(--text);font-family:var(--fm);font-size:12px;margin-bottom:14px;}
#modal input:focus{outline:none;border-color:var(--accent);}
#modal .mbtns{display:flex;gap:8px;justify-content:flex-end;}

@media(max-width:600px){
  nav{padding:0 12px;height:54px;}
  .brand-general,.brand-007{font-size:17px;}
  .tab{padding:5px 10px;font-size:13px;}
  .page{padding:16px 12px 100px;}
  .search-wrap{width:140px;}
}
</style>
</head>
<body>

<nav>
  <div class="brand" onclick="goNav('summary')">
    <div>
      <div style="display:flex;align-items:baseline"><span class="brand-general">GENERAL</span><span class="brand-007">007</span></div>
      <span class="brand-line" style="width:100%"></span>
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="goNav('summary')">Summary</button>
    <button class="tab" onclick="goNav('monthly')">Monthly</button>
    <button class="tab" onclick="goNav('stock')">Stock</button>
    <button class="tab" onclick="goNav('tax')">Tax / SA</button>
  </div>
  <div class="nav-right">
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="global-search" placeholder="Search items..." oninput="handleSearch(this.value)" autocomplete="off">
      <button class="search-clear" id="search-clear-btn" onclick="clearSearch()">&#x2715;</button>
    </div>
    <div class="nav-year">2026</div>
  </div>
</nav>

<!-- PAGES -->
<div id="p-summary" class="page on"></div>
<div id="p-monthly" class="page"></div>
<div id="p-stock" class="page"></div>
<div id="p-tax" class="page"></div>
<div id="p-search" class="page"></div>

<!-- QUICK ADD PANEL -->
<div class="panel-overlay" id="panel-overlay" onclick="closePanel()"></div>
<div class="slide-panel" id="slide-panel">
  <div class="panel-header">
    <div class="panel-title">Quick Add Item</div>
    <button class="panel-close" onclick="closePanel()">&#x2715;</button>
  </div>
  <div class="panel-section">Which month?</div>
  <div class="fg" style="margin-bottom:16px">
    <select id="qa-month"><option value="JAN">January</option><option value="FEB">February</option><option value="MAR">March</option><option value="APR">April</option><option value="MAY">May</option><option value="JUN">June</option><option value="JUL">July</option><option value="AUG">August</option><option value="SEP">September</option><option value="OCT">October</option><option value="NOV">November</option><option value="DEC">December</option></select>
  </div>
  <div class="panel-section">Item details</div>
  <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px;">
    <div class="fg"><label>Item Name *</label><input type="text" id="qa-name" placeholder="e.g. Nokia 3310"></div>
    <div class="fg"><label>Item Cost (£) *</label><input type="number" id="qa-cost" step="0.01" placeholder="0.00"></div>
    <div class="fg"><label>Location</label><input type="text" id="qa-loc" placeholder="Bed, A101, Desk..."></div>
    <div class="fg"><label>Date Listed</label><input type="date" id="qa-listed"></div>
    <div class="fg"><label>Sale Price (£)</label><input type="number" id="qa-price" step="0.01" placeholder="0.00" oninput="qaAutoCalc()"></div>
    <div class="fg"><label>eBay Fee (£)</label><input type="number" id="qa-ebay" step="0.01" placeholder="auto"></div>
    <div class="fg"><label>Shipping Cost (£)</label><input type="number" id="qa-ship" step="0.01" placeholder="2.94"></div>
    <div class="fg"><label>Promo %</label><input type="number" id="qa-promo" step="0.01" placeholder="0.05"></div>
    <div class="fg"><label>Category</label>
      <select id="qa-cat">
        <option value="">-- Select --</option>
        <option>Electronics</option><option>Cameras</option><option>Gaming</option>
        <option>Books</option><option>Clothing</option><option>Toys</option>
        <option>Home</option><option>Music</option><option>Phones</option><option>Other</option>
      </select>
    </div>
    <div class="fg"><label>Date Sold (if already sold)</label><input type="date" id="qa-sold"></div>

// ── HELPERS ───────────────────────────────────────────────────────────
function daysAgo(d){return Math.round((Date.now()-new Date(d))/86400000);}
function sold(m){return(DB[m]||[]).filter(i=>i.dateSold);}
function unsold(m){return(DB[m]||[]).filter(i=>!i.dateSold);}
function allSold(){return MONTHS.flatMap(m=>sold(m).map(i=>({...i,month:m})));}
function allUnsold(){return MONTHS.flatMap(m=>unsold(m).map(i=>({...i,month:m})));}
function allItems(){return MONTHS.flatMap(m=>(DB[m]||[]).map(i=>({...i,month:m})));}
function mT(m){const s=sold(m);return{rev:s.reduce((a,i)=>a+(i.totalRev||0),0),cost:s.reduce((a,i)=>a+(i.totalCost||0),0),profit:s.reduce((a,i)=>a+(i.grossProfit||0),0),nSold:s.length,nTotal:(DB[m]||[]).length};}
function yT(){return MONTHS.reduce((a,m)=>{const t=mT(m);a.rev+=t.rev;a.cost+=t.cost;a.profit+=t.profit;a.nSold+=t.nSold;a.nTotal+=t.nTotal;return a;},{rev:0,cost:0,profit:0,nSold:0,nTotal:0});}
function recalc(i,ds){const pc=i.salePrice*(i.promoPercent||0);const tc=i.itemCost+i.shipping+i.ebayFee+pc;const tr=i.salePrice+(i.postage||0);i.promoCost=+pc.toFixed(4);i.totalCost=+tc.toFixed(4);i.totalRev=+tr.toFixed(4);i.grossProfit=ds?+(tr-tc).toFixed(2):null;i.roi=i.itemCost>0?+((tr-tc)/i.itemCost).toFixed(4):null;}

  const locMap={};
  s.forEach(i=>{const l=i.location||'Unknown';if(!locMap[l])locMap[l]={profit:0,count:0};locMap[l].profit+=i.grossProfit||0;locMap[l].count++;});
  const bestLoc=Object.entries(locMap).sort((a,b)=>b[1].profit-a[1].profit)[0];
  // Avg ROI
  const avgROI=s.filter(i=>i.roi!=null).reduce((a,i)=>a+i.roi,0)/s.filter(i=>i.roi!=null).length;
  return{bestCat,avgDays,bestLoc,avgROI};
}

// ── NAV ───────────────────────────────────────────────────────────────
function goNav(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('p-'+page).classList.add('on');
  ['summary','monthly','stock','tax'].forEach((p,i)=>{if(p===page)document.querySelectorAll('.tab')[i].classList.add('on');});
  if(page!=='summary')activeDrill=null;
  if(page==='summary')renderSummary();
  if(page==='monthly')renderMonthPage();
  if(page==='stock')renderStock();
  if(page==='tax')renderTax();
}

// ── SEARCH ────────────────────────────────────────────────────────────
function handleSearch(q){
  _searchQ=q.trim().toLowerCase();
  const clearBtn=document.getElementById('search-clear-btn');
  if(clearBtn)clearBtn.classList.toggle('show',!!_searchQ);
  if(_searchQ.length>=2){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
    document.getElementById('p-search').classList.add('on');
    renderSearch();
  } else if(!_searchQ){
    goNav('summary');
  }
}
function clearSearch(){
  document.getElementById('global-search').value='';
  _searchQ='';
  document.getElementById('search-clear-btn').classList.remove('show');
  goNav('summary');
}
function hlText(text,q){
  if(!q)return esc(text);
  const idx=text.toLowerCase().indexOf(q);
  if(idx<0)return esc(text);
  return esc(text.slice(0,idx))+'<mark class="hl">'+esc(text.slice(idx,idx+q.length))+'</mark>'+esc(text.slice(idx+q.length));
}
function renderSearch(){

  </table></div>`;
}

// ── SUMMARY ───────────────────────────────────────────────────────────
function kc(l,v,s,c,drill=''){
  const act=drill&&activeDrill===drill?' active-filter':'';
  const click=drill?`onclick="drillKPI('${drill}')"`:'';
  return`<div class="kcard ${c}${act}" ${click}><div class="klabel">${l}</div><div class="kval">${v}</div><div class="ksub">${s}</div></div>`;
}
function renderChart(){
  const data=MONTHS.map(m=>{const t=mT(m);return{m,rev:t.rev,profit:t.profit};});
  const maxRev=Math.max(...data.map(d=>d.rev),1);
  let bars='';
  data.forEach(d=>{
    const revH=Math.round((d.rev/maxRev)*168);
    const profH=d.profit>0?Math.round((d.profit/maxRev)*168):0;
    bars+=`<div class="bar-group${d.rev===0?' bar-zero':''}">
      <div class="bar-pair">
        <div class="bar-rev" style="height:${revH}px"></div>
        <div class="bar-prof" style="height:${profH}px"></div>
      </div>
      <div class="bar-label">${MN[d.m].slice(0,3)}</div>
    </div>`;
  });
  return`<div class="chart-wrap">
    <div class="chart-title">Monthly Performance
      <div class="chart-legend">
        <div class="leg"><div class="leg-dot" style="background:var(--blue)"></div>Revenue</div>
        <div class="leg"><div class="leg-dot" style="background:var(--green)"></div>Profit</div>
      </div>
    </div>
    <div class="bars-wrap">${bars}</div>
  </div>`;
}

// ── DRILL KPI ─────────────────────────────────────────────────────────
function drillKPI(type,skipToggle){
  if(!skipToggle){
    if(activeDrill===type){activeDrill=null;renderSummary();return;}
    activeDrill=type;renderSummary();return;
  }
  const panel=document.getElementById('drill-panel');
  if(!panel)return;
  document.querySelectorAll('.kcard').forEach(k=>k.classList.remove('active-filter'));
  const drillMap={revenue:'Total Revenue',profit:'Gross Profit',costs:'Total Costs',stock:'Stock on Hand',unrealised:'Unrealised Profit',listed:'All Items'};
  document.querySelectorAll('.kcard').forEach(k=>{if(k.getAttribute('onclick')&&k.getAttribute('onclick').includes(`'${type}'`))k.classList.add('active-filter');});
  let items=[],cols='';
  if(type==='revenue'){items=allSold();cols='<th>Item</th><th>Month</th><th>Location</th><th>Sale Price</th><th>Revenue</th><th>Profit</th><th>ROI</th><th></th>';}
  else if(type==='profit'){items=allSold().filter(i=>i.grossProfit>0).sort((a,b)=>b.grossProfit-a.grossProfit);cols='<th>Item</th><th>Month</th><th>Sale Price</th><th>Cost</th><th>Profit</th><th>ROI</th><th></th>';}
  else if(type==='costs'){items=allSold();cols='<th>Item</th><th>Month</th><th>Item Cost</th><th>Shipping</th><th>eBay Fee</th><th>Promo</th><th>Total Cost</th><th></th>';}
  else if(type==='stock'){items=allUnsold();cols='<th>Item</th><th>Month</th><th>Location</th><th>Listed</th><th>List Price</th><th>Cost</th><th>Pot. Profit</th><th></th>';}
  else if(type==='unrealised'){items=allUnsold();cols='<th>Item</th><th>Month</th><th>Location</th><th>List Price</th><th>Cost</th><th>Pot. Profit</th><th>ROI</th><th></th>';}
  else if(type==='listed'){items=allItems();cols='<th>Status</th><th>Item</th><th>Month</th><th>Location</th><th>Price</th><th>Profit</th><th></th>';}
  const rows=items.map(i=>{
    const eb=`<button class="tbtn" onclick="toggleRowEdit('${i.month}','${i.id}')">&#9998;</button>`;
    const ms=!i.dateSold?`<button class="tbtn" onclick="openSold('${i.month}','${i.id}')">Mark sold</button>`:'';
    if(type==='revenue')return`<tr><td>${esc(i.item)}</td><td class="dim">${MN[i.month]}</td><td class="dim">${esc(i.location||'--')}</td><td>${fmt(i.salePrice)}</td><td>${fmt(i.totalRev)}</td><td class="pos">${fmt(i.grossProfit)}</td><td style="color:var(--accent)">${i.roi!=null?(i.roi*100).toFixed(0)+'%':'--'}</td><td style="display:flex;gap:4px">${eb}${ms}</td></tr>`;
    if(type==='profit')return`<tr><td>${esc(i.item)}</td><td class="dim">${MN[i.month]}</td><td>${fmt(i.salePrice)}</td><td class="dim">${fmt(i.itemCost)}</td><td class="pos">${fmt(i.grossProfit)}</td><td style="color:var(--accent)">${i.roi!=null?(i.roi*100).toFixed(0)+'%':'--'}</td><td>${eb}</td></tr>`;
    if(type==='costs')return`<tr><td>${esc(i.item)}</td><td class="dim">${MN[i.month]}</td><td class="dim">${fmt(i.itemCost)}</td><td class="dim">${fmt(i.shipping)}</td><td class="dim">${fmt(i.ebayFee)}</td><td class="dim">${fmt(i.promoCost)}</td><td style="color:var(--red)">${fmt(i.totalCost)}</td><td>${eb}</td></tr>`;
    if(type==='stock'||type==='unrealised'){const p=i.totalRev-i.totalCost;const stale=isStale(i);return`<tr><td>${esc(i.item)}${stale?' <span class="badge stale-b">Stale</span>':''}</td><td class="dim">${MN[i.month]}</td><td class="dim">${esc(i.location||'--')}</td><td>${type==='stock'?i.dateListed||'--':fmt(i.salePrice)}</td><td class="dim">${fmt(i.itemCost)}</td><td class="${p>0?'pos':'neg'}">${fmt(p)}</td><td style="color:var(--accent)">${i.roi!=null?(i.roi*100).toFixed(0)+'%':'--'}</td><td style="display:flex;gap:4px">${eb}${ms}</td></tr>`;}
    if(type==='listed'){const s=!!i.dateSold;return`<tr><td><span class="badge ${s?'sold-b':'listed-b'}">${s?'Sold':'Listed'}</span></td><td>${esc(i.item)}</td><td class="dim">${MN[i.month]}</td><td class="dim">${esc(i.location||'--')}</td><td>${fmt(i.salePrice)}</td><td class="${i.grossProfit>0?'pos':''}">${fmt(i.grossProfit)}</td><td style="display:flex;gap:4px">${eb}${ms}</td></tr>`;}
    return'';
  }).join('');
  panel.innerHTML=`<div class="drill-panel">
    <div class="drill-header">
      <div class="drill-title">${drillMap[type]||type} (${items.length})</div>
      <button class="drill-close" onclick="activeDrill=null;renderSummary()">Close &#x2715;</button>
    </div>
    <div class="twrap"><table><thead><tr>${cols}</tr></thead>
    <tbody>${rows||'<tr><td colspan="8" class="empty">No items</td></tr>'}</tbody></table></div>
  </div>`;
}

    <td class="col-hide" style="color:var(--red)">${fmt(i.totalCost)}</td>
    <td class="${i.grossProfit>0?'pos':i.grossProfit<0?'neg':''}">${i.grossProfit!=null?fmt(i.grossProfit):'--'}</td>
    <td class="col-hide" style="color:var(--accent)">${i.roi!=null?(i.roi*100).toFixed(0)+'%':'--'}</td>
    <td style="display:flex;gap:4px">
      ${!s?`<button class="tbtn" onclick="openSold('${m}','${i.id}')">Mark sold</button>`:''}
      <button class="tbtn del" onclick="delItem('${m}','${i.id}')">&#x2715;</button>
    </td>
  </tr>
  <tr id="editrow-${i.id}" style="display:none;background:var(--surface2)">
    <td></td><td colspan="13">${editRowInner({...i,month:m})}</td>
  </tr>`;
}
function toggleRowEdit(m,id){
  const er=document.getElementById('editrow-'+id);
  const btn=document.querySelector('#row-'+id+' .edit-icon-btn');
  if(!er)return;
  const open=er.style.display!=='none';
  er.style.display=open?'none':'table-row';
  if(btn)btn.style.color=open?'':'var(--accent)';
}
function saveInlineEdit(m,id){
  if(!m||!DB[m])return;
  const item=DB[m].find(i=>i.id===id);
  if(!item)return;
  item.item=document.getElementById('ei-name-'+id)?.value.trim()||item.item;
  item.location=document.getElementById('ei-loc-'+id)?.value.trim()||'';
  item.category=document.getElementById('ei-cat-'+id)?.value||'';
  item.dateListed=document.getElementById('ei-listed-'+id)?.value||item.dateListed;
  item.dateSold=document.getElementById('ei-sold-'+id)?.value||null;
  item.salePrice=parseFloat(document.getElementById('ei-price-'+id)?.value)||item.salePrice||0;
  item.itemCost=parseFloat(document.getElementById('ei-cost-'+id)?.value)||0;
  item.shipping=parseFloat(document.getElementById('ei-ship-'+id)?.value)||0;
  item.ebayFee=parseFloat(document.getElementById('ei-ebay-'+id)?.value)||0;
  item.postage=parseFloat(document.getElementById('ei-post-'+id)?.value)||0;
  item.promoPercent=parseFloat(document.getElementById('ei-promo-'+id)?.value)||0;
  recalc(item,item.dateSold);
  saveDB();
  const cur=document.querySelector('.page.on').id;
  if(cur==='p-monthly')renderMonth();
  else if(cur==='p-stock')renderStock();
  else if(cur==='p-summary')renderSummary();
  else if(cur==='p-search')renderSearch();
  toast('Saved');
}
function delItem(m,id){
  if(!confirm('Delete this item?'))return;
  DB[m]=DB[m].filter(i=>i.id!==id);
  saveDB();
  const cur=document.querySelector('.page.on').id;
  if(cur==='p-monthly')renderMonth();
  else if(cur==='p-stock')renderStock();
  else if(cur==='p-summary')renderSummary();
  else renderSearch();
  toast('Deleted');
}

// ── MARK SOLD ─────────────────────────────────────────────────────────
function openSold(m,id){_st={m,id};document.getElementById('modal-date').value=new Date().toISOString().split('T')[0];document.getElementById('modal-overlay').classList.add('on');}
function closeModal(e){if(!e||e.target===document.getElementById('modal-overlay')){document.getElementById('modal-overlay').classList.remove('on');_st=null;}}
function confirmSold(){
  if(!_st)return;
  const ds=document.getElementById('modal-date').value;
  if(!ds){toast('Pick a date','err');return;}
  const item=DB[_st.m].find(i=>i.id===_st.id);
  if(item){item.dateSold=ds;recalc(item,ds);saveDB();}
  closeModal();
  const cur=document.querySelector('.page.on').id;
  if(cur==='p-monthly')renderMonth();
  else if(cur==='p-stock')renderStock();
  else if(cur==='p-summary')renderSummary();
  else renderSearch();
  toast('Marked as sold!');
}

// ── STOCK PAGE ────────────────────────────────────────────────────────
function setFilter(f,btn){invFilter=f;document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderStock();}
function renderStock(){
  const locs=[...new Set(MONTHS.flatMap(m=>(DB[m]||[]).filter(i=>!i.dateSold).map(i=>i.location).filter(Boolean)))].sort();
  let items=allUnsold();
  if(invFilter!=='all')items=items.filter(i=>i.location===invFilter);
  const cv=items.reduce((a,i)=>a+i.itemCost,0);
  const pp=items.reduce((a,i)=>a+(i.totalRev-i.totalCost),0);
  const stale=items.filter(isStale);
  document.getElementById('p-stock').innerHTML=`
    <div class="page-title">Current Stock</div>
    <div class="page-sub">Listed but not yet sold</div>
    ${stale.length?`<div class="stale-alert"><div class="stale-dot"></div><div><div class="stale-text">${stale.length} item${stale.length>1?'s':''} stale (30+ days) &mdash; consider repricing</div><div class="stale-items">${stale.map(i=>esc(i.item)).join(', ')}</div></div></div>`:''}
    <div class="filters">
      <button class="fbtn ${invFilter==='all'?'on':''}" onclick="setFilter('all',this)">All (${allUnsold().length})</button>
      ${locs.map(l=>`<button class="fbtn ${invFilter===l?'on':''}" onclick="setFilter('${esc(l)}',this)">${esc(l)}</button>`).join('')}
    </div>
    <div class="kgrid" style="margin-bottom:20px">
      <div class="kcard b"><div class="klabel">Items in Stock</div><div class="kval">${items.length}</div><div class="ksub">${[...new Set(items.map(i=>i.location).filter(Boolean))].length} locations</div></div>
      <div class="kcard"><div class="klabel">Stock Cost Value</div><div class="kval">${fmt(cv)}</div><div class="ksub">Capital tied up</div></div>
      <div class="kcard g"><div class="klabel">Potential Profit</div><div class="kval">${fmt(pp)}</div><div class="ksub">At current list prices</div></div>
      ${stale.length?`<div class="kcard" style="border-color:rgba(246,173,85,0.4)"><div class="klabel" style="color:var(--warn)">Stale Items</div><div class="kval" style="color:var(--warn)">${stale.length}</div><div class="ksub">Listed 30+ days</div></div>`:''}
    </div>
    <div class="twrap"><table>
      <thead><tr><th style="width:28px"></th><th>Item</th><th>Month</th><th>Location</th><th>Days</th><th>List Price</th><th>Cost</th><th>Pot. Profit</th><th>ROI</th><th>Actions</th></tr></thead>
      <tbody>${items.length?items.sort((a,b)=>daysAgo(a.dateListed)-daysAgo(b.dateListed)).reverse().map(i=>{
        const d=daysAgo(i.dateListed),p=i.totalRev-i.totalCost,stale=isStale(i);
        return`<tr id="row-${i.id}">
          <td style="width:28px;text-align:center"><button class="edit-icon-btn" onclick="toggleRowEdit('${i.month}','${i.id}')">&#9998;</button></td>
          <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis">${esc(i.item)}${stale?' <span class="badge stale-b">Stale</span>':''}</td>
          <td class="dim">${MN[i.month]||i.month}</td>
          <td class="dim">${esc(i.location||'--')}</td>
          <td style="color:${d>=30?'var(--warn)':d>=14?'var(--muted2)':'var(--muted2)'};font-weight:${d>=30?'500':'400'}">${d}d</td>
          <td>${fmt(i.salePrice)}</td>
          <td class="dim">${fmt(i.itemCost)}</td>
          <td class="${p>0?'pos':'neg'}">${fmt(p)}</td>
          <td style="color:var(--accent)">${i.roi!=null?(i.roi*100).toFixed(0)+'%':'--'}</td>
          <td style="display:flex;gap:4px">
            <button class="tbtn" onclick="openSold('${i.month}','${i.id}')">Mark sold</button>
            <button class="tbtn del" onclick="delItem('${i.month}','${i.id}')">&#x2715;</button>
          </td>
        </tr>
        <tr id="editrow-${i.id}" style="display:none;background:var(--surface2)"><td></td><td colspan="9">${editRowInner({...i})}</td></tr>`;
      }).join(''):`<tr><td colspan="10" class="empty">No stock${invFilter!=='all'?' in '+invFilter:''}</td></tr>`}</tbody>
    </table></div>`;
}

// ── TAX PAGE ──────────────────────────────────────────────────────────
function renderTax(){
  const yt=yT(),u=allUnsold(),sc=u.reduce((a,i)=>a+i.itemCost,0);
  const net=yt.profit,tax=Math.max(0,net-12570);
  const it=tax<=37700?tax*0.2:37700*0.2+(tax-37700)*0.4,ni=Math.max(0,(net-12570)*0.09);
  const sr=(l,v,c)=>`<div class="sarow"><span>${l}</span><span style="color:${c};font-weight:600">${v}</span></div>`;
  document.getElementById('p-tax').innerHTML=`
    <div class="page-title">Self Assessment</div>
    <div class="page-sub">Tax Year: 6 April 2025 &ndash; 5 April 2026 &middot; Sole Trader</div>
    <div class="notice">&#9888; Estimated figures only &mdash; not financial or tax advice. Always verify with HMRC or a qualified accountant before submitting.</div>
    <div class="sa-grid">
      <div class="sacard"><div class="sacard-title">Income &amp; Expenses</div>
        ${sr('Gross turnover',fmt(yt.rev),'var(--accent)')}
        ${sr('Total allowable expenses',fmt(yt.cost),'var(--red)')}
        ${sr('Net profit',fmt(net),net>=0?'var(--green)':'var(--red)')}
      </div>
      <div class="sacard"><div class="sacard-title">Tax Estimate</div>
        ${sr('Net profit',fmt(net),net>=0?'var(--green)':'var(--red)')}
        ${sr('Personal allowance','&pound;12,570','var(--muted2)')}
        ${sr('Taxable income',fmt(tax),'var(--accent)')}
        ${sr('Est. income tax (20/40%)',fmt(it),'var(--red)')}
        ${sr('Est. Class 4 NI (9%)',fmt(ni),'var(--red)')}
        ${sr('Est. total tax',fmt(it+ni),'var(--red)')}
        ${sr('Est. take-home',fmt(net-it-ni),'var(--green)')}
      </div>
    </div>
    <div class="sacard" style="margin-bottom:0">
      <div class="sacard-title">SA103 Export</div>
      <div class="sabox" id="sa-box">SA103 SELF-EMPLOYMENT
Tax Year: 6 April 2025 - 5 April 2026
Business: eBay Reselling - General-007
Description: Online resale of second-hand goods
Method: Cash basis

INCOME
Box 15  Turnover:             ${yt.rev.toFixed(2)}

EXPENSES
Box 16  Cost of goods:        ${yt.cost.toFixed(2)}
Box 30  Total expenses:       ${yt.cost.toFixed(2)}

PROFIT
Box 31  Net profit:           ${net.toFixed(2)}

STOCK (for records)
Unsold items:                 ${u.length}
Stock cost value:             ${sc.toFixed(2)}

TAX ESTIMATE
Taxable income:               ${tax.toFixed(2)}
Income tax:                   ${it.toFixed(2)}
Class 4 NI:                   ${ni.toFixed(2)}
Total estimated tax:          ${(it+ni).toFixed(2)}

Generated: ${new Date().toLocaleDateString('en-GB')}
Verify with HMRC / accountant before submitting.</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-p" onclick="copySA()">Copy to clipboard</button>
        <button class="btn btn-s" onclick="dlSA()">Download .txt</button>
      </div>
    </div>`;
}
function copySA(){navigator.clipboard.writeText(document.getElementById('sa-box').textContent).then(()=>toast('Copied!')).catch(()=>toast('Copy failed','err'));}
function dlSA(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([document.getElementById('sa-box').textContent],{type:'text/plain'}));a.download='SA103_General007_2026.txt';a.click();toast('Downloaded!');}

// ── QUICK ADD PANEL ───────────────────────────────────────────────────
function openPanel(){
  // Set month to current active month if on monthly page
  const msel=document.getElementById('msel');
  const qamon=document.getElementById('qa-month');
  if(msel&&qamon)qamon.value=msel.value;
  document.getElementById('qa-listed').value=new Date().toISOString().split('T')[0];
  document.getElementById('panel-overlay').classList.add('on');
  document.getElementById('slide-panel').classList.add('on');
  document.getElementById('qa-name').focus();
}
function closePanel(){
  document.getElementById('panel-overlay').classList.remove('on');
  document.getElementById('slide-panel').classList.remove('on');
}
function qaAutoCalc(){
  const p=parseFloat(document.getElementById('qa-price')?.value)||0;
  if(p>0)document.getElementById('qa-ebay').value=(p*0.093).toFixed(2);
}
function quickAddItem(){
  const name=document.getElementById('qa-name').value.trim();
  if(!name){toast('Enter an item name','err');return;}
  const m=document.getElementById('qa-month').value;
  const price=parseFloat(document.getElementById('qa-price').value)||0;
  const cost=parseFloat(document.getElementById('qa-cost').value)||0;
  const ship=parseFloat(document.getElementById('qa-ship').value)||0;
  const ebay=parseFloat(document.getElementById('qa-ebay').value)||(price*0.093);
  const pp=parseFloat(document.getElementById('qa-promo').value)||0.05;
  const ds=document.getElementById('qa-sold').value||null;
  const cat=document.getElementById('qa-cat').value||'';
  const item={id:Date.now().toString(),dateListed:document.getElementById('qa-listed').value,item:name,location:document.getElementById('qa-loc').value.trim(),category:cat,dateSold:ds,salePrice:price,postage:0,itemCost:cost,shipping:ship,ebayFee:+ebay.toFixed(2),promoPercent:pp};
  recalc(item,ds);
  if(!DB[m])DB[m]=[];
  DB[m].push(item);
  saveDB();
  // Reset form
  ['qa-name','qa-loc','qa-price','qa-cost','qa-ship','qa-ebay','qa-promo','qa-sold'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('qa-cat').value='';
  closePanel();
  const cur=document.querySelector('.page.on').id;
  if(cur==='p-monthly'&&document.getElementById('msel')?.value===m)renderMonth();
  else if(cur==='p-summary')renderSummary();
  else if(cur==='p-stock')renderStock();
  toast('Added: '+name);
}

// ── TOAST ─────────────────────────────────────────────────────────────
function toast(msg,type=''){
  const el=document.getElementById('toast');el.textContent=msg;el.className=type==='err'?'on err':'on';
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('on','err'),2800);
}

// ── INIT ──────────────────────────────────────────────────────────────
initDB();
renderSummary();
// Set qa-month default to March since that's the active month
document.getElementById('qa-month').value='MAR';
</script>
