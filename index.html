        <span>${items.length} total</span>
        <span style="color:var(--green)">${sold.length} sold · ${fmt(totalProfit)} profit</span>
        <span style="color:var(--muted)">${active.length} active</span>
        ${avgDays!==null?`<span style="color:var(--text-secondary)">avg ${avgDays}d to sell</span>`:''}
      </div>
    </div>
    ${items.map(i=>{
      const _today=new Date().toISOString().split('T')[0];
      const status=i.isReturned?'returned':i.resaleSalePrice?'resold':i.dateSold?'sold':i.condition==='spares'?'spares':'listed';
      const prof=(i.dateSold||i.resaleSalePrice)&&!i.isReturned?calcGrossProfit(i):null;
      const daysToSell=!i.isReturned&&(i.dateSold||i.resaleSalePrice)?calcDaysToSell(i):null;
      const daysListed=!i.dateSold&&!i.isReturned&&!i.resaleSalePrice&&i.dateListed?daysBetween(i.dateListed,_today):null;
      const returnedAt=i.isReturned&&i.returnHistory&&i.returnHistory.length?i.returnHistory[i.returnHistory.length-1].loggedAt:null;
      const daysSinceReturn=i.isReturned&&(returnedAt||i.dateListed)?daysBetween(returnedAt||i.dateListed,_today):null;
      const isStale=daysListed!==null&&daysListed>=90;
      const isStaleReturn=daysSinceReturn!==null&&daysSinceReturn>=90;
      // Colour thresholds: ≤14 green, ≤30 amber, 30+ red
      const daysColor=daysToSell!==null
        ?(daysToSell<=14?'var(--green)':daysToSell<=30?'var(--warn)':'var(--red)')
        :daysListed!==null
        ?(daysListed<=14?'var(--green)':daysListed<=30?'var(--warn)':'var(--red)')
        :daysSinceReturn!==null
        ?(daysSinceReturn<=14?'var(--green)':daysSinceReturn<=30?'var(--warn)':'var(--red)')
        :'var(--muted)';
      const daysDisplay=daysToSell!==null?daysToSell+'d'
        :daysListed!==null?daysListed+'d'
        :daysSinceReturn!==null?daysSinceReturn+'d since return'
        :null;
      return`<div style="padding:10px;background:var(--surface2);border-radius:8px;margin-bottom:8px;cursor:pointer${isStale||isStaleReturn?';border-left:2px solid var(--warn)':''}" onclick="openItemDetail('${i.month}','${i.id}')">

          ${isStale||isStaleReturn?`<span style="font-size:10px;font-weight:700;background:var(--accent-dim);color:var(--warn);border-radius:4px;padding:2px 6px;">stale</span>`:''}

          <span>${fmt(i.salePrice)}</span>
          ${prof!==null?`<span style="color:var(--green);font-weight:600">${fmt(prof)}</span>`:''}
          ${(i.dateSold||i.resaleSalePrice)&&!i.isReturned&&calcROI(i)!==null?`<span style="color:var(--muted)">ROI ${calcROI(i).toFixed(1)}%</span>`:''}
        </div>

}

function _inSummaryPeriod(dateStr){
  const range=_periodDateRange(SUMMARY_PERIOD);
  if(!range.from)return true;
  if(!dateStr)return false;
  return dateStr>=range.from&&dateStr<=range.to;
}

function _snapshotSoldItems(){

function showFilteredItems(filter){
  let items=[];
  allDBKeys().forEach(k=>{(DB[k]||[]).forEach(i=>{
    if((i.item||'').trim().toUpperCase()==='MONTH END')return;
    const sold=(i.dateSold||i.resaleSalePrice)&&!i.isReturned;
    const saleDate=i.resaleSalePrice?i.resaleDateSold:i.dateSold;
    if((filter==='revenue'||filter==='realised')&&sold){
      if(!_inSummaryPeriod(saleDate))return;
      if(i.resaleSalePrice){
        const bpf=calcEbayBPF(i.salePrice);
        const grossInc=i.salePrice-bpf;
        const promoCost=grossInc*(i.promoPercent||0)*1.20;
        const rev=i.salePrice+(i.postage||0)-bpf;
        const returnCost=(i.returnHistory||[]).reduce(function(s,r){
          const fullReturn=(r.type==='full_seller'||r.type==='full_ebay');
          const netRefund=fullReturn?Math.max(0,(r.refundAmount||0)-bpf):(r.refundAmount||0);
          return s+netRefund+(r.returnPostage||0);
        },0);
        const partsCost=calcPartsCost(i);
        const cost=(i.costPrice||0)+(i.shippingCost||0)+(i.packagingCost||0)+promoCost+returnCost+partsCost;
        const sale1Profit=+(rev-cost).toFixed(2);
        const rBPF=calcEbayBPF(i.resaleSalePrice);
        const rGrossInc=i.resaleSalePrice-rBPF;
        const rPromoCost=rGrossInc*(i.resalePromoPercent||0)*1.20;
        const sale2Profit=+(i.resaleSalePrice-rBPF-(i.resaleShippingCost||0)-rPromoCost).toFixed(2);
        if(filter==='revenue'){
          // Revenue: two real cash transactions — show both (net of any partial refunds on sale 1)
          const s1PartialRefunds=(i.returnHistory||[])
            .filter(r=>r.type==='partial_seller'||r.type==='partial_ebay')
            .reduce((s,r)=>s+(r.refundAmount||0),0);
          const s1NetPrice=Math.max(0,(i.salePrice||0)-s1PartialRefunds);
          items.push({...i,month:k,_entryType:'sale1',_displayPrice:s1NetPrice,_displayDate:i.dateSold||(i.returnHistory&&i.returnHistory[0]?i.returnHistory[0].loggedAt:'')||'',_entryProfit:sale1Profit});
          items.push({...i,month:k,_entryType:'sale2',_displayPrice:i.resaleSalePrice,_displayDate:i.resaleDateSold||'',_entryProfit:sale2Profit});
        }else{
          // Realised P&L: one lifetime entry — the full story
          const lifetimeProfit=calcGrossProfit(i);
          const saleDate=i.resaleDateSold||(i.returnHistory&&i.returnHistory[0]?i.returnHistory[0].loggedAt:'')||'';
          items.push({...i,month:k,_entryType:'resold',_displayPrice:i.resaleSalePrice,_displayDate:saleDate,_entryProfit:lifetimeProfit});
        }
      } else {
        // Normal sale — for revenue filter show salePrice net of any partial refunds
        const nPartialRefunds=(i.returnHistory||[])
          .filter(r=>r.type==='partial_seller'||r.type==='partial_ebay')
          .reduce((s,r)=>s+(r.refundAmount||0),0);
        const nDisplayPrice=filter==='revenue'?Math.max(0,(i.salePrice||0)-nPartialRefunds):i.salePrice;
        items.push({...i,month:k,_entryType:'normal',_displayPrice:nDisplayPrice,_displayDate:i.dateSold||'',_entryProfit:calcGrossProfit(i)});
      }
    } else if(filter==='unrealised'&&!sold&&!i.isReturned){
      items.push({...i,month:k});
    } else if(filter==='stock'&&!sold&&!i.isReturned){
      items.push({...i,month:k});
    }
  });});
  // Sort
  if(filter==='revenue'||filter==='realised')items.sort((a,b)=>(b._displayDate||'').localeCompare(a._displayDate||''));
  if(filter==='realised')items.sort((a,b)=>(b._entryProfit||0)-(a._entryProfit||0));
  const titles={revenue:'Total Revenue',realised:'Realised P&L',unrealised:'Unrealised Profit',stock:'Stock Value'};
  let summaryVal='',summaryLabel='',summaryColor='var(--accent)';
  const uniqueItemCount=new Set(items.map(i=>i.id)).size;
  const returnEntryCount=items.filter(i=>i._entryType==='sale1').length;
  const resoldEntryCount=items.filter(i=>i._entryType==='resold').length;
  if(filter==='revenue'){
    summaryVal=fmt(items.reduce((s,i)=>s+(i._displayPrice||0),0));
    summaryLabel=`${items.length} transactions · ${uniqueItemCount} items`;
    summaryColor='var(--accent)';
  } else if(filter==='realised'){
    const t=items.reduce((s,i)=>s+(i._entryProfit||0),0);
    summaryVal=fmt(t);
    const extras=[];
    if(resoldEntryCount>0)extras.push(`${resoldEntryCount} resold`);
    summaryLabel=`${items.length} items${extras.length?' · '+extras.join(' · '):''}`;
    summaryColor='var(--green)';
  } else if(filter==='unrealised'){
    summaryVal=fmt(items.reduce((s,i)=>s+(calcGrossProfit(i)||0),0));
    summaryLabel=`${items.length} active listings`;
    summaryColor='var(--purple)';
  } else if(filter==='stock'){
    summaryVal=fmt(items.reduce((s,i)=>s+(i.salePrice||0),0));
    summaryLabel=`${items.length} items listed`;

  function renderStockRow(i){

    return`<div style="padding:10px;background:var(--surface2);border-radius:8px;margin-bottom:8px;cursor:pointer" onclick="openItemDetail('${i.month}','${i.id}')">

function showSellThroughBreakdown(){
  const range=_periodDateRange(SUMMARY_PERIOD);
  function inRange(d){return !!d&&d>=range.from&&d<=range.to;}
  const periodLabel={'7d':'Last 7 days','30d':'Last 30 days','60d':'Last 60 days','90d':'Last 90 days','current_fy':'Current FY','prev_fy':'Previous FY'}[SUMMARY_PERIOD]||SUMMARY_PERIOD;
  const is7d=SUMMARY_PERIOD==='7d';
  const title=is7d?'Fast-Mover Rate':'Sell-Through Rate';
  let sold=[],unsold=[];
  allDBKeys().forEach(k=>{(DB[k]||[]).forEach(i=>{
    if((i.item||'').trim().toUpperCase()==='MONTH END')return;
    if(i.isReturned||i.condition==='spares')return;
    const saleDate=i.resaleSalePrice?i.resaleDateSold:i.dateSold;
    const listedDate=i.dateListed;
    if(!listedDate)return;
    const listedInPeriod=inRange(listedDate);
    const soldInPeriod=saleDate&&inRange(saleDate);
    if(is7d){
      // Fast-mover: items in period, did they sell within 14d?
      if(!inRange(saleDate||listedDate))return;
      const d=calcDaysToSell(i);
      if(saleDate){sold.push({...i,month:k,_days:d,_fast:d!==null&&d<=14});}
      else{const daysOn=daysBetween(listedDate,new Date().toISOString().split('T')[0]);if(daysOn>=14)unsold.push({...i,month:k});}
    } else {
      // Sell-through: listed in period — did it sell?
      if(!listedInPeriod&&!soldInPeriod)return;
      if(saleDate)sold.push({...i,month:k,_days:calcDaysToSell(i)});
      else unsold.push({...i,month:k});
    }
  });});
  const total=sold.length+unsold.length;
  if(!total){openPanel(title,'<div style="padding:30px;text-align:center;color:var(--muted)">No items in this period.</div>');return;}
  const pct=Math.round(sold.length/total*100);
  const header=`<div style="margin-bottom:16px;background:var(--surface2);border-radius:10px;padding:14px">
    <div style="display:flex;align-items:center;gap:12px">
      <div class="stat-num" style="color:${pct>=60?'var(--green)':pct>=30?'var(--warn)':'var(--red)'}">${pct}%</div>
      <div>
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">${title}</div>
        <div style="font-size:13px;color:var(--text-secondary)">${sold.length} sold · ${unsold.length} still listed · ${periodLabel}</div>
      </div>
    </div>
  </div>`;
  const soldRows=sold.length?`<div style="font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.08em;margin:0 0 8px">Sold (${sold.length})</div>`+
    [...sold].sort((a,b)=>(a._days||999)-(b._days||999)).map(i=>{
      const col=i._days!==null?(i._days<=14?'var(--green)':i._days<=30?'var(--warn)':'var(--red)'):'var(--muted)';
      return`<div style="padding:10px;background:var(--surface2);border-radius:8px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:10px" onclick="openItemDetail('${i.month}','${i.id}')">
        <div style="flex:1"><div style="font-weight:600;font-size:13px">${esc(i.item)}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">${i.dateListed||'?'} → ${i.resaleSalePrice?i.resaleDateSold:i.dateSold||'?'}</div></div>
        <div style="font-weight:800;font-size:14px;color:${col}">${i._days!==null?i._days+'d':'—'}</div>
      </div>`;}).join(''):'';
  const unsoldRows=unsold.length?`<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:${sold.length?'16px':0} 0 8px">Still listed (${unsold.length})</div>`+
    unsold.map(i=>`<div style="padding:10px;background:var(--surface2);border-radius:8px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:10px" onclick="openItemDetail('${i.month}','${i.id}')">
      <div style="flex:1"><div style="font-weight:600;font-size:13px">${esc(i.item)}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px">Listed ${i.dateListed||'?'}</div></div>
      <div style="font-size:12px;color:var(--muted)">active</div>
    </div>`).join(''):'';
  openPanel(title+' — '+periodLabel,header+soldRows+unsoldRows);
}

      animation:{duration:400,easing:'easeOutQuart'},
      interaction:{mode:'index',intersect:false},

function renderSummary(){
  const el=document.getElementById('p-summary');
  if(!el) return;
  try{
    const stats=calcSummaryStats();
    const tf=getSummaryDateRange();
    const isFY=SUMMARY_PERIOD==='current_fy'||SUMMARY_PERIOD==='prev_fy';
    const range={from:tf.from,to:tf.to};
    const periods=[
      {key:'7d',label:'Last 7 days'},{key:'30d',label:'Last 30 days'},{key:'60d',label:'Last 60 days'},{key:'90d',label:'Last 90 days'},
      {key:'current_fy',label:'Current FY'},{key:'prev_fy',label:'Previous FY'}
    ];
    const activeStock=allItems().filter(i=>!i.isReturned&&!i.dateSold&&!i.resaleSalePrice);
    const activeStockCount=activeStock.length;
    const activeStockVal=activeStock.reduce((s,i)=>s+(i.salePrice||0),0);
    const listedInPeriod=allItems().filter(i=>i.dateListed&&i.dateListed>=range.from&&i.dateListed<=range.to).length;
    // Aging buckets for active stock — same model as Stock page, surfaced compactly here
    const _todayStr=new Date().toISOString().split('T')[0];
    const sumAgeBuckets={fresh:0,maturing:0,slow:0,stale:0};
    activeStock.forEach(i=>{
      const d=daysBetween(i.dateListed,_todayStr);
      if(d<=30)sumAgeBuckets.fresh++;
      else if(d<=60)sumAgeBuckets.maturing++;
      else if(d<90)sumAgeBuckets.slow++;
      else sumAgeBuckets.stale++;
    });
    const catLeaders=Array.isArray(stats.byCat)?stats.byCat.slice(0,4):[];
    const sold=[];
    function inRangeTF(ds){return !!ds && ds>=range.from && ds<=range.to;}
    allDBKeys().forEach(k=>(DB[k]||[]).forEach(i=>{
      if((i.dateSold||i.resaleSalePrice)&&!i.isReturned){
        const saleDate=i.resaleSalePrice?i.resaleDateSold:i.dateSold;
        if(!inRangeTF(saleDate))return;
        const profit=calcGrossProfit(i);
        const roi=calcROI(i);
        if(profit!==null)sold.push({...i,month:k,profit,roi});
      }
    }));
    sold.sort((a,b)=>(b.profit||0)-(a.profit||0));
    // Session E1 — Top 10 (was 8). Velocity card matches height in desktop
    // _matchVelocityHeight(); on small periods with <10 sales we just show
    // however many exist.
    const top=sold.slice(0,10);
    function addDays(ds,n){const d=new Date(ds);d.setDate(d.getDate()+n);return d.toISOString().split('T')[0];}
    function fmtShort(ds){const d=new Date(ds);return (d.getMonth()+1)+'/'+d.getDate();}
    const isDaily=SUMMARY_PERIOD==='7d';
    let chartLabels=[], chartRev=[], chartProfit=[], chartClickHandlers=[];
    if(isFY){
      const keys=_fyKeys(SUMMARY_PERIOD==='current_fy'?_currentFYStart():_currentFYStart()-1);
      keys.forEach(k=>{
        // Session B: FY bars and the snapshot panel both use sale-attribution.
        const ms=calcMonthStatsBySale(k);
        chartLabels.push(MONTH_NAMES[keyCode(k)].slice(0,3));
        chartRev.push(ms.totalRev);
        chartProfit.push(Math.max(0,ms.realisedProfit));
        chartClickHandlers.push(ms.totalRev===0?null:`showMonthSnapshot('${k}')`);
      });
    } else {
      const buckets=[]; let cur=range.from;
      if(isDaily){while(cur<=range.to){buckets.push({from:cur,to:cur,label:fmtShort(cur)});cur=addDays(cur,1);}}
      else{while(cur<=range.to){const end=addDays(cur,6)<=range.to?addDays(cur,6):range.to;buckets.push({from:cur,to:end,label:fmtShort(cur)});cur=addDays(cur,7);}}
      const allSold=[];
      // NEW7: include returned items with a dateSold — gross revenue counts the sale;
      // calcGrossProfit absorbs the refund cost. Items with no dateSold (pure returns
      // pre-sale, or relisted-awaiting-sale) still excluded via the dateSold guard.
      allDBKeys().forEach(k=>(DB[k]||[]).forEach(i=>{if(i.dateSold||i.resaleSalePrice){const sd=i.resaleSalePrice?i.resaleDateSold:i.dateSold;if(sd&&sd>=range.from&&sd<=range.to)allSold.push({rev:calcItemRevenue(i),profit:calcGrossProfit(i)||0,date:sd});}}));
      const bData=buckets.map(b=>{const inB=allSold.filter(x=>x.date>=b.from&&x.date<=b.to);return{...b,rev:inB.reduce((s,x)=>s+x.rev,0),profit:inB.reduce((s,x)=>s+x.profit,0)};});
      bData.forEach(b=>{
        chartLabels.push(b.label);
        chartRev.push(b.rev);
        chartProfit.push(Math.max(0,b.profit));
        chartClickHandlers.push(b.rev===0?null:`showRangeSnapshot('${b.label}','${b.from}','${b.to}')`);
      });
    }
    window.__chartClickHandlers=chartClickHandlers;

    const topRows=top.length ? top.map((i,idx)=>{
      const profitCol=(i.profit||0)>=0?'var(--green)':'var(--red)';
      return `<div class="metric-inline clickable" onclick="openItemDetail('${i.month}','${i.id}')"><div><div class="metric-k">#${idx+1} · ${esc(i.item)}</div><div style="font-size:11px;color:var(--muted);margin-top:4px">${keyName(i.month)} · ${i.dateSold||i.resaleDateSold||''}</div></div><div style="text-align:right"><div class="metric-v" style="font-size:20px;color:${profitCol}">${fmt(i.profit)}</div><div style="font-size:11px;color:var(--text-secondary)">${i.roi!==null?i.roi.toFixed(1)+'% ROI':'—'}</div></div></div>`;
    }).join('') : `<div style="font-size:13px;color:var(--text-secondary)">No completed sales in this period yet.</div>`;
    const catRows=catLeaders.length ? catLeaders.map(c=>{
      const sellPct=c.total?Math.round((c.sold/c.total)*100):0;

            <div class="sl">Snapshot</div>
            <div class="metric-inline clickable" onclick="showAvgSaleBreakdown()"><div><div class="metric-k">Average sale price</div><div style="font-size:11px;color:var(--muted);margin-top:4px">Ticket quality · tap for detail</div></div><div class="metric-v">${fmt(stats.avgSale||0)}</div></div>

            })():''}
          </div>          <div class="panel-card summary-velocity">
            <div class="sl">Velocity</div>
            <div class="metric-inline clickable" onclick="showAvgDaysBreakdown()"><div><div class="metric-k">Avg days to sell</div><div style="font-size:11px;color:var(--muted);margin-top:4px">Current period signal · tap for detail</div></div><div class="metric-v">${stats.avgDays!==null&&stats.avgDays!==undefined?stats.avgDays+'d':'—'}</div></div>

              :`<div class="metric-inline clickable" onclick="showSellThroughBreakdown()"><div><div class="metric-k">Sell-through</div><div style="font-size:11px;color:var(--muted);margin-top:4px">Listed in period that sold · tap for detail</div></div><div class="metric-v">${stats.sellThrough!==null&&stats.sellThrough!==undefined?Math.round(stats.sellThrough)+'%':'—'}</div></div>`
            }
            ${catLeaders.length?`<div class="vel-cat-wrap" id="vel-cat-wrap"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-top:14px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)">Category breakdown</div><div class="category-mini-grid" id="vel-cat-grid" style="margin-top:0">${catLeaders.map(c=>{const sellPct=c.total?Math.round((c.sold/c.total)*100):0;return`<div class="category-mini-row vel-cat-item" onclick="showCategoryItems(${JSON.stringify(c.cat).replace(/"/g,'&quot;')})"><div><div class="metric-k">${esc(c.cat)}</div><div class="category-mini-meta">${c.sold}/${c.total} sold · ${c.avgDays!==null?c.avgDays+'d avg':'—'}</div></div><div class="category-mini-val">${sellPct}%</div></div>`;}).join('')}</div><div id="vel-cat-more" style="display:none;margin-top:10px"><button style="width:100%;padding:8px;border-radius:10px;border:none;background:var(--accent);color:#000;font-size:12px;font-weight:700;cursor:pointer" onclick="showVelocityCategoriesPanel(window.__summaryByCat||[])">View all categories</button></div></div>`:''}
          </div>
        </div>
      </div>`;
    el.innerHTML=html;
    window.__summaryByCat=stats.byCat||[];
    renderSummaryChart(chartLabels,chartRev,chartProfit);
    // Desktop only: match velocity card height to top flips, collapse overflow cats
    (function _matchVelocityHeight(){
      if(window.innerWidth<=980)return;
      // Two-pass: first lock the height, then trim rows that don't fit
      function run(){
        const mainCol=document.querySelector('.summary-main');
        const side=document.querySelector('.summary-side');
        const velCard=document.querySelector('.summary-velocity');
        const wrap=document.getElementById('vel-cat-wrap');
        const grid=document.getElementById('vel-cat-grid');
        const more=document.getElementById('vel-cat-more');
        if(!mainCol||!side||!velCard)return;

        // ── Pass 1: reset constraints, measure, lock ──
        velCard.style.minHeight='';
        velCard.style.maxHeight='';
        velCard.style.overflow='';

        // Target is the full height of the main column (KPIs + chart + top flips)
        const targetH=mainCol.getBoundingClientRect().height;

        // Measure all side cards except velocity (snapshot + inventory health + their gaps)
        const sideKids=Array.from(side.children);
        const otherH=sideKids
          .filter(ch=>!ch.classList.contains('summary-velocity'))
          .reduce((s,ch)=>s+ch.getBoundingClientRect().height,0);
        const gaps=18*(sideKids.length-1);
        const velH=Math.max(0,targetH-otherH-gaps);

        // Lock: both min and max so the card can never exceed main column
        velCard.style.minHeight=velH+'px';
        velCard.style.maxHeight=velH+'px';
        velCard.style.overflow='hidden';

        // ── Pass 2: after reflow, trim category rows ──
        if(!wrap||!grid||!more)return;
        const rows=Array.from(grid.querySelectorAll('.vel-cat-item'));
        if(!rows.length)return;
        rows.forEach(r=>r.style.display='');
        more.style.display='none';

        requestAnimationFrame(()=>{
          const cardRect=velCard.getBoundingClientRect();
          const wrapTop=wrap.getBoundingClientRect().top;
          const labelEl=wrap.querySelector(':scope > div:first-child');
          const labelH=labelEl?labelEl.getBoundingClientRect().height+10:32;
          // Measure actual button height rather than hardcoding
          more.style.display='block';
          const moreBtnH=more.getBoundingClientRect().height+12;
          more.style.display='none';
          const padding=20;
          const avail=cardRect.bottom-wrapTop-labelH-moreBtnH-padding;
          let used=0,anyHidden=false;
          rows.forEach(r=>{
            const h=r.getBoundingClientRect().height+8;
            if(used+h<=avail){used+=h;}
            else{r.style.display='none';anyHidden=true;}
          });
          more.style.display=anyHidden?'block':'none';
        });
      }
      // Wait for chart + top flips to render before first measure
      setTimeout(run,180);
      // Session E1 — re-run on window resize (debounced) so the height match
      // and category collapse stay aligned when the user resizes between
      // narrow (≤980) and desktop, or just resizes the viewport.
      if(!window._velResizeBound){
        window._velResizeBound=true;
        let _vrt=null;
        window.addEventListener('resize',()=>{
          if(_vrt)clearTimeout(_vrt);
          _vrt=setTimeout(()=>{
            if(window.innerWidth>980 && document.getElementById('p-summary')?.classList.contains('on')){
              run();
            }
          },120);
        });
      }
    })();
    // Mobile chart summary
    (function(){
      const el=document.getElementById('chart-mobile-inner');
      if(!el)return;
      const active=chartLabels.map((l,i)=>({label:l,rev:chartRev[i]||0,profit:chartProfit[i]||0})).filter(x=>x.rev>0);
      if(!active.length){el.innerHTML='<div class="cms-empty">No sales data yet.</div>';return;}
      // Best month by revenue
      const best=active.reduce((a,b)=>b.rev>a.rev?b:a,active[0]);
      // Total & trend (last 2 active months)
      const totalRev=active.reduce((s,x)=>s+x.rev,0);
      const totalProfit=active.reduce((s,x)=>s+x.profit,0);
      const trend=active.length>=2?(active[active.length-1].rev>=active[active.length-2].rev?'↑ Trending up':'↓ Trending down'):'—';
      const fmt=v=>'£'+v.toFixed(2);
      const rows=[
        {label:'Total revenue',sub:active.length+' active month'+(active.length!==1?'s':''),val:fmt(totalRev),profit:'Profit: '+fmt(totalProfit)},
        {label:'Best month',sub:best.label,val:fmt(best.rev),profit:fmt(best.profit)+' profit'},
        {label:'Trend',sub:'Recent direction',val:trend,profit:''},
      ];
      el.innerHTML=rows.map(r=>`<div class="cms-row"><div><div class="cms-label">${r.label}</div><div class="cms-sub">${r.sub}</div></div><div><div class="cms-val">${r.val}</div>${r.profit?'<div class="cms-profit">'+r.profit+'</div>':''}</div></div>`).join('');
    })();
  }catch(err){
    console.error('renderSummary failed', err);
    el.innerHTML=`<div class="page-header"><div><div class="page-title">Command Centre</div><div class="page-subtitle">Fast operational view for revenue, sourcing quality, stock health and velocity across your business.</div></div></div><div class="section-card"><div class="section-card-title">Dashboard unavailable</div><div class="section-card-desc">There was a rendering issue. Reload the page or switch period to retry.</div><button class="btn btn-p" onclick="renderSummary()">Retry dashboard</button></div>`;
  }
}

// ── BAR CHART SNAPSHOT PANEL ──────────────────────────────────────────────
// monthKey e.g. "APR-26" — for FY monthly bars
function showMonthSnapshot(monthKey){
  // Session B: panel uses sale-attribution to match the rest of Monthly.
  const ms = calcMonthStatsBySale(monthKey);
  const events = getSaleEventsInMonth(monthKey);
  const sold = events.filter(e=>!e.isReturned);
  const returned = events.filter(e=>e.isReturned);
  // Active stock for THIS listing month — items in DB[monthKey] that are still live.
  const listed = (DB[monthKey]||[]).filter(i=>(i.item||'').trim().toUpperCase()!=='MONTH END' &&
                                              !i.dateSold && !i.isReturned && !i.resaleSalePrice);
  const stockValue = listed.reduce((s,i)=>s+(i.salePrice||0),0);
  const marginPct = ms.totalRev>0 ? (ms.realisedProfit/ms.totalRev*100).toFixed(1) : null;
  const profColor = ms.realisedProfit>=0?'var(--green)':'var(--red)';
  const totalRefundEvents = ms.refundedItemCount||0;
  const refundLabel = ms.refundDenom===0 ? '—'
    : totalRefundEvents===0 ? '0%'
    : ms.refundItemRate.toFixed(0)+'%';

  const kpis = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
      <div style="background:var(--surface2);border-radius:10px;padding:12px 14px">
        <div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px">Revenue</div>
        <div style="font-size:22px;font-weight:700;font-family:'Inter',sans-serif;letter-spacing:-0.04em;color:var(--blue)">${fmt(ms.totalRev)}</div>
        ${marginPct!==null?`<div style="font-size:11px;color:var(--muted);margin-top:2px">${marginPct}% margin</div>`:''}
      </div>
      <div style="background:var(--surface2);border-radius:10px;padding:12px 14px">
        <div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px">Profit</div>
        <div style="font-size:22px;font-weight:700;font-family:'Inter',sans-serif;letter-spacing:-0.04em;color:${profColor}">${fmt(ms.realisedProfit)}</div>
        ${ms.avgDays!==null?`<div style="font-size:11px;color:var(--muted);margin-top:2px">${ms.avgDays}d avg to sell</div>`:''}
      </div>
      <div style="background:var(--surface2);border-radius:10px;padding:12px 14px">
        <div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px">Sold</div>
        <div style="font-size:22px;font-weight:700;font-family:'Inter',sans-serif;letter-spacing:-0.04em;color:var(--text)">${ms.soldCount}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">sale${ms.soldCount!==1?'s':''}${ms.returnedCount>0?' · '+ms.returnedCount+' returned':''}</div>
      </div>
      <div style="background:var(--surface2);border-radius:10px;padding:12px 14px">
        <div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px">Refund rate</div>
        <div style="font-size:22px;font-weight:700;font-family:'Inter',sans-serif;letter-spacing:-0.04em;color:${totalRefundEvents>0?'var(--warn)':'var(--text)'}">${refundLabel}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">${ms.refundDenom===0?'No sales':(ms.fullRefundCount||0)+' full · '+(ms.partialOnlyCount||0)+' partial'}</div>
      </div>
    </div>`;

  // Render a sale event row (compact)
  const renderEvent = (e) => {
    const i=e.item;
    const profColor = (e.profit||0)>=0?'var(--green)':'var(--red)';
    const lineage = e.sale==='2'?'Resold':'Sold';
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="openItemDetail('${e.month}','${i.id}')">
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(i.item)}</div>
        <div style="font-size:11px;color:${profColor};margin-top:2px;font-weight:600">${fmt(e.profit||0)}${e.roi!==null?` <span style="color:var(--muted);font-weight:400">· ${e.roi.toFixed(1)}% ROI</span>`:''}<span style="color:var(--muted);font-weight:400"> · ${lineage} ${e.saleDate||''}</span></div>
      </div>
      <div style="font-size:13px;font-weight:600;font-family:'Space Mono',monospace;color:var(--text);flex-shrink:0">${fmt(e.salePrice)}</div>
    </div>`;
  };

  // Render a listed-stock row (no sale yet)
  const renderListed = (i) => {
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="openItemDetail('${monthKey}','${i.id}')">
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(i.item)}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">Listed ${i.dateListed||'—'}</div>
      </div>
      <div style="font-size:13px;font-weight:600;font-family:'Space Mono',monospace;color:var(--text);flex-shrink:0">${fmt(i.salePrice)}</div>
    </div>`;
  };

  let itemsHTML = '';
  if(sold.length){
    itemsHTML += `<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin:14px 0 6px">Sold (${sold.length})</div>`;
    itemsHTML += sold.map(renderEvent).join('');
  }
  if(listed.length){
    itemsHTML += `<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin:14px 0 6px">Listed in ${MONTH_NAMES[keyCode(monthKey)]} · still active (${listed.length}) · ${fmt(stockValue)}</div>`;
    itemsHTML += listed.map(renderListed).join('');
  }
  if(returned.length){
    itemsHTML += `<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin:14px 0 6px">Returned (${returned.length})</div>`;
    itemsHTML += returned.map(renderEvent).join('');
  }

  const navBtn = `<button onclick="closePanel();goToMonth('${monthKey}')" style="width:100%;padding:11px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--text-secondary);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;margin-top:14px;transition:all 0.15s" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-secondary)'">Open full month view →</button>`;

  openPanel(keyName(monthKey), kpis + itemsHTML + navBtn, false);
}

// dateRange snapshot for rolling period bars (day/week buckets)
function showRangeSnapshot(label, fromDate, toDate){
  const items = [];
  allDBKeys().forEach(k=>(DB[k]||[]).forEach(i=>{
    if((i.item||'').trim().toUpperCase()==='MONTH END') return;
    // NEW7: include returned items — gross revenue counts the sale, calcGrossProfit
    // absorbs the refund cost. dateSold guard below filters the non-sold cases.
    const sd = i.resaleSalePrice ? i.resaleDateSold : i.dateSold;
    if(sd && sd>=fromDate && sd<=toDate){
      const profit = calcGrossProfit(i);
      const roi = calcROI(i);
      items.push({...i, _month:k, _profit:profit, _roi:roi, _sd:sd});
    }
  }));

  if(!items.length){
    openPanel(label, `<div style="text-align:center;padding:32px 0;color:var(--muted);font-size:14px">No sales in this period</div>`, false);
    return;
  }

  // NEW7: gross revenue — refunds surface in Refund KPI drill-down, not here.
  const totalRev  = items.reduce((s,i)=>s+calcItemRevenue(i),0);
  const totalProf = items.reduce((s,i)=>s+(i._profit||0),0);
  const margin    = totalRev>0?(totalProf/totalRev*100).toFixed(1):null;
  const profColor = totalProf>=0?'var(--green)':'var(--red)';

  const kpis = `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
      <div style="background:var(--surface2);border-radius:10px;padding:11px 12px">
        <div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px">Revenue</div>
        <div style="font-size:18px;font-weight:700;font-family:'Inter',sans-serif;letter-spacing:-0.04em;color:var(--blue)">${fmt(totalRev)}</div>
      </div>
      <div style="background:var(--surface2);border-radius:10px;padding:11px 12px">
        <div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px">Profit</div>
        <div style="font-size:18px;font-weight:700;font-family:'Inter',sans-serif;letter-spacing:-0.04em;color:${profColor}">${fmt(totalProf)}</div>
        ${margin?`<div style="font-size:10px;color:var(--muted);margin-top:1px">${margin}%</div>`:''}
      </div>
      <div style="background:var(--surface2);border-radius:10px;padding:11px 12px">
        <div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px">Sold</div>
        <div style="font-size:18px;font-weight:700;font-family:'Inter',sans-serif;letter-spacing:-0.04em;color:var(--text)">${items.length}</div>
      </div>
    </div>`;

  items.sort((a,b)=>(b._profit||0)-(a._profit||0));
  const rows = items.map(i=>`
    <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="openItemDetail('${i._month}','${i.id}')">
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(i.item)}</div>
        ${i._profit!==null?`<div style="font-size:11px;color:${(i._profit>=0)?'var(--green)':'var(--red)'};margin-top:2px;font-weight:600">${fmt(i._profit)}${i._roi!==null?` <span style="color:var(--muted);font-weight:400">· ${i._roi.toFixed(1)}% ROI</span>`:''}</div>`:''}
      </div>
      <div style="font-size:13px;font-weight:600;font-family:'Space Mono',monospace;flex-shrink:0">${fmt(calcItemRevenue(i))}</div>
    </div>`).join('');

  openPanel(label, kpis + `<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px">Items Sold</div>` + rows, false);
}

function goToMonth(m){
  SELECTED_MONTH=m;
  // Session B: Monthly is now sale-history first. Default to "sold" filter,
  // sorted by sale date descending.
  MONTH_FILTER='sold';
  MONTH_SORT='date-sold';
  SELECTED_ITEMS.clear();
  MONTHLY_VIEW='detail';
  const cur=document.querySelector('.page.on');
  // Record where we came from so back button knows where to go
  if(cur&&cur.id==='p-monthly'){
    _monthOrigin='grid';
  } else {

  }
  if(cur&&cur.id==='p-monthly'){
    renderMonthlyPage();
  } else {
    goToTab('monthly',document.querySelector('[data-tab="monthly"]'));

}

// MONTHLY PAGE
function renderMonthlyPage(){
  if(MONTHLY_VIEW==='grid')renderMonthlyGrid();
  else renderMonth();
}

function backToMonthlyGrid(){
  MONTHLY_VIEW='grid';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  const mt=document.querySelector('[data-tab="monthly"]');
  if(mt)mt.classList.add('on');
  handleNavResize();
  window.scrollTo(0,0);

// Track collapsed state of FY sections — default: current year expanded, others collapsed
const _fyCollapsed={};

function _getFYLabel(fyStart){
  // fyStart = year the FY begins (e.g. 2025 for 2025-26)
  return fyStart+'–'+(fyStart+1);
}

function toggleFYSection(fyStart){
  _fyCollapsed[fyStart]=!_fyCollapsed[fyStart];
  renderMonthlyGrid();
}

function renderMonthlyGrid(){
  const now=new Date();
  const curMonthKey=currentMonthKey(); // e.g. 'APR-26'
  const currentFY=_currentFYStart();

  // Build set of FYs to show: previous, current, next + any FY with data
  const fySet=new Set([currentFY-1, currentFY, currentFY+1]);
  allDBKeys().forEach(function(k){
    const code=keyCode(k); const yr=keyYear(k);
    const mo=MONTHS.indexOf(code);
    if(mo<0)return;
    const fy=mo>=3?yr:yr-1;
    fySet.add(fy);
  });
  const fyYears=Array.from(fySet).sort(function(a,b){return b-a;}); // newest first

  let html='<div style="padding-bottom:80px;">';
  html+='<div class="page-header"><div><div class="page-title">Monthly View</div><div class="page-subtitle">Tax-year organised performance timeline.</div></div></div>';

  fyYears.forEach(function(fy){
    const months=_fyKeys(fy); // full Apr-Mar ordered list of 'MMM-YY' keys
    const isCurrentFY=fy===currentFY;
    // Default collapse: current FY always open; previous FY open if within 6 months
    // of its end (March) — i.e. before October of the current year; future + older always collapsed
    let defaultCollapsed;
    if(fy===currentFY){ defaultCollapsed=false; }
    else if(fy===currentFY-1){
      // Previous FY ended March of currentFY. Stay open until Oct 1 of currentFY.
      const cutoff=new Date(currentFY,9,1); // Oct 1 (month index 9)
      defaultCollapsed=now>=cutoff;
    } else { defaultCollapsed=true; }
    const isCollapsed=_fyCollapsed[fy]!==undefined?_fyCollapsed[fy]:defaultCollapsed;

    let fyProfit=0,fySold=0,fyROISum=0,fyROICount=0;
    months.forEach(function(k){
      // Session B: FY rollups attribute by sale date, not listing month.
      const ms=calcMonthStatsBySale(k);
      fyProfit+=ms.realisedProfit;
      fySold+=ms.soldCount;
      // Roll up ROI from this month's sale events (not from items in DB[k]).
      getSaleEventsInMonth(k).forEach(function(ev){
        if(!ev.isReturned&&ev.roi!==null){fyROISum+=ev.roi;fyROICount++;}
      });
    });
    const fyAvgROI=fyROICount>0?(fyROISum/fyROICount):null;
    const fyLabel=_getFYLabel(fy);
    const profitColor=fyProfit>0?'var(--green)':fyProfit<0?'var(--red)':'var(--muted)';
    const chevronRot=isCollapsed?'0deg':'180deg';
    const borderCol=isCurrentFY?'var(--accent)':'var(--border)';
    const labelCol=isCurrentFY?'var(--accent)':'var(--text)';
    const currentBadge=isCurrentFY?'<span style="font-size:10px;font-weight:700;background:var(--accent);color:#000;border-radius:4px;padding:2px 7px;letter-spacing:0.5px;">CURRENT</span>':'';
    const roiSpan=fyAvgROI!==null?'<span style="color:var(--text-secondary)">'+fyAvgROI.toFixed(1)+'% avg ROI</span>':'';

    let gridHTML='';
    if(!isCollapsed){
      // Past FYs: show most-recent month first (MAR→APR). Current FY: chronological (APR→now).
      const displayMonths=isCurrentFY?months:[...months].reverse();
      const cards=displayMonths.map(function(k){
        // Session B: card profit and sold count come from sale-attribution,
        // but listedCount stays as listing-month inventory (kept in the bySale
        // helper for this exact use).
        const ms=calcMonthStatsBySale(k);
        const hasItems=(DB[k]||[]).length>0||ms.soldCount>0||ms.eventCount>0;
        const hasActivity=ms.soldCount>0||ms.listedCount>0||ms.eventCount>0;
        const isCurrent=k===curMonthKey;
        // Truly empty: no items at all AND no sale events AND not current month
        const trulyEmpty=!hasItems&&!isCurrent;
        // Has activity but 0 net sold (could still have returned events)
        const hasListedOnly=hasItems&&ms.soldCount===0;
        const borderStyle=isCurrent?'border-color:var(--accent);':'';
        let cardContent;
        if(trulyEmpty){
          cardContent='<div class="mval nil" style="font-size:16px;">—</div>';
        } else if(hasListedOnly){
          cardContent='<div class="mval nil">—</div>';
        } else {
          const profVal=ms.realisedProfit>0?'pos':ms.realisedProfit<0?'neg':'nil';
          cardContent='<div class="mval '+profVal+'">'+(ms.soldCount>0?fmt(ms.realisedProfit):'—')+'</div>';
        }
        const nowBadge=isCurrent?'<span style="font-size:10px;font-weight:700;color:var(--accent);letter-spacing:0.5px;text-transform:uppercase;">Now</span>':'';
        const monthLabel=MONTH_NAMES[keyCode(k)]; // e.g. 'April'
        return '<div class="mcard'+(trulyEmpty?' mcard-empty':'')+'" style="'+borderStyle+'" onclick="goToMonth(\''+k+'\')">' 
          +'<div class="mcard-body-left">'
          +'<div style="display:flex;align-items:center;gap:6px;">'
          +'<div class="mname" style="margin-bottom:0">'+monthLabel+'</div>'+nowBadge+'</div>'
          +'<div class="msub">'+
            (trulyEmpty?'No items yet · tap to add':
             hasListedOnly?'0 sold · '+ms.listedCount+' active':
             ms.soldCount+' sold · '+ms.listedCount+' active'+(ms.avgDays!==null?' · '+ms.avgDays+'d avg':''))
          +'</div>'
          +'</div>'
          +'<div class="mcard-body-right">'
          +cardContent
          +'</div>'
          +'</div>';
      }).join('');
      gridHTML='<div class="mgrid" style="margin-top:10px;">'+cards+'</div>';
    }

    html+='<div class="fy-section" style="margin-bottom:'+(isCollapsed?'12px':'20px')+'">'
      +'<div onclick="toggleFYSection('+fy+')" style="display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:var(--surface);border:1.5px solid '+borderCol+';border-radius:10px;cursor:pointer;user-select:none;transition:border-color 0.15s;">'
      +'<div style="display:flex;align-items:center;gap:10px;">'
      +'<span style="font-size:13px;font-weight:700;letter-spacing:0.02em;color:'+labelCol+'">FY '+fyLabel+'</span>'
      +currentBadge+'</div>'
      +'<div style="display:flex;align-items:center;gap:20px;">'
      +'<div style="display:flex;gap:16px;align-items:center;font-size:13px;">'
      +'<span class="fy-stat-hide" style="color:var(--text-secondary)">'+fySold+' sold</span>'
      +(roiSpan?roiSpan.replace('<span ','<span class="fy-stat-hide" '):'')
      +'<span style="font-weight:700;color:'+profitColor+'">'+fmt(fyProfit)+'</span>'
      +'</div>'
      +'<span style="font-size:14px;color:var(--muted);transition:transform 0.2s;display:inline-block;transform:rotate('+chevronRot+');">▾</span>'
      +'</div></div>'
      +gridHTML
      +'</div>';
  });

  html+='</div>';
  document.getElementById('p-monthly').innerHTML=html;
}

function toggleMonthPicker(){
  const el=document.getElementById('month-picker');
  if(!el)return;
  const wasOpen=el.classList.contains('open');
  el.classList.toggle('open');
  if(!wasOpen){
    // Scroll the dropdown container so the active month is centred.
    // scrollIntoView() scrolls the *document* not the fixed dropdown container,
    // which causes the page to jump. Instead set scrollTop directly on the list.
    setTimeout(function(){
      const list=document.getElementById('month-picker-list');
      const active=list&&list.querySelector('.month-picker-option.active');
      if(active&&list){
        list.scrollTop=active.offsetTop-(list.clientHeight/2)+(active.clientHeight/2);
      }
    },0);
  }
}
function pickMonth(m){
  const el=document.getElementById('month-picker');
  if(el)el.classList.remove('open');
  SELECTED_MONTH=m;MONTH_FILTER='all';SELECTION_MODE=false;SELECTED_ITEMS.clear();
  renderMonth();
}
// Close picker on outside click
document.addEventListener('click',function(e){
  const el=document.getElementById('month-picker');
  if(el&&!el.contains(e.target))el.classList.remove('open');
});

function setMonthFilter(f){
  MONTH_FILTER=f;
  // Session B: all monthly views are sale-history; default sort is date-sold.
  if(MONTH_SORT==='date-listed')MONTH_SORT='date-sold';
  renderMonth();
}
function setMonthSort(s){MONTH_SORT=s;renderMonth();}

function renderMonth(){
  const m=SELECTED_MONTH;
  // Session B: Monthly = sales-history view. KPIs and items list are driven by
  // sale-event attribution (dateSold / resaleDateSold), NOT by listing month.
  const stats=calcMonthStatsBySale(m);
  const events=getSaleEventsInMonth(m);

  // Counts for chips — sale events landing in this month.
  const cSold=events.filter(e=>!e.isReturned).length;
  const cReturned=events.filter(e=>e.isReturned).length;
  const cAll=events.length;

  // Filter
  let visible=events;
  if(MONTH_FILTER==='sold')visible=events.filter(e=>!e.isReturned);
  else if(MONTH_FILTER==='returned')visible=events.filter(e=>e.isReturned);
  // 'all' = everything

  // Sort
  visible=[...visible].sort((a,b)=>{
    if(MONTH_SORT==='profit')return (b.profit||0)-(a.profit||0);
    if(MONTH_SORT==='price')return (b.salePrice||0)-(a.salePrice||0);
    if(MONTH_SORT==='roi'){
      // null ROI sinks to bottom
      const ra=a.roi==null?-Infinity:a.roi, rb=b.roi==null?-Infinity:b.roi;
      return rb-ra;
    }
    // default: date-sold desc
    const da=a.saleDate||'0', db=b.saleDate||'0';
    return db<da?-1:db>da?1:0;
  });

  const backLabel=_monthOrigin==='grid'?'← Calendar':_monthOrigin==='p-summary'?'← Dashboard':'← Back';
  const backAction=_monthOrigin==='grid'
    ?`backToMonthlyGrid()`
    :_monthOrigin==='p-summary'
      ?`goToTab('summary',document.querySelector('[data-tab="summary"]'))`
      :`goToTab('${(_monthOrigin||'p-summary').replace('p-','')}',document.querySelector('[data-tab="${(_monthOrigin||'p-summary').replace('p-','')}"]'))`;

  // Refund rate display — items-based, sale-month attributed.
  // Sub-text shows 'N full · N partial' breakdown rather than 'X of Y sold'
  // (which would duplicate the sold count from the Revenue card).
  const totalRefundEvents=stats.refundedItemCount||0;
  const refundLabel=stats.refundDenom===0?'—'
    :totalRefundEvents===0?'0%'
    :stats.refundItemRate.toFixed(0)+'%';
  const refundSub=stats.refundDenom===0?'No sales'
    :(stats.fullRefundCount||0)+' full · '+(stats.partialOnlyCount||0)+' partial';

  const html=`
    <div class="page-header">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <button class="btn btn-s" style="padding:7px 14px;font-size:13px;" onclick="${backAction}">${backLabel}</button>
        <div class="month-picker-wrap" id="month-picker">
          <div class="month-picker-title" onclick="toggleMonthPicker()">
            ${keyName(m)}
            <span class="month-picker-chevron">▾</span>
          </div>
          <div class="month-picker-backdrop" onclick="toggleMonthPicker()"></div>
          <div class="month-picker-dropdown" id="month-picker-list">
            ${(()=>{
              // Session E1 — only show months that have ANY activity (sold,
              // listed, or returned events). Always include the currently
              // selected month (so users see where they are) and the live
              // current calendar month (so they can jump there even if empty).
              // Empty FYs collapse out entirely.
              const curFY=_currentFYStart();
              const liveMonthKey=currentMonthKey();
              const fySet=new Set();
              allDBKeys().forEach(k=>{const code=keyCode(k);const yr=keyYear(k);const mo=MONTHS.indexOf(code);const fy=mo>=3?yr:yr-1;fySet.add(fy);});
              const fyYears=Array.from(fySet).sort((a,b)=>b-a);
              let out='';
              fyYears.forEach(fy=>{
                const keys=_fyKeys(fy);
                const isCur=fy===curFY;
                // Pre-filter the keys for this FY so we can skip empty FYs.
                const visibleEntries=keys.map(k=>{
                  const ms=calcMonthStatsBySale(k);
                  const hasActivity=ms.soldCount>0||ms.listedCount>0||ms.eventCount>0;
                  const isActiveSel=k===m;        // currently viewing this month
                  const isLiveMonth=k===liveMonthKey;
                  if(!hasActivity&&!isActiveSel&&!isLiveMonth)return null;
                  return {k,ms,hasActivity,isLiveMonth};
                }).filter(Boolean);
                if(visibleEntries.length===0)return; // skip empty FYs
                out+='<div class="month-picker-fy-header">FY '+_getFYLabel(fy)+(isCur?' · Current':'')+'</div>';
                visibleEntries.forEach(({k,ms,hasActivity,isLiveMonth})=>{
                  const sub=hasActivity
                    ?'<span class="month-picker-option-sub">'+ms.soldCount+' sold · '+ms.listedCount+' active</span>'
                    :'<span class="month-picker-option-sub" style="opacity:0.4">'+(isLiveMonth?'this month':'no activity')+'</span>';
                  out+='<div class="month-picker-option'+(k===m?' active':'')+'" onclick="pickMonth(\''+k+'\')">'
                    +MONTH_NAMES[keyCode(k)]+sub+'</div>';
                });
              });
              return out||'<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">No months yet</div>';
            })()}
          </div>
        </div>
      </div>
    </div>

    <div class="kgrid kgrid-4">
      <div class="kcard b">
        <div class="klabel">Revenue</div>
        <div class="kval">${fmt(stats.totalRev)}</div>
        <div class="ksub">${stats.soldCount} sale${stats.soldCount!==1?'s':''}${stats.returnedCount>0?' · '+stats.returnedCount+' returned':''}</div>
      </div>
      <div class="kcard g">
        <div class="klabel">Realised P&amp;L</div>
        <div class="kval">${fmt(stats.realisedProfit)}</div>
        <div class="ksub">${stats.totalRev>0?(stats.realisedProfit/stats.totalRev*100).toFixed(0)+'% margin':'—'}</div>
      </div>
      <div class="kcard">
        <div class="klabel">Avg ROI</div>
        <div class="kval">${stats.avgROI!==null?stats.avgROI.toFixed(1)+'%':'—'}</div>
        <div class="ksub">${stats.avgDays!==null?stats.avgDays+'d avg to sell':stats.soldCount===0?'No sales':'—'}</div>
      </div>
      <div class="kcard p">
        <div class="klabel">Refund rate</div>
        <div class="kval">${refundLabel}</div>
        <div class="ksub">${refundSub}</div>
      </div>
    </div>

    <div class="filter-row" style="gap:8px;">
      <div class="filter-chips">
        <button class="chip ${MONTH_FILTER==='all'?'active':''}" onclick="setMonthFilter('all')">All <span class="chip-count">${cAll}</span></button>
        <button class="chip ${MONTH_FILTER==='sold'?'active':''}" onclick="setMonthFilter('sold')">Sold <span class="chip-count">${cSold}</span></button>
        <button class="chip ${MONTH_FILTER==='returned'?'active':''}${cReturned===0?' chip-empty':''}" ${cReturned===0?'disabled':''} onclick="${cReturned>0?`setMonthFilter('returned')`:''}">Returned <span class="chip-count">${cReturned}</span></button>
      </div>
      <select class="sort-select filter-chips-select" onchange="setMonthFilter(this.value)" style="flex-shrink:0;">
        <option value="all" ${MONTH_FILTER==='all'?'selected':''}>All (${cAll})</option>
        <option value="sold" ${MONTH_FILTER==='sold'?'selected':''}>Sold (${cSold})</option>
        <option value="returned" ${MONTH_FILTER==='returned'?'selected':''} ${cReturned===0?'disabled':''}>Returned (${cReturned})</option>
      </select>
      <select class="sort-select" onchange="setMonthSort(this.value)" style="margin-left:auto;flex-shrink:0;">
        <option value="date-sold" ${MONTH_SORT==='date-sold'?'selected':''}>Date sold</option>
        <option value="profit" ${MONTH_SORT==='profit'?'selected':''}>Profit</option>
        <option value="price" ${MONTH_SORT==='price'?'selected':''}>Price</option>
        <option value="roi" ${MONTH_SORT==='roi'?'selected':''}>ROI</option>
      </select>
    </div>

    ${cAll===0?`
      <div class="empty-state">
        <div class="empty-state-icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg></div>
        <div class="empty-state-text">No sales in ${keyName(m)}</div>
        <div class="empty-state-sub">${stats.listedCount>0?stats.listedCount+' item'+(stats.listedCount!==1?'s':'')+' listed in this month — view in <span style="color:var(--accent);cursor:pointer;font-weight:600" onclick="goToTab(\'stock\',document.querySelector(\'[data-tab=stock]\'))">Stock</span>':'Switch month or add new sales'}</div>
      </div>
    `:visible.length===0?`
      <div class="empty-state">
        <div class="empty-state-icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
        <div class="empty-state-text">No ${MONTH_FILTER} sales</div>
        <div class="empty-state-sub"><span style="color:var(--accent);cursor:pointer;font-weight:600" onclick="setMonthFilter('all')">Show all ${cAll}</span></div>
      </div>
    `:`
      <div class="list-toolbar">
        ${SELECTION_MODE?`
          <button class="sel-check" onclick="${SELECTED_ITEMS.size===visible.length?'SELECTED_ITEMS.clear();renderMonth()':'selectAllMonth()'}">
            <span class="sel-check-box ${SELECTED_ITEMS.size===visible.length?'all':SELECTED_ITEMS.size>0?'some':''}">
              ${SELECTED_ITEMS.size===visible.length?'\u2713':SELECTED_ITEMS.size>0?'\u2212':''}
            </span>
            <span style="color:${SELECTED_ITEMS.size>0?'var(--text)':'var(--text-secondary)'}">${SELECTED_ITEMS.size>0?SELECTED_ITEMS.size+' selected':'Select all'}</span>
          </button>
          ${SELECTED_ITEMS.size>0?`
            <button class="btn btn-s danger" style="padding:5px 10px;font-size:12px;display:inline-flex;align-items:center;gap:5px" onclick="bulkAction('delete')"><svg width="13" height="13" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5.5 1h4M1 3.5h13M2.5 3.5l1 9a1 1 0 001 .9h6a1 1 0 001-.9l1-9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 6.5v4M9 6.5v4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg> Delete</button>
          `:''}
          <button class="sel-exit" onclick="toggleSelectionMode()">\u2715 Done</button>
        `:`
          <button class="select-toggle" onclick="toggleSelectionMode()">Select</button>
        `}
      </div>
      <div class="item-table">
        ${visible.map(e=>renderSaleEventRow(e)).join('')}
      </div>
    `}
  `;
  document.getElementById('p-monthly').innerHTML=html;
}

// Render a single sale-event row for the Monthly sale-history list.
// Visually consistent with renderItemRow but tells a sale-lineage story:
//   - Sale 1 (standard):  "Listed {dateListed} · Sold {dateSold} · {Nd} to sell"
//   - Sale 1 (returned):  "Listed {dateListed} · Sold {dateSold} · returned"
//   - Sale 2 (resale):    "Relisted {_relistedAt} · Resold {resaleDateSold} · {Nd}"
function renderSaleEventRow(ev){
  const i=ev.item;
  const m=ev.month;
  const selected=SELECTED_ITEMS.has(i.id);
  const status=ev.isReturned?'returned':ev.sale==='2'?'resold':'sold';
  const profit=ev.profit;
  const roi=ev.roi;

  // Build meta lineage
  const metaParts=[];
  if(ev.sale==='1'){
    if(i.dateListed)metaParts.push('Listed '+i.dateListed);
    if(ev.saleDate)metaParts.push('Sold '+ev.saleDate);
    if(ev.isReturned)metaParts.push('returned');
    else if(ev.daysToSell!==null)metaParts.push(ev.daysToSell+'d to sell');
  } else { // sale === '2'
    const fullReturn=(i.returnHistory||[]).find(r=>r.type==='full_seller'||r.type==='full_ebay');
    const relistDate=fullReturn&&fullReturn._relistedAt?fullReturn._relistedAt:null;
    if(relistDate)metaParts.push('Relisted '+relistDate);
    else if(i.dateListed)metaParts.push('Listed '+i.dateListed);
    if(ev.saleDate)metaParts.push('Resold '+ev.saleDate);
    if(ev.daysToSell!==null)metaParts.push(ev.daysToSell+'d avg');
  }
  if(i.gid)metaParts.push(i.gid);
  const metaStr=metaParts.join(' · ');

  // Right column — price + profit/ROI
  let profitEl='';
  const cls=(profit||0)>=0?'pos':'neg';
  if(ev.isReturned){
    profitEl='<div class="item-row-profit '+cls+'">net '+fmt(profit||0)+'</div>';
  } else {
    profitEl='<div class="item-row-profit '+cls+'">'+fmt(profit||0)+'</div>';
    if(roi!==null)profitEl+='<div class="item-row-roi">'+roi.toFixed(1)+'% ROI</div>';
  }

  const leftSlot=SELECTION_MODE
    ?'<label class="item-checkbox-left" onclick="event.stopPropagation()"><input type="checkbox" '+(selected?'checked':'')+' onchange="toggleSelect(\''+i.id+'\')" style="width:16px;height:16px;accent-color:var(--accent);cursor:pointer;margin-right:4px"></label>'
    :'<div class="status-dot '+status+'"></div>';

  // Row click — capture active page at click time so ← Back returns to correct page
  const rowClick=SELECTION_MODE
    ?'onclick="toggleSelect(\''+i.id+'\')"'
    :'onclick="openItemPage(\''+m+'\',\''+i.id+'\',document.querySelector(\'.page.on\').id)"';

  // Sale-event badge — prefix with sale number for clarity when item appears twice
  const badgeText=ev.sale==='2'?'resold':status;

  // Display price = the sale event's price (sale1 price for sale1, resale for sale2)
  const displayPrice=ev.salePrice||0;

  const actionsHTML='<div class="ddwrap" id="dd-'+i.id+'-s'+ev.sale+'">'+
    '<button class="ddbtn" onclick="event.stopPropagation();toggleDD(\'dd-'+i.id+'-s'+ev.sale+'\')" title="Actions">⋮</button>'+
    '<div class="ddmenu">'+
      '<button onclick="event.stopPropagation();openItemPage(\''+m+'\',\''+i.id+'\',document.querySelector(\'.page.on\').id)">📄 Full page</button>'+
      '<button onclick="event.stopPropagation();editItem(\''+m+'\',\''+i.id+'\')">✏️ Edit</button>'+
      (!ev.isReturned?'<button onclick="event.stopPropagation();openReturn(\''+m+'\',\''+i.id+'\')">↩️ Log Return</button>':'')+
      '<button onclick="event.stopPropagation();duplicateItem(\''+m+'\',\''+i.id+'\')">📋 Duplicate</button>'+
      '<button class="danger" onclick="event.stopPropagation();deleteItem(\''+m+'\',\''+i.id+'\')">🗑️ Delete</button>'+
    '</div></div>';

  return'<div class="item-row'+(selected?' selected':'')+'" '+rowClick+'>'+
    '<div class="item-main">'+
      '<div class="item-row-inner">'+
        leftSlot+
        '<div class="item-row-body">'+
          '<div class="item-row-name">'+esc(i.item)+'</div>'+
          '<div class="item-row-meta">'+
            '<span class="item-badge '+status+'">'+badgeText+'</span>'+
            (metaStr?'<span class="item-row-meta-sep">·</span><span>'+metaStr+'</span>':'')+
          '</div>'+
        '</div>'+
        '<div class="item-row-right">'+
          '<div class="item-row-price">'+fmt(displayPrice)+'</div>'+
          profitEl+
        '</div>'+
        actionsHTML+
      '</div>'+
    '</div>'+
  '</div>';
}

function renderItemRow(m,i){
  const selected=SELECTED_ITEMS.has(i.id);
  const status=i.isReturned?'returned':i.resaleSalePrice?'resold':i.dateSold?'sold':i.condition==='spares'?'spares':'listed';
  const today=new Date().toISOString().split('T')[0];
  // daysListed: for active items only (stale detection). For sold/resold use calcDaysToSell.
  const daysListed=(!i.dateSold&&!i.isReturned&&!i.resaleSalePrice)?daysBetween(i.dateListed,today):0;
  const daysToSellVal=(i.dateSold||i.resaleSalePrice)&&!i.isReturned?calcDaysToSell(i):null;
  const profit=calcGrossProfit(i);
  const roi=calcROI(i);
  const isRelisted=i.isReturned&&(i.returnHistory||[]).some(r=>r.type==='full_seller'||r.type==='full_ebay')&&!i.resaleSalePrice&&!!i.salePrice;
  const badgeClass=isRelisted?'relisted':status;
  const badgeLabel=isRelisted?'relisted':status;
  const isStale=!i.dateSold&&!i.isReturned&&!i.resaleSalePrice&&daysListed>=90;

  // Status-aware meta — minimum useful info per status
  const metaParts=[];
  if(status==='listed'){
    if(i.dateListed)metaParts.push(i.dateListed);
    metaParts.push(daysListed+'d');
  }else if(status==='sold'){
    if(i.dateSold)metaParts.push('sold '+i.dateSold);
    if(daysToSellVal!==null)metaParts.push(daysToSellVal+'d to sell');
  }else if(status==='resold'){
    if(i.resaleDateSold)metaParts.push('resold '+i.resaleDateSold);
    else if(i.dateSold)metaParts.push('sold '+i.dateSold);
    if(daysToSellVal!==null)metaParts.push(daysToSellVal+'d avg');
  }else if(status==='returned'){
    if(i.dateSold)metaParts.push('sold '+i.dateSold);
  }
  if(i.gid)metaParts.push(i.gid);

  const metaStr=metaParts.join(' · ');

  // Progressive action hint — shown only on active listings, escalates with age.
  // Mirrors the four-bucket model from the Stock page so behaviour is consistent.
  let actionHint='';
  if(status==='listed'&&daysListed>30){
    if(daysListed<=60){
      actionHint='<span class="row-hint hint-maturing" title="31–60 days listed. Algorithm freshness is fading — consider a small price nudge or photo refresh.">refresh</span>';
    }else if(daysListed<90){
      actionHint='<span class="row-hint hint-slow" title="61–90 days listed. Action overdue — relist, drop price, or use Sell Similar to reset the listing.">relist</span>';
    }else{
      actionHint='<span class="row-hint hint-stale" title="90+ days listed. Decision time — keep, bundle, deep-discount, or accept the loss.">review</span>';
    }
  }

  // Right column — price + profit/ROI
  let profitEl='';
  if((i.dateSold||i.resaleSalePrice)&&!i.isReturned){
    const cls=profit>=0?'pos':'neg';
    profitEl='<div class="item-row-profit '+cls+'">'+fmt(profit)+'</div>';
    if(roi!==null)profitEl+='<div class="item-row-roi">'+roi.toFixed(1)+'% ROI</div>';
  }else if(!i.dateSold&&!i.isReturned&&!i.resaleSalePrice&&profit!==null){
    profitEl='<div class="item-row-profit est">est. profit '+fmt(profit)+'</div>';
  }else if(i.isReturned){
    const cls=profit>=0?'pos':'neg';
    profitEl='<div class="item-row-profit '+cls+'">net '+fmt(profit)+'</div>';
  }

  // Left slot: checkbox in selection mode, status dot otherwise
  const leftSlot=SELECTION_MODE
    ?'<label class="item-checkbox-left" onclick="event.stopPropagation()"><input type="checkbox" '+(selected?'checked':'')+' onchange="toggleSelect(\''+i.id+'\')" style="width:16px;height:16px;accent-color:var(--accent);cursor:pointer;margin-right:4px"></label>'
    :'<div class="status-dot '+badgeClass+'"></div>';

  // Row click
  const rowClick=SELECTION_MODE
    ?'onclick="toggleSelect(\''+i.id+'\')"'
    :'onclick="openItemPage(\''+m+'\',\''+i.id+'\',document.querySelector(\'.page.on\').id)"';

  const actionsHTML='<div class="ddwrap" id="dd-'+i.id+'">'+
    '<button class="ddbtn" onclick="event.stopPropagation();toggleDD(\'dd-'+i.id+'\')" title="Actions">⋮</button>'+
    '<div class="ddmenu">'+
      '<button onclick="event.stopPropagation();openItemPage(\''+m+'\',\''+i.id+'\',document.querySelector(\'.page.on\').id)">📄 Full page</button>'+
      '<button onclick="event.stopPropagation();editItem(\''+m+'\',\''+i.id+'\')">✏️ Edit</button>'+
      (!i.dateSold&&!i.resaleSalePrice?'<button onclick="event.stopPropagation();markSold(\''+m+'\',\''+i.id+'\')"><svg width="14" height="14" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8.5 1.5h4a1 1 0 011 1v4a.5.5 0 01-.15.35l-6 6a1 1 0 01-1.41 0l-4-4a1 1 0 010-1.41l6-6A.5.5 0 018.5 1.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><circle cx="11" cy="4" r="0.8" fill="currentColor"/></svg> Mark Sold</button>':'')+
      ((i.dateSold||i.resaleSalePrice)&&!i.isReturned?'<button onclick="event.stopPropagation();openReturn(\''+m+'\',\''+i.id+'\')">↩️ Log Return</button>':'')+
      '<button onclick="event.stopPropagation();duplicateItem(\''+m+'\',\''+i.id+'\')">📋 Duplicate</button>'+
      '<button class="danger" onclick="event.stopPropagation();deleteItem(\''+m+'\',\''+i.id+'\')">🗑️ Delete</button>'+
    '</div></div>';

  return'<div class="item-row'+(selected?' selected':'')+' '+(isStale?' stale':'')+'" '+rowClick+'>'+
    '<div class="item-main">'+
      '<div class="item-row-inner">'+
        leftSlot+
        '<div class="item-row-body">'+
          '<div class="item-row-name">'+esc(i.item)+'</div>'+
          '<div class="item-row-meta">'+
            '<span class="item-badge '+badgeClass+'">'+badgeLabel+'</span>'+
            (metaStr?'<span class="item-row-meta-sep">·</span><span>'+metaStr+'</span>':'')+
            actionHint+
          '</div>'+
        '</div>'+
        '<div class="item-row-right">'+
          '<div class="item-row-price">'+fmt(i.salePrice)+'</div>'+
          profitEl+
        '</div>'+
      '</div>'+
    '</div>'+
    '<div class="item-actions">'+actionsHTML+'</div>'+
  '</div>';
}


function openItemDetail(m,id,noHistory){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i)return;
  // When an item has been returned and relisted, confirmRelist overwrites i.salePrice
  // with the new asking price. For the P&L receipt we need the ORIGINAL sale price.
  // _salePriceAtReturn is snapshotted on the return entry at the time of the return log.
  const _wasRelistedDetect = !i.isReturned && !i.dateSold && !i.resaleSalePrice &&
    (i.returnHistory||[]).some(r=>r.type==='full_seller'||r.type==='full_ebay');
  const _origSalePrice = _wasRelistedDetect
    ? (function(){
        const fe=(i.returnHistory||[]).filter(r=>r.type==='full_seller'||r.type==='full_ebay');
        if(!fe.length)return i.salePrice||0;
        const last=fe[fe.length-1];
        // _salePriceAtReturn is snapshotted at return time but may be absent on
        // items loaded fresh from Supabase before the column was added.
        // refundAmount equals the original sale price for full returns, so use it as fallback.
        return last._salePriceAtReturn||last.refundAmount||i.salePrice||0;
      })()
    : (i.salePrice||0);
  const bpf=calcEbayBPF(_origSalePrice);
  const grossInc=_origSalePrice-bpf;
  const promoCost=grossInc*(i.promoPercent||0)*1.20;
  const profit=calcGrossProfit(i);
  const roi=calcROI(i);
  const status=i.isReturned?'returned':i.resaleSalePrice?'resold':i.dateSold?'sold':i.condition==='spares'?'spares':'listed';
  const isSold=(i.dateSold||i.resaleSalePrice)&&!i.isReturned;
  const isUnsold=!i.dateSold&&!i.resaleSalePrice&&!i.isReturned;

  // Primary action button — the thing you most likely opened this to do
  const primaryBtn=i.isReturned
    ?`<button class="btn btn-p" style="flex:1;justify-content:center;gap:8px;padding:12px;background:var(--warn);color:#000" onclick="openRelist('${m}','${id}')">↩ Relist</button>`
    :isUnsold
    ?`<button class="btn btn-p" style="flex:1;justify-content:center;gap:8px;padding:12px" onclick="markSold('${m}','${id}')"><svg width="14" height="14" viewBox="0 0 15 15" fill="none"><path d="M8.5 1.5h4a1 1 0 011 1v4a.5.5 0 01-.15.35l-6 6a1 1 0 01-1.41 0l-4-4a1 1 0 010-1.41l6-6A.5.5 0 018.5 1.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><circle cx="11" cy="4" r="0.8" fill="currentColor"/></svg> Mark Sold</button>`
    :isSold
    ?`<button class="btn btn-s" style="flex:1;justify-content:center;padding:12px" onclick="openReturn('${m}','${id}')">↩ Log Return</button>`
    :'';

  // Stat strip — sale + cost as editable ip-tokens, profit read-only
  const saleEditable=isUnsold;
  const statStrip=`
    <div class="stat-strip-grid" style="display:grid;grid-template-columns:1fr 1fr${profit!==null?' 1fr':''};gap:8px;margin-bottom:16px">
      <div class="ip-token${saleEditable?'':' locked'}" id="tok-salePrice-${id}"${saleEditable?` onpointerdown="tokenPointerDown('${m}','${id}','salePrice')" onclick="openTokenEdit('${m}','${id}','salePrice')"`:''}>
        <div class="ip-token-label">${i.resaleSalePrice?'Total Revenue':'Sale Price'}</div>
        <div class="ip-token-val">${fmt(i.resaleSalePrice?calcItemRevenue(i):(i.salePrice||0))}</div>
        <div class="ip-token-sub">${saleEditable?'✏️ Tap to edit':'🔒 Locked'}</div>
      </div>
      <div class="ip-token" id="tok-costPrice-${id}" onpointerdown="tokenPointerDown('${m}','${id}','costPrice')" onclick="openTokenEdit('${m}','${id}','costPrice')">
        <div class="ip-token-label">Buy Price</div>
        <div class="ip-token-val">${fmt(i.costPrice||0)}</div>
        <div class="ip-token-sub">✏️ Tap to edit</div>
      </div>
      ${profit!==null?`<div class="ip-token locked ${profit>=0?'pos':'neg'}">
        <div class="ip-token-label">Profit</div>
        <div class="ip-token-val">${fmt(profit)}</div>
        <div class="ip-token-sub">${roi!==null?'ROI '+roi.toFixed(1)+'%':'—'}</div>
      </div>`:''}
    </div>`;

  // Quick edits — only the fields you realistically change on the fly
  const quickEdit=`
    <div style="margin-bottom:16px">
      <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px">Quick Edit</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="fg" style="margin-bottom:0">
          <label style="margin-bottom:4px">Location</label>
          <input type="text" id="pd-location" value="${esc(i.location||'')}" placeholder="e.g. Bed, A101" onchange="savePanelQuickEdit('${m}','${id}')" onblur="savePanelQuickEdit('${m}','${id}')">
        </div>
        ${isUnsold?`<div class="fg" style="margin-bottom:0">
          <label style="margin-bottom:4px">Date listed</label>
          <input type="date" id="pd-date-listed" value="${i.dateListed||''}" onchange="savePanelQuickEdit('${m}','${id}')" onblur="savePanelQuickEdit('${m}','${id}')">
        </div>`:`<div class="fg" style="margin-bottom:0">
          <label style="margin-bottom:4px">${i.resaleSalePrice?'Resold':'Date sold'}</label>
          <input type="date" id="${i.resaleSalePrice?'pd-resale-date-sold':'pd-date-sold'}" value="${i.resaleSalePrice?(i.resaleDateSold||''):(i.dateSold||'')}" onchange="savePanelQuickEdit('${m}','${id}')" onblur="savePanelQuickEdit('${m}','${id}')">
        </div>`}
      </div>
      <div style="margin-top:10px">
        <div class="fg" style="margin-bottom:0">
          <label style="margin-bottom:4px">Category</label>
          <select id="pd-category" onchange="savePanelQuickEdit('${m}','${id}')">
            ${ITEM_CATEGORIES.map(c=>`<option value="${c}"${c===i.category?' selected':''}>${c}</option>`).join('')}
          </select>
        </div>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:6px;text-align:right">Auto-saves on change</div>
    </div>`;

  // Return history — compact, only if present
  const returnSection=i.returnHistory&&i.returnHistory.length>0?`
    <div style="background:var(--accent-dim);border:1px solid rgba(240,168,48,0.2);border-radius:10px;padding:12px;margin-bottom:16px;font-size:12px">
      <div style="font-size:10px;font-weight:700;color:var(--warn);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">Return History</div>
      ${i.returnHistory.map((r,rIdx)=>{
        const typeLbl={full_seller:'Full — you handled',full_ebay:'Full — eBay involved',partial_seller:'Partial — you handled',partial_ebay:'Partial — eBay decided'}[r.type]||r.type;
        return`<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--accent-dim)">
          <span style="color:var(--text-secondary)">${typeLbl} · ${fmt(r.refundAmount||0)}</span>
          <button onclick="event.stopPropagation();panelDeleteReturn('${m}','${id}',${rIdx})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px 6px">✕</button>
        </div>`;
      }).join('')}
    </div>`:'';

  const html=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">
      <div class="item-badge ${status}">${status}</div>
      ${i.gid?`<div style="font-size:11px;color:var(--muted);font-family:monospace">${i.gid}</div>`:''}
      ${i.category?`<div style="font-size:11px;color:var(--muted)">· ${esc(i.category)}</div>`:''}
    </div>
    ${statStrip}
    ${primaryBtn?`<div style="display:flex;gap:8px;margin-bottom:16px">${primaryBtn}</div>`:''}
    ${quickEdit}
    ${returnSection}
    <div style="display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding-top:12px;border-top:1px solid var(--border)">
      <button class="btn btn-p" style="justify-content:center" onclick="openItemPageFromPanel('${m}','${id}')">Full details →</button>
      <button class="btn btn-s" onclick="editItem('${m}','${id}')" title="Edit">✏️</button>
      <button class="btn btn-s danger" onclick="deleteItem('${m}','${id}')" title="Delete">🗑️</button>
    </div>
  `;
  const pushHistory=document.getElementById('slide-panel').classList.contains('on')&&!noHistory;
  openPanel(i.item,html,pushHistory);
}

function toggleSelect(id){
  if(SELECTED_ITEMS.has(id)){SELECTED_ITEMS.delete(id);}else{SELECTED_ITEMS.add(id);}
  renderMonth();
}

function toggleSelectionMode(){
  SELECTION_MODE=!SELECTION_MODE;
  if(!SELECTION_MODE)SELECTED_ITEMS.clear();
  renderMonth();
}

function selectAllMonth(){
  // Select all items visible in current filter
  // Session B: filter set is now sold | all | returned, driven by sale events.
  const events=getSaleEventsInMonth(SELECTED_MONTH);
  let visible=events;
  if(MONTH_FILTER==='sold')visible=events.filter(e=>!e.isReturned);
  else if(MONTH_FILTER==='returned')visible=events.filter(e=>e.isReturned);
  const allSelected=visible.length>0&&visible.every(e=>SELECTED_ITEMS.has(e.item.id));
  if(allSelected){visible.forEach(e=>SELECTED_ITEMS.delete(e.item.id));}
  else{visible.forEach(e=>SELECTED_ITEMS.add(e.item.id));}
  renderMonth();
}

async function bulkAction(action){
  if(action==='sold'){
    SELECTED_ITEMS.forEach(id=>{
      const item=(DB[SELECTED_MONTH]||[]).find(i=>i.id===id);
      if(item && !item.dateSold){
        item.dateSold=new Date().toISOString().split('T')[0];
        item.grossProfit=calcGrossProfit(item);
      }
    });
    saveDB();
    SELECTED_ITEMS.clear();SELECTION_MODE=false;
    toast(`Marked items as sold`);
    renderMonth();
  }else if(action==='delete'){
    const ok=await showConfirm('Delete '+SELECTED_ITEMS.size+' items?','This cannot be undone.',{icon:'delete',okLabel:'Delete all'});
    if(!ok)return;
    SELECTED_ITEMS.forEach(id=>{
      const idx=(DB[SELECTED_MONTH]||[]).findIndex(i=>i.id===id);
      if(idx>-1)DB[SELECTED_MONTH].splice(idx,1);
    });
    saveDB();
    SELECTED_ITEMS.clear();SELECTION_MODE=false;
    toast('Items deleted');
    renderMonth();
  }
}

}

function toggleStockSelect(id){
  if(STOCK_SELECTED.has(id)){STOCK_SELECTED.delete(id);}else{STOCK_SELECTED.add(id);}
  renderStock();
}

function selectAllStockVisible(){
  const today=new Date().toISOString().split('T')[0];
  let allListed=[];
  allDBKeys().forEach(k=>(DB[k]||[]).forEach(i=>{
    if(!i.dateSold&&!i.isReturned&&!i.resaleSalePrice)allListed.push({...i,month:k});
  }));
  let items=allListed;
  if(STOCK_FILTER==='stale')items=allListed.filter(i=>daysBetween(i.dateListed,today)>=90);
  else if(STOCK_FILTER==='slow')items=allListed.filter(i=>{const d=daysBetween(i.dateListed,today);return d>60&&d<90;});
  else if(STOCK_FILTER==='maturing')items=allListed.filter(i=>{const d=daysBetween(i.dateListed,today);return d>30&&d<=60;});
  else if(STOCK_FILTER==='fresh')items=allListed.filter(i=>daysBetween(i.dateListed,today)<=30);
  selectAllStock(items);
}

function selectAllStock(items){
  const allSel=items.length>0&&items.every(i=>STOCK_SELECTED.has(i.id));
  if(allSel){items.forEach(i=>STOCK_SELECTED.delete(i.id));}
  else{items.forEach(i=>STOCK_SELECTED.add(i.id));}
  renderStock();
}

async function stockBulkAction(action,items){
  if(action==='sold'){
    const today=new Date().toISOString().split('T')[0];
    STOCK_SELECTED.forEach(id=>{
      let found=null;
      allDBKeys().forEach(k=>{const x=(DB[k]||[]).find(i=>i.id===id);if(x)found=x;});
      if(found&&!found.dateSold){found.dateSold=today;found.grossProfit=calcGrossProfit(found);}
    });
    saveDB();STOCK_SELECTED.clear();STOCK_SELECTION_MODE=false;toast('Marked as sold');renderStock();
  }else if(action==='delete'){
    const ok=await showConfirm('Delete '+STOCK_SELECTED.size+' items?','This cannot be undone.',{icon:'delete',okLabel:'Delete all'});
    if(!ok)return;
    STOCK_SELECTED.forEach(id=>{
      allDBKeys().forEach(k=>{
        const idx=(DB[k]||[]).findIndex(i=>i.id===id);
        if(idx>-1)DB[k].splice(idx,1);
      });
    });
    saveDB();STOCK_SELECTED.clear();STOCK_SELECTION_MODE=false;toast('Items deleted');renderStock();
  }
}

function renderStockRow(m,i){

  const _sm=SELECTION_MODE,_si=SELECTED_ITEMS;
